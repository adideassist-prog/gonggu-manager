<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공구 매니저 v4</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#F0F2F8;color:#1E293B;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}

/* ════════ LAYOUT ════════ */
.app-wrap{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{display:none;width:220px;flex-shrink:0;background:linear-gradient(180deg,#312E81 0%,#4C1D95 100%);flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;overflow-y:auto}
.sb-head{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,.12)}
.sb-brand{display:flex;align-items:center;gap:9px;margin-bottom:16px}
.sb-brand-icon{font-size:22px}
.sb-brand-name{font-size:16px;font-weight:800;color:white}
.sb-brand-date{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
.sb-kpis{display:flex;flex-direction:column;gap:5px}
.sb-kpi{background:rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
.sb-kpi:hover{background:rgba(255,255,255,.18)}
.sb-kpi-label{font-size:11px;color:rgba(255,255,255,.6);font-weight:600}
.sb-kpi-num{font-size:18px;font-weight:900;color:white}
.sb-kpi.urgent{background:rgba(239,68,68,.2)}
.sb-nav{padding:12px 10px;flex:1}
.sb-btn{display:flex;align-items:center;gap:9px;width:100%;padding:10px 12px;border-radius:10px;border:none;background:none;cursor:pointer;font-family:inherit;color:rgba(255,255,255,.65);font-size:13px;font-weight:600;text-align:left;position:relative;margin-bottom:2px;transition:all .15s}
.sb-btn:hover{background:rgba(255,255,255,.1);color:white}
.sb-btn.active{background:rgba(255,255,255,.18);color:white}
.sb-btn-ico{font-size:17px;width:22px;text-align:center}
.sb-badge{background:#EF4444;color:white;border-radius:9px;font-size:9px;font-weight:800;padding:1px 5px;margin-left:auto}
.sb-foot{padding:0 10px 16px;display:flex;flex-direction:column;gap:5px}
.sb-action{padding:10px;border-radius:10px;border:2px solid rgba(255,255,255,.25);background:transparent;color:white;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.sb-action:hover{background:rgba(255,255,255,.12)}
.sb-tool{padding:8px 11px;border-radius:9px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.65);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s}
.sb-tool:hover{background:rgba(255,255,255,.1);color:white}
.sb-gd{border-color:rgba(255,255,255,.3);color:white;font-weight:700}
.sb-gd.on{border-color:#4ADE8060;background:rgba(74,222,128,.1);color:#4ADE80}
.sb-hr{height:1px;background:rgba(255,255,255,.1);margin:3px 0}
.sb-hint{font-size:10px;color:rgba(255,255,255,.28);text-align:center;padding:2px 0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:100vh}

/* MOBILE HEADER */
.mob-header{background:linear-gradient(135deg,#312E81,#4C1D95);color:white;padding:13px 14px 16px;position:sticky;top:0;z-index:100}
.mob-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mob-title{font-size:18px;font-weight:800}
.mob-acts{display:flex;gap:5px}
.mob-act{background:rgba(255,255,255,.2);border:none;border-radius:7px;padding:5px 8px;color:white;font-size:11px;font-weight:700;cursor:pointer}
.mob-gd.on{background:rgba(74,222,128,.2);border:1px solid #4ADE8060;color:#4ADE80}
.mob-kpis{display:flex;gap:6px;flex-wrap:wrap}
.mob-kpi{background:rgba(255,255,255,.15);border-radius:16px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}
.mob-kpi b{font-size:13px;display:block;font-weight:900}
.mob-kpi.urgent{background:rgba(239,68,68,.28)}

/* PC TOPBAR */
.pc-topbar{display:none;padding:16px 24px 0;align-items:center;justify-content:space-between;flex-shrink:0}
.pc-title{font-size:20px;font-weight:800}
.pc-date-str{font-size:12px;color:#64748B;margin-top:2px}
.pc-right{display:flex;align-items:center;gap:8px}
.pc-kpis{display:flex;gap:7px}
.pc-kpi{background:white;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700;color:#64748B;box-shadow:0 1px 3px rgba(0,0,0,.07);cursor:pointer;transition:all .15s}
.pc-kpi:hover{border-color:#C7D2FE;box-shadow:0 2px 8px rgba(79,70,229,.15)}
.pc-kpi span{font-size:16px;font-weight:900;display:block;color:#4F46E5}
.pc-kpi.urg span{color:#EF4444}
.pc-btns{display:flex;gap:6px}
.pc-btn{padding:7px 12px;border-radius:8px;border:1.5px solid #E2E8F0;background:white;color:#64748B;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.pc-btn:hover{border-color:#C7D2FE;color:#4F46E5}

.page-content{padding:12px 14px 90px;flex:1}

/* BOTTOM NAV */
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #E8EDF5;display:flex;padding:7px 0 max(7px,env(safe-area-inset-bottom));z-index:150;box-shadow:0 -3px 14px rgba(0,0,0,.08)}
.bot-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:3px 0;position:relative}
.bot-ico{font-size:19px}
.bot-lbl{font-size:10px;font-weight:700;color:#94A3B8}
.bot-btn.active .bot-lbl{color:#4F46E5}
.bot-nb{position:absolute;top:-1px;right:calc(50% - 17px);background:#EF4444;color:white;border-radius:9px;font-size:9px;font-weight:800;padding:1px 5px}

.fab{position:fixed;bottom:72px;right:14px;background:linear-gradient(135deg,#312E81,#4C1D95);color:white;border:none;border-radius:14px;width:50px;height:50px;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(79,70,229,.4);display:flex;align-items:center;justify-content:center;z-index:99}

/* TOAST */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#1E293B;color:white;padding:10px 18px;border-radius:11px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ════════ DASHBOARD ════════ */
.dash-section{margin-bottom:20px}
.dash-section-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #E2E8F0}
.dash-section-title{font-size:15px;font-weight:800}
.dash-sec-badge{background:#EEF2FF;color:#4F46E5;border-radius:8px;font-size:11px;font-weight:800;padding:2px 7px}

.brief-card{background:linear-gradient(135deg,#312E81,#4C1D95);border-radius:13px;padding:13px 15px;margin-bottom:14px;color:white}
.brief-title{font-size:11px;opacity:.65;font-weight:600;margin-bottom:7px}
.brief-row{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:12px;font-weight:700;cursor:pointer}
.brief-row:hover{opacity:.8}
.brief-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.brief-empty{font-size:12px;opacity:.65;font-weight:600}

.dtab-row{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.dtab-row::-webkit-scrollbar{display:none}
.dtab{padding:6px 13px;border-radius:16px;border:none;background:white;font-size:12px;font-weight:700;color:#94A3B8;cursor:pointer;white-space:nowrap;font-family:inherit;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.dtab.active{background:linear-gradient(135deg,#312E81,#4C1D95);color:white}

.sum-row{display:flex;gap:6px;margin-bottom:12px}
.sum-card{flex:1;background:white;border-radius:11px;padding:10px;text-align:center;box-shadow:0 1px 5px rgba(0,0,0,.05)}
.sum-num{font-size:19px;font-weight:900}
.sum-lbl{font-size:10px;font-weight:600;color:#94A3B8;margin-top:1px}

.task-card{background:white;border-radius:12px;padding:12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer;border:1.5px solid transparent;box-shadow:0 1px 6px rgba(0,0,0,.05);transition:transform .1s}
.task-card:hover{transform:scale(.99)}
.task-card.urgent{border-color:#FCA5A5}
.tc-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tc-body{flex:1;min-width:0}
.tc-action{font-size:13px;font-weight:700;margin-bottom:2px}
.tc-meta{font-size:11px;color:#64748B;font-weight:600}
.tc-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.tc-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px}
.tc-urg{font-size:9px;color:#EF4444;font-weight:800}

/* Personal task card */
.ptask-card{background:white;border-radius:12px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.05);border-left:3px solid #94A3B8;transition:transform .1s}
.ptask-card:hover{transform:scale(.99)}
.ptask-card.done{opacity:.5}
.ptask-dot{width:16px;height:16px;border-radius:50%;border:2px solid #94A3B8;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ptask-dot.done-dot{background:#10B981;border-color:#10B981}
.ptask-body{flex:1;min-width:0}
.ptask-title{font-size:13px;font-weight:700;margin-bottom:1px}
.ptask-card.done .ptask-title{text-decoration:line-through;color:#94A3B8}
.ptask-meta{font-size:11px;color:#94A3B8;font-weight:600}
.ptask-right{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;flex-shrink:0}

.empty-state{text-align:center;padding:44px 20px;color:#94A3B8}
.empty-ico{font-size:40px;margin-bottom:9px}
.empty-tit{font-size:14px;font-weight:700}

/* INF LIST */
.search-box{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #E2E8F0;font-size:13px;font-family:inherit;background:white;outline:none;margin-bottom:10px}
.search-box:focus{border-color:#4F46E5}
.chip-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px}
.chip-row::-webkit-scrollbar{display:none}
.chip{padding:5px 10px;border-radius:16px;border:none;background:#F1F5F9;color:#64748B;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.chip.active{background:#4F46E5;color:white}
.inf-grid{display:block}
.inf-card{background:white;border-radius:13px;padding:12px 14px;margin-bottom:7px;cursor:pointer;box-shadow:0 1px 8px rgba(0,0,0,.05);border-left:4px solid transparent;transition:transform .1s}
.inf-card:hover{transform:scale(.99)}
.inf-card.p1{border-left-color:#6366F1}
.inf-card.p2{border-left-color:#F59E0B}
.inf-card.p3{border-left-color:#2563EB}
.inf-card.p4{border-left-color:#10B981}
.inf-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.inf-name{font-size:15px;font-weight:800}
.inf-sub{font-size:11px;color:#94A3B8;margin-top:1px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.ph-pill{font-size:10px;font-weight:800;padding:3px 8px;border-radius:16px;white-space:nowrap;flex-shrink:0}
.prog-wrap{margin-bottom:7px}
.prog-bar{height:4px;background:#F1F5F9;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}
.prog-txt{font-size:10px;font-weight:700;color:#94A3B8;text-align:right;margin-bottom:3px}
.nxt-box{display:flex;align-items:center;gap:5px;border-radius:7px;padding:5px 8px;margin-bottom:5px}
.nxt-txt{font-size:11px;font-weight:700}
.dtags{display:flex;gap:4px;flex-wrap:wrap}
.dtag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px}

/* ════════ CALENDAR ════════ */
/* Cal mode toggle */
.cal-mode-row{display:flex;gap:6px;margin-bottom:10px}
.cal-mode-btn{flex:1;padding:8px;border-radius:10px;border:2px solid #E2E8F0;background:white;font-size:12px;font-weight:700;color:#94A3B8;cursor:pointer;font-family:inherit;transition:all .15s}
.cal-mode-btn.active{border-color:#4F46E5;background:#EEF2FF;color:#4F46E5}

.legend-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:#64748B}
.leg-dot{width:11px;height:7px;border-radius:3px}

.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-arr{width:32px;height:32px;border-radius:8px;border:none;background:white;box-shadow:0 1px 6px rgba(0,0,0,.08);cursor:pointer;font-size:17px;color:#4F46E5;display:flex;align-items:center;justify-content:center}
.cal-month-lbl{font-size:17px;font-weight:800}

.cal-grid{background:white;border-radius:13px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:#F8FAFC;border-bottom:1px solid #F1F5F9}
.cal-dow div{text-align:center;font-size:10px;font-weight:700;color:#94A3B8;padding:7px 0}
.cal-dow div:first-child{color:#EF4444}
.cal-dow div:last-child{color:#6366F1}
.cal-weeks{display:flex;flex-direction:column}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid #F1F5F9;position:relative;min-height:72px}
.cal-cell{padding:3px 2px 2px;cursor:pointer;position:relative}
.cal-cell:hover{background:#FAFBFF}
.cal-cell.today .day-num{background:linear-gradient(135deg,#312E81,#4C1D95);color:white;border-radius:50%}
.cal-cell.sel{background:#EEF2FF}
.cal-cell.dim .day-num{color:#D1D5DB}
.day-num{font-size:12px;font-weight:700;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 2px;color:#1E293B}
.cal-cell:nth-child(7n+1) .day-num{color:#EF4444}
.cal-cell:nth-child(7n+1).today .day-num{color:white}
.cal-cell:nth-child(7n) .day-num{color:#6366F1}
.cal-cell:nth-child(7n).today .day-num{color:white}
.ev-layer{position:absolute;top:28px;left:0;right:0;pointer-events:none}
.ev-bar{position:absolute;height:20px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:all;cursor:pointer;border-radius:4px}
.ev-bar:hover{opacity:.85;filter:brightness(1.06)}
.ev-dot{position:absolute;height:18px;pointer-events:all;cursor:pointer;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Day detail panel (mobile: below calendar) */
.day-detail{background:white;border-radius:13px;padding:13px;margin-top:10px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.dd-head{font-size:13px;font-weight:800;margin-bottom:9px}
.dd-ev{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:5px;cursor:pointer}
.dd-ev:hover{opacity:.85}
.dd-ev-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
.dd-ev-action{font-size:12px;font-weight:800;margin-bottom:1px}
.dd-ev-meta{font-size:10px;font-weight:600;color:#94A3B8}

/* ════════ MODAL ════════ */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal{background:white;border-radius:24px 24px 0 0;width:100%;max-width:660px;max-height:93vh;overflow-y:auto;padding:18px 18px 40px}
.m-handle{width:32px;height:4px;background:#E2E8F0;border-radius:2px;margin:0 auto 15px}
.m-head{font-size:17px;font-weight:800;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.m-sub{font-size:12px;color:#94A3B8;margin-bottom:14px}
.m-x{width:29px;height:29px;border-radius:7px;border:none;background:#F1F5F9;color:#94A3B8;cursor:pointer;font-size:14px}

/* Phase tabs */
.ph-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:13px}
.ph-tab{padding:9px 3px;border-radius:10px;border:2px solid #E2E8F0;background:white;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}
.ph-tab:hover{border-color:#C7D2FE}
.ph-tab.active{border-color:var(--pc);background:var(--pb)}
.ph-tab-ico{font-size:17px;margin-bottom:2px}
.ph-tab-lbl{font-size:10px;font-weight:800;color:#94A3B8;display:block}
.ph-tab.active .ph-tab-lbl{color:var(--pc)}
.ph-tab-ck{font-size:10px;color:#94A3B8;display:block;margin-top:1px}

/* Checklist */
.cl-section{background:#F8FAFC;border-radius:12px;padding:11px;margin-bottom:11px;border:1.5px solid #EEF2FF}
.cl-title{font-size:11px;font-weight:800;color:#4F46E5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
.cl-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:background .1s}
.cl-item:hover{background:rgba(79,70,229,.04)}
.cl-item.nxt{background:#EEF2FF}
.cl-item input[type=checkbox]{width:15px;height:15px;accent-color:#4F46E5;cursor:pointer;flex-shrink:0}
.cl-item-lbl{font-size:13px;font-weight:600;flex:1}
.cl-item.ckd .cl-item-lbl{text-decoration:line-through;color:#94A3B8}
.nxt-pill{font-size:9px;font-weight:800;background:#4F46E5;color:white;padding:2px 5px;border-radius:5px;margin-left:auto;flex-shrink:0}

/* Form */
.fsec{background:#F8FAFC;border-radius:12px;padding:13px;margin-bottom:10px;border:1.5px solid #EEF2FF}
.fsec-head{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.fsec-num{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#312E81,#4C1D95);color:white;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fsec-label{font-size:13px;font-weight:800}
.fsec-sub{font-size:11px;color:#94A3B8;margin-top:1px}
.field{margin-bottom:9px}
.field:last-child{margin-bottom:0}
.field label{font-size:11px;font-weight:700;color:#64748B;display:block;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;border-radius:10px;border:1.5px solid #E2E8F0;font-size:13px;font-family:inherit;color:#1E293B;background:white;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#4F46E5}
.field input[readonly]{background:#F8FAFC;color:#94A3B8}
.field textarea{resize:vertical;min-height:65px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.field-note{font-size:10px;color:#94A3B8;margin-top:3px}
.btn-row{display:flex;gap:7px;margin-top:16px}
.btn-cancel{flex:1;padding:12px;border-radius:12px;border:2px solid #E2E8F0;background:white;color:#64748B;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.btn-save{flex:2;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#312E81,#4C1D95);color:white;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit}
.btn-del{padding:12px 13px;border-radius:12px;border:none;background:#FEF2F2;color:#EF4444;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}

/* Guide boxes */
.guide-box{background:#F8FAFC;border-radius:12px;padding:12px;border:1.5px solid #EEF2FF;margin-bottom:10px}
.guide-step{font-size:12px;color:#475569;line-height:2;background:white;border-radius:8px;padding:10px;border:1px solid #E2E8F0}
.guide-step a{color:#4F46E5;font-weight:700}
.guide-step code{background:#F1F5F9;padding:1px 4px;border-radius:4px;font-size:11px}

<script>
// ══════════════════════════════════════════════
// 1. CONSTANTS — 4-Phase system (link delivery removed)
// ══════════════════════════════════════════════
const PHASES = [
  { id:1, key:'contact',   label:'컨택',  icon:'📨', color:'#6366F1', bg:'#EEF2FF',
    checks:[{key:'dm',label:'DM 발송',cat:'contact',urgent:false},{key:'reply',label:'답장 확인',cat:'contact',urgent:true},{key:'proposal',label:'제품 제안',cat:'contact',urgent:true},{key:'kakao',label:'카톡 연결',cat:'contact',urgent:true}]},
  { id:2, key:'sample',    label:'샘플',  icon:'📦', color:'#F59E0B', bg:'#FFFBEB',
    checks:[{key:'decided',label:'공구 결정',cat:'sample',urgent:true},{key:'info',label:'샘플 정보 수집',cat:'sample',urgent:true},{key:'sent',label:'샘플 발송',cat:'sample',urgent:true},{key:'tracking',label:'송장번호 전달',cat:'sample',urgent:false},{key:'received',label:'수령 확인',cat:'sample',urgent:false}]},
  { id:3, key:'operation', label:'운영',  icon:'🛍️', color:'#2563EB', bg:'#EFF6FF',
    checks:[{key:'schedule',label:'공구 일정 확정',cat:'groupbuy',urgent:false},{key:'ongoing',label:'공구 진행 중',cat:'groupbuy',urgent:false}]},
  { id:4, key:'closing',   label:'마감',  icon:'💰', color:'#10B981', bg:'#ECFDF5',
    checks:[{key:'done',label:'공구 완료',cat:'settlement',urgent:false},{key:'settlement_info',label:'정산 일정 안내',cat:'settlement',urgent:false},{key:'settled',label:'정산 완료',cat:'settlement',urgent:true},{key:'next_recommend',label:'다음 제품 추천',cat:'contact',urgent:false}]},
];
const PM = Object.fromEntries(PHASES.map(p=>[p.id,p]));
const TC = {
  contact:    {label:'소통', icon:'💬', color:'#6366F1', bg:'#EEF2FF'},
  sample:     {label:'샘플', icon:'📦', color:'#F59E0B', bg:'#FFFBEB'},
  groupbuy:   {label:'공구', icon:'🛍️', color:'#2563EB', bg:'#EFF6FF'},
  settlement: {label:'정산', icon:'💰', color:'#10B981', bg:'#ECFDF5'},
};
const TASK_CATS = ['미팅','업체 연락','샘플 신청','개인 메모','기타'];
const CAT_COLORS = {'미팅':'#6366F1','업체 연락':'#F59E0B','샘플 신청':'#FB8C00','개인 메모':'#10B981','기타':'#94A3B8'};
const DAYS_   = ['일','월','화','수','목','금','토'];
const MONTHS_ = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

// ══════════════════════════════════════════════
// 2. HELPERS
// ══════════════════════════════════════════════
const uid   = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today = ()=>new Date().toISOString().split('T')[0];
const addD  = (n,b)=>{const d=new Date((b||today())+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]};
const fmt   = s=>{if(!s)return'';const d=new Date(s+'T00:00:00');return`${d.getMonth()+1}/${d.getDate()}`};
const diff  = s=>{if(!s)return null;const d=new Date(s+'T00:00:00');const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000)};
const fmtF  = n=>{if(!n)return'';const x=parseInt(n);return x>=10000?`${(x/10000).toFixed(1)}만명`:`${x.toLocaleString()}명`};
const autoSettlementDate = inf=>inf.scheduleEndDate?addD(30,inf.scheduleEndDate):'';
const getChecklist = inf=>{
  const cl=inf.checklist||{};
  return{contact:{dm:false,reply:false,proposal:false,kakao:false,...(cl.contact||{})},sample:{decided:false,info:false,sent:false,tracking:false,received:false,...(cl.sample||{})},operation:{schedule:false,ongoing:false,...(cl.operation||{})},closing:{done:false,settlement_info:false,settled:false,next_recommend:false,...(cl.closing||{})}};
};
const getPhProgress = inf=>{const ph=PM[inf.phase||1];const cl=getChecklist(inf);const done=ph.checks.filter(c=>cl[ph.key][c.key]).length;return{done,total:ph.checks.length}};
const getTotalProgress = inf=>{const cl=getChecklist(inf);let done=0,total=0;PHASES.forEach(ph=>{ph.checks.forEach(c=>{total++;if(cl[ph.key][c.key])done++;});});return{done,total}};

function getNextAction(inf){
  const ph=PM[inf.phase||1];const cl=getChecklist(inf);const phCl=cl[ph.key];
  for(const c of ph.checks){
    if(!phCl[c.key]){
      if(c.key==='settled'&&(inf.settlement_date||autoSettlementDate(inf))){const sd=inf.settlement_date||autoSettlementDate(inf);return{cat:c.cat,action:`정산 진행 (${fmt(sd)})`,urgent:diff(sd)!==null&&diff(sd)<=3};}
      return{cat:c.cat,action:c.label,urgent:c.urgent};
    }
  }
  if(inf.phase<4)return{cat:'contact',action:`${inf.phase+1}단계(${PM[inf.phase+1].label})로 이동`,urgent:false};
  return null;
}

// ══════════════════════════════════════════════
// 3. DATA MIGRATION (v3 → v4)
// ══════════════════════════════════════════════
function migrateInf(inf){
  if(inf.phase)return inf;
  const sm={dm_sent:{phase:1,contact:{dm:true}},replied:{phase:1,contact:{dm:true,reply:true}},kakao_req:{phase:1,contact:{dm:true,reply:true,proposal:true}},proposal:{phase:1,contact:{dm:true,reply:true,proposal:true}},decided:{phase:2,sample:{decided:true}},delivery_info:{phase:2,sample:{decided:true,info:true}},sample_req:{phase:2,sample:{decided:true,info:true}},tracking:{phase:2,sample:{decided:true,info:true,sent:true,tracking:true}},delivery_ok:{phase:2,sample:{decided:true,info:true,sent:true,tracking:true,received:true}},sch_set:{phase:3,operation:{schedule:true}},link_sent:{phase:3,operation:{schedule:true}},ongoing:{phase:3,operation:{schedule:true,ongoing:true}},done:{phase:4,closing:{done:true}},settle_soon:{phase:4,closing:{done:true,settlement_info:true}},settled:{phase:4,closing:{done:true,settlement_info:true,settled:true}}};
  const mapping=sm[inf.stage]||{phase:1};
  const cl={contact:{},sample:{},operation:{},closing:{}};
  const phKey=PM[mapping.phase].key;
  Object.assign(cl[phKey],mapping[phKey]||{});
  return{...inf,phase:mapping.phase,checklist:cl,recipient_name:inf.sampleRecipient||inf.recipient_name||'',recipient_phone:inf.samplePhone||inf.recipient_phone||'',recipient_address:inf.sampleAddress||inf.recipient_address||'',sample_detail:inf.sampleProduct||inf.sample_detail||'',instagramUrl:inf.instagramUrl||inf.channel_url||''};
}

// ══════════════════════════════════════════════
// 4. PRODUCT COLOR SYSTEM
// ══════════════════════════════════════════════
const PALETTE=['#E53935','#D81B60','#7B1FA2','#4527A0','#1565C0','#0277BD','#00838F','#2E7D32','#558B2F','#F9A825','#EF6C00','#D84315','#4E342E','#37474F','#880E4F','#1A237E','#006064','#1B5E20','#E65100','#BF360C'];
let _pcMap={};
try{_pcMap=JSON.parse(localStorage.getItem('pc_v4')||'{}');}catch{}
function getPC(name){
  if(!name)return'#1E88E5';
  const k=name.trim().toLowerCase();
  if(_pcMap[k])return _pcMap[k];
  const used=new Set(Object.values(_pcMap));
  const next=PALETTE.find(c=>!used.has(c))||PALETTE[Object.keys(_pcMap).length%PALETTE.length];
  _pcMap[k]=next;localStorage.setItem('pc_v4',JSON.stringify(_pcMap));return next;
}
function warmPC(infs){infs.forEach(i=>{const p=i.negotiating_product||i.product;if(p)getPC(p);});}
function getProductLegend(infs){const seen=new Map();infs.forEach(i=>{const p=i.negotiating_product||i.product;if(p&&i.scheduleDate)seen.set(p.trim(),getPC(p));});return[...seen.entries()].map(([name,color])=>({name,color}));}

// ══════════════════════════════════════════════
// 5. IndexedDB — TWO STORES
// ══════════════════════════════════════════════
const DB_NAME='gm_v4';const DB_VER=1;
const INF_STORE='influencers';const TASK_STORE='personal_tasks';
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(INF_STORE))d.createObjectStore(INF_STORE,{keyPath:'id'});
      if(!d.objectStoreNames.contains(TASK_STORE))d.createObjectStore(TASK_STORE,{keyPath:'id'});
    };
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=e=>rej(e.target.error);
  });
}
const dbAll  = store=>new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const req=tx.objectStore(store).getAll();req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);});
const dbPut  = (store,item)=>new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const req=tx.objectStore(store).put(item);req.onsuccess=()=>res();req.onerror=()=>rej(req.error);});
const dbDel  = (store,id)=>new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const req=tx.objectStore(store).delete(id);req.onsuccess=()=>res();req.onerror=()=>rej(req.error);});
const dbClear= store=>new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const req=tx.objectStore(store).clear();req.onsuccess=()=>res();req.onerror=()=>rej(req.error);});
const dbCount= store=>new Promise(res=>{const tx=db.transaction(store,'readonly');const req=tx.objectStore(store).count();req.onsuccess=()=>res(req.result);req.onerror=()=>res(0);});

// ══════════════════════════════════════════════
// 6. BACKUP / RESTORE
// ══════════════════════════════════════════════
async function exportData(){
  const infs=await dbAll(INF_STORE);const tasks=await dbAll(TASK_STORE);
  const blob=new Blob([JSON.stringify({version:4,exportDate:new Date().toISOString(),influencers:infs,tasks},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  const d=new Date();a.href=url;a.download=`공구매니저_백업_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;a.click();URL.revokeObjectURL(url);
  showToast(`✅ 백업 완료 (인플루언서 ${infs.length}명 + 업무 ${tasks.length}건)`);
}
async function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const json=JSON.parse(e.target.result);
      const infs=(json.influencers||json.data||[]).map(migrateInf);
      const tasks=json.tasks||[];
      if(!Array.isArray(infs))throw new Error();
      if(!confirm(`인플루언서 ${infs.length}명 + 업무일정 ${tasks.length}건을 불러올까요?`))return;
      for(const i of infs)await dbPut(INF_STORE,i);
      for(const t of tasks)await dbPut(TASK_STORE,t);
      data=await dbAll(INF_STORE);pTasks=await dbAll(TASK_STORE);render();showToast(`✅ 불러오기 완료!`);
    }catch{alert('파일 형식이 올바르지 않아요.');}
    event.target.value='';
  };reader.readAsText(file);
}

// ══════════════════════════════════════════════
// 7. GOOGLE DRIVE SYNC
// ══════════════════════════════════════════════
const GD_FILE='공구매니저_데이터.json';const GD_SCOPE='https://www.googleapis.com/auth/drive.file';
let gdClientId=localStorage.getItem('gd_client_id')||'';
let gdFileId=localStorage.getItem('gd_file_id')||'';
let isGD=false,isSyncing=false,tokenClient=null,gapiReady=false,gisReady=false;

// Called by google api.js onload attribute (defined before the script tag)
function onGapiLoad(){gapi.load('client',async()=>{await gapi.client.init({});await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');gapiReady=true;maybeAutoConnect();});}
function onGisLoad(){gisReady=true;maybeAutoConnect();}
function maybeAutoConnect(){if(!gapiReady||!gisReady||!gdClientId)return;setupTC();tokenClient.requestAccessToken({prompt:''});}
function setupTC(){if(!window.google?.accounts?.oauth2)return;tokenClient=google.accounts.oauth2.initTokenClient({client_id:gdClientId,scope:GD_SCOPE,callback:handleToken,error_callback:err=>{if(err.type==='popup_closed'||err.type==='popup_failed_to_open')return;isGD=false;updateGD();}});}
async function handleToken(resp){if(resp.error){isGD=false;updateGD();return;}isGD=true;gapi.client.setToken({access_token:resp.access_token});updateGD();await gdLoad();render();showToast('☁️ 구글드라이브 연동 완료!',3000);}
function gdConnect(){if(isGD){gdDisconnect();return;}if(!gdClientId){showGDModal();return;}if(!gapiReady||!gisReady){showToast('⏳ API 로딩 중...');return;}setupTC();tokenClient.requestAccessToken({prompt:'consent'});}
async function gdDisconnect(){if(!confirm('연동 해제할까요? 로컬 데이터는 유지됩니다.'))return;const t=gapi.client.getToken();if(t)google.accounts.oauth2.revoke(t.access_token,()=>{});gapi.client.setToken(null);isGD=false;updateGD();render();showToast('🔌 드라이브 연동 해제됨');}
async function gdLoad(){
  if(!isGD)return;isSyncing=true;updateGD();
  try{
    if(!gdFileId){const r=await gapi.client.drive.files.list({q:`name='${GD_FILE}' and trashed=false`,fields:'files(id)',spaces:'drive',pageSize:1});const f=r.result.files;if(f&&f.length){gdFileId=f[0].id;localStorage.setItem('gd_file_id',gdFileId);}}
    if(gdFileId){
      const r=await gapi.client.drive.files.get({fileId:gdFileId,alt:'media'});
      const json=JSON.parse(r.body);
      const driveInfs=(json.influencers||json||[]).map(migrateInf);
      const driveTasks=json.tasks||[];
      const localInfs=await dbAll(INF_STORE);const localTasks=await dbAll(TASK_STORE);
      const mInfs=mergeArr(localInfs,driveInfs);const mTasks=mergeArr(localTasks,driveTasks);
      await dbClear(INF_STORE);for(const i of mInfs)await dbPut(INF_STORE,i);
      await dbClear(TASK_STORE);for(const t of mTasks)await dbPut(TASK_STORE,t);
      data=mInfs;pTasks=mTasks;
    }else await gdSaveNow();
  }catch(e){console.error('GDrive load:',e);showToast('⚠️ 드라이브 동기화 실패 (로컬 사용)');}
  isSyncing=false;updateGD();
}
let _gdT=null;
function gdSave(){if(!isGD)return;clearTimeout(_gdT);_gdT=setTimeout(gdSaveNow,1200);}
async function gdSaveNow(){
  if(!isGD)return;isSyncing=true;updateGD();
  try{
    const content=JSON.stringify({version:4,influencers:data,tasks:pTasks});
    const b='gm_boundary';
    const body=[`--${b}`,'Content-Type: application/json; charset=UTF-8','',JSON.stringify({name:GD_FILE,mimeType:'application/json'}),`--${b}`,'Content-Type: application/json','',content,`--${b}--`].join('\r\n');
    if(gdFileId){await gapi.client.request({path:`/upload/drive/v3/files/${gdFileId}`,method:'PATCH',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${b}`},body});}
    else{const r=await gapi.client.request({path:'/upload/drive/v3/files',method:'POST',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${b}`},body});gdFileId=r.result.id;localStorage.setItem('gd_file_id',gdFileId);}
  }catch(e){console.error('GDrive save:',e);showToast('⚠️ 드라이브 저장 실패 (로컬에는 저장됨)');}
  isSyncing=false;updateGD();
}
function mergeArr(local,remote){const map={};[...remote,...local].forEach(item=>{const ex=map[item.id];if(!ex){map[item.id]=item;return;}const et=new Date(ex.updatedAt||ex.createdAt||0).getTime();const nt=new Date(item.updatedAt||item.createdAt||0).getTime();if(nt>=et)map[item.id]=item;});return Object.values(map);}

function infTasks(infs){
  const t=today();const tasks=[];
  infs.forEach(inf=>{
    const base={iid:inf.id,name:inf.name,insta:inf.instagram||'',product:inf.negotiating_product||inf.product||''};
    const p=getNextAction(inf);if(p)tasks.push({...base,date:t,...p});
    const sd=inf.settlement_date||autoSettlementDate(inf);
    if(sd){const cl=getChecklist(inf);if(!cl.closing.settled&&inf.phase===4)tasks.push({...base,date:sd,cat:'settlement',action:`정산 진행 (${fmt(sd)})`,urgent:diff(sd)!==null&&diff(sd)<=3});}
  });
  return tasks;
}
function filteredTasks(tasks,t){
  const d=today();
  if(t==='오늘')   return tasks.filter(x=>x.date===d);
  if(t==='내일')   return tasks.filter(x=>x.date===addD(1));
  if(t==='이번주') return tasks.filter(x=>x.date>=d&&x.date<=addD(7));
  if(t==='이번달') return tasks.filter(x=>x.date>=d&&x.date<=addD(30));
  return[];
}
function filteredPTasks(tab){
  const d=today();
  const active=pTasks.filter(t=>!t.done);
  if(tab==='오늘')   return active.filter(t=>t.date===d);
  if(tab==='내일')   return active.filter(t=>t.date===addD(1));
  if(tab==='이번주') return active.filter(t=>t.date>=d&&t.date<=addD(7));
  if(tab==='이번달') return active.filter(t=>t.date>=d&&t.date<=addD(30));
  return[];
}

function buildCalEvents(){
  const spans=[],points=[];
  data.forEach(inf=>{
    const pc=getPC(inf.negotiating_product||inf.product);
    if(inf.scheduleDate){const e=inf.scheduleEndDate||inf.scheduleDate;spans.push({id:inf.id,label:`${inf.name} · ${inf.negotiating_product||inf.product||''}`,shortLabel:inf.name,start:inf.scheduleDate,end:e,color:pc,textColor:'#fff',cat:'gonggu'});}
    if(inf.sampleSentDate){const track=inf.trackingNumber?` (${inf.trackingNumber})`:'';points.push({id:inf.id,label:`샘플발송 · ${inf.name}${track}`,shortLabel:`샘플 · ${inf.name}`,date:inf.sampleSentDate,color:'#FB8C00',textColor:'#fff',cat:'work'});points.push({id:inf.id,label:`배송확인 · ${inf.name}`,shortLabel:`배송확인 · ${inf.name}`,date:addD(2,inf.sampleSentDate),color:'#FF7043',textColor:'#fff',cat:'work'});}
    const sd=inf.settlement_date||autoSettlementDate(inf);
    if(sd){const cl=getChecklist(inf);if(!cl.closing.settled)points.push({id:inf.id,label:`정산 · ${inf.name}`,shortLabel:`정산 · ${inf.name}`,date:sd,color:'#43A047',textColor:'#fff',cat:'work'});}
  });
  // Personal tasks on calendar
  pTasks.filter(t=>!t.done&&t.date).forEach(t=>{
    const c=CAT_COLORS[t.category]||'#94A3B8';
    points.push({id:t.id,label:`${t.category} · ${t.title}`,shortLabel:t.title,date:t.date,color:c,textColor:'#fff',cat:'work',isPersonal:true});
  });
  return{spans,points};
}

// Smart briefing
function getBriefing(){
  const t=today(),tom=addD(1);const items=[];
  const sampleToday=data.filter(inf=>{const cl=getChecklist(inf);return inf.phase===2&&cl.sample.info&&!cl.sample.sent;});
  if(sampleToday.length)items.push({text:`샘플 발송 ${sampleToday.length}명 — ${sampleToday.map(i=>i.name).join(', ')}`,color:'#FB8C00'});
  const settleNow=data.filter(inf=>{const sd=inf.settlement_date||autoSettlementDate(inf);const cl=getChecklist(inf);return sd&&!cl.closing.settled&&inf.phase===4&&diff(sd)!==null&&diff(sd)<=3&&diff(sd)>=0;});
  if(settleNow.length)items.push({text:`정산 처리 ${settleNow.length}건 — ${settleNow.map(i=>i.name).join(', ')}`,color:'#43A047'});
  const gStart=data.filter(inf=>inf.scheduleDate&&(inf.scheduleDate===t||inf.scheduleDate===tom));
  if(gStart.length)items.push({text:`공구 시작 ${gStart.length}건 — ${gStart.map(i=>i.name).join(', ')}`,color:'#2563EB'});
  const todayPT=pTasks.filter(t=>!t.done&&t.date===today());
  if(todayPT.length)items.push({text:`오늘 업무일정 ${todayPT.length}건 — ${todayPT.map(t=>t.title).join(', ')}`,color:'#6366F1'});
  return items;
}

      <div style="min-width:0"><div style="font-size:12px;font-weight:700">${t2.title}</div><div style="font-size:11px;color:#94A3B8">${t2.category}</div></div>
    </div>`;}).join('')}

// ── CALENDAR ──
function rCal(){
  warmPC(data);
  const{spans,points}=buildCalEvents();
  // Filter by mode
  const modeSpans  = calMode==='gonggu' ? spans  : [];
  const modePoints = calMode==='work'   ? points : [];

  const first=new Date(calY,calM,1);const lastDate=new Date(calY,calM+1,0).getDate();const dow=first.getDay();
  const pm=new Date(calY,calM,0).getDate();
  let cells=[];
  for(let i=dow-1;i>=0;i--)cells.push({d:pm-i,dim:true,date:null});
  for(let d=1;d<=lastDate;d++){const m=(calM+1).toString().padStart(2,'0');const dd=d.toString().padStart(2,'0');cells.push({d,dim:false,date:`${calY}-${m}-${dd}`});}
  while(cells.length%7)cells.push({d:cells.length-dow-lastDate+1,dim:true,date:null});
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
  const t=today();

  const weeksHTML=weeks.map(wk=>{
    const wkD=wk.map(c=>c.date).filter(Boolean);const ws=wkD[0],we=wkD[wkD.length-1];
    if(!ws)return`<div class="cal-week">${wk.map(c=>cellH(c,t)).join('')}</div>`;
    const activeSpans=modeSpans.filter(sp=>sp.start<=we&&sp.end>=ws);
    const rows=[];
    activeSpans.forEach(sp=>{
      const sc=sp.start<ws?0:wk.findIndex(c=>c.date===sp.start);const ec=sp.end>we?6:wk.findLastIndex(c=>c.date===sp.end);
      const s=sc<0?0:sc,e=ec<0?6:ec;
      for(let r=0;r<5;r++){if(!rows[r])rows[r]=[];if(!rows[r].some(x=>!(x.e<s||x.s>e))){rows[r].push({sp,s,e});break;}}
    });
    const ptsByDay={};
    modePoints.forEach(pt=>{if(pt.date>=ws&&pt.date<=we){if(!ptsByDay[pt.date])ptsByDay[pt.date]=[];ptsByDay[pt.date].push(pt);}});
    const cw=100/7;let bars='';
    rows.forEach((row,ri)=>{row.forEach(({sp,s,e})=>{
      const left=(s*cw).toFixed(2)+'%';const width=((e-s+1)*cw-.3).toFixed(2)+'%';const top=(ri*23+2)+'px';
      const isS=sp.start>=ws,isE=sp.end<=we;const r2=isS&&isE?'5px':isS?'5px 2px 2px 5px':isE?'2px 5px 5px 2px':'2px';
      const lbl=isS?`${sp.label} ${sp.start===sp.end?fmt(sp.start):`${fmt(sp.start)}~${fmt(sp.end)}`}`:'';
      bars+=`<div class="ev-bar" onclick="openEdit('${sp.id}')" style="left:${left};width:${width};top:${top};background:${sp.color};color:${sp.textColor};border-radius:${r2}">${lbl}</div>`;
    });});
    const ptRow=rows.length;
    wk.forEach((cell,ci)=>{if(!cell.date)return;(ptsByDay[cell.date]||[]).forEach((pt,pi)=>{
      const top=((ptRow+pi)*23+2)+'px';const left=(ci*cw).toFixed(2)+'%';const width=(cw-.3).toFixed(2)+'%';
      const clickFn=pt.isPersonal?`openTaskEdit('${pt.id}')`:`openEdit('${pt.id}')`;
      bars+=`<div class="ev-dot" onclick="${clickFn}" style="left:${left};width:${width};top:${top};background:${pt.color};color:${pt.textColor}">${pt.shortLabel}</div>`;
    });});
    const maxR=ptRow+Math.max(0,...Object.values(ptsByDay).map(a=>a.length),0);
    const mh=Math.max(72,30+maxR*23+4);
    return`<div class="cal-week" style="min-height:${mh}px">${wk.map(c=>cellH(c,t)).join('')}<div class="ev-layer">${bars}</div></div>`;
  }).join('');

  // Selected day events
  const selEvs=[];
  if(selDate){
    modeSpans.forEach(sp=>{if(sp.start<=selDate&&selDate<=sp.end)selEvs.push({...sp,isSpan:true});});
    modePoints.forEach(pt=>{if(pt.date===selDate)selEvs.push({...pt,isSpan:false});});
  }
  const selD=selDate?new Date(selDate+'T00:00:00'):null;
  const selLbl=selD?`${selD.getMonth()+1}월 ${selD.getDate()}일 ${DAYS_[selD.getDay()]}요일`:'';

  const ddInner=selEvs.length
    ?`<div class="dd-head">📌 ${selLbl} · ${selEvs.length}건</div>
      ${selEvs.map(e=>`<div class="dd-ev" style="background:${e.color}15" onclick="${e.isPersonal?`openTaskEdit('${e.id}')`:`openEdit('${e.id}')`}">
        <div class="dd-ev-dot" style="background:${e.color}"></div>
        <div><div class="dd-ev-action" style="color:${e.color}">${e.isSpan?'공구 기간':e.label.split(' · ')[0]}</div>
        <div class="dd-ev-meta">${e.label}</div>
        ${e.isSpan&&e.start!==e.end?`<div class="dd-ev-meta">${fmt(e.start)} ~ ${fmt(e.end)}</div>`:''}</div>
      </div>`).join('')}`
    :(selDate?`<div class="dd-head">🗓️ ${selLbl}</div><div style="font-size:12px;color:#94A3B8;padding:8px 0">일정 없음</div>`:'');

  // Legend
  const prodLeg=calMode==='gonggu'?getProductLegend(data).map(p=>`<div class="leg-item"><div class="leg-dot" style="background:${p.color}"></div><span style="max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span></div>`).join(''):'';
  const workLeg=calMode==='work'?`
    <div class="leg-item"><div class="leg-dot" style="background:#FB8C00"></div>샘플</div>
    <div class="leg-item"><div class="leg-dot" style="background:#43A047"></div>정산</div>
    ${Object.entries(CAT_COLORS).map(([k,v])=>`<div class="leg-item"><div class="leg-dot" style="background:${v}"></div>${k}</div>`).join('')}`:'';

  // PC: cal-full-wrap with side panel; Mobile: stacked
  const modeToggle=`<div class="cal-mode-row"><button class="cal-mode-btn${calMode==='gonggu'?' active':''}" onclick="setCalMode('gonggu')">🛍️ 공구 캘린더</button><button class="cal-mode-btn${calMode==='work'?' active':''}" onclick="setCalMode('work')">📝 업무 캘린더</button></div>`;
  const navRow=`<div class="cal-nav-row"><button class="cal-arr" onclick="calMove(-1)">‹</button><span class="cal-month-lbl">${calY}년 ${MONTHS_[calM]}</span><button class="cal-arr" onclick="calMove(1)">›</button></div>`;
  const legRow=`<div class="legend-row">${prodLeg}${workLeg}</div>`;
  const calGridHTML=`<div class="cal-grid"><div class="cal-dow">${['일','월','화','수','목','금','토'].map(d=>`<div>${d}</div>`).join('')}</div><div class="cal-weeks">${weeksHTML}</div></div>`;
  const dayDetailHTML=ddInner?`<div class="day-detail">${ddInner}</div>`:'';

  return`
    <div class="cal-full-wrap">
      <div class="cal-top-bar">
        ${modeToggle}
        ${legRow}
        ${navRow}
      </div>
      <div class="cal-body">
        <div class="cal-main-area">${calGridHTML}</div>
        <div class="cal-side-panel${selEvs.length?' open':''}" id="cal-panel">
          <div class="cal-side-inner">${ddInner}</div>
        </div>
      </div>
      <div id="mob-day-detail">${dayDetailHTML}</div>
    </div>`;
}
function cellH(cell,t){const isTd=cell.date===t,isSel=cell.date===selDate;return`<div class="cal-cell${isTd?' today':''}${isSel&&!isTd?' sel':''}${cell.dim?' dim':''}" onclick="${cell.date?`selectDate('${cell.date}')`:''}" ><div class="day-num">${cell.d}</div></div>`;}
function calMove(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}rContent();}
function selectDate(d){selDate=d;rContent();}
function setCalMode(m){calMode=m;rContent();}

  return`<input class="search-box" placeholder="이름 · 인스타 · 제품 · 별명 검색" value="${srch}" oninput="setSrch(this.value)">${chips}${cards}<button class="fab" onclick="openAdd()">＋</button>`;

  </div>`;
  document.body.appendChild(ov);
}

async function toggleCk(phId,key,infId){

function closeInfModal(){closeId('inf-modal');editInf=null;modalPh=null;_mi={};render();}

// ══════════════════════════════════════════════
// 14. PERSONAL TASK MODAL
// ══════════════════════════════════════════════
function openTaskAdd(){editTask=null;showTaskModal();}
function openTaskEdit(id){editTask=pTasks.find(x=>x.id===id)||null;showTaskModal();}

function showTaskModal(){
  const isNew=!editTask;
  const t=editTask||{id:uid(),title:'',date:'',time:'',category:'미팅',notes:'',done:false,createdAt:new Date().toISOString()};
  const ov=mkOverlay('task-modal');
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()"><div class="m-handle"></div>
    <div class="m-head">${isNew?'📝 업무 일정 추가':'✏️ 업무 일정 수정'}<button class="m-x" onclick="closeId('task-modal')">✕</button></div>
    <div class="m-sub">공구와 무관한 개인 업무 일정을 관리해요</div>
    <div class="fsec" style="border-color:#F1F5F9">
      <div class="field"><label>제목 *</label><input id="t-title" value="${t.title}" placeholder="미팅, 업체 연락, 개인 메모 등"></div>
      <div class="field-row">
        <div class="field"><label>날짜</label><input type="date" id="t-date" value="${t.date}"></div>
        <div class="field"><label>시간 (선택)</label><input type="time" id="t-time" value="${t.time||''}"></div>
      </div>
      <div class="field"><label>카테고리</label>
        <select id="t-cat">${TASK_CATS.map(c=>`<option${c===t.category?' selected':''}>${c}</option>`).join('')}</select>
      </div>
      <div class="field"><label>메모 (선택)</label><textarea id="t-notes">${t.notes||''}</textarea></div>
      ${!isNew?`<div class="field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="t-done" ${t.done?'checked':''} style="width:16px;height:16px;accent-color:#10B981"> 완료 처리</label></div>`:''}
    </div>
    <div class="btn-row">${!isNew?`<button class="btn-del" onclick="delPTask('${t.id}')">삭제</button>`:''}
    <button class="btn-cancel" onclick="closeId('task-modal')">취소</button>
    <button class="btn-save" onclick="savePTask('${t.id}')">저장 ✓</button></div>
  </div>`;
  document.body.appendChild(ov);
}

async function savePTask(id){
  const gv=i=>{const e=document.getElementById(i);return e?e.type==='checkbox'?e.checked:e.value:''};
  const task={id,title:gv('t-title')||'제목 없음',date:gv('t-date'),time:gv('t-time'),category:gv('t-cat'),notes:gv('t-notes'),done:gv('t-done')||false,createdAt:editTask?.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()};
  await dbPut(TASK_STORE,task);pTasks=await dbAll(TASK_STORE);gdSave();showToast('✅ 업무 일정 저장됐어요!');closeId('task-modal');render();
}
async function delPTask(id){if(!confirm('삭제할까요?'))return;await dbDel(TASK_STORE,id);pTasks=await dbAll(TASK_STORE);gdSave();showToast('🗑️ 삭제됐어요');closeId('task-modal');render();}
async function togglePTask(id){const t=pTasks.find(x=>x.id===id);if(!t)return;const u={...t,done:!t.done,updatedAt:new Date().toISOString()};await dbPut(TASK_STORE,u);pTasks=await dbAll(TASK_STORE);gdSave();render();}

// ══════════════════════════════════════════════
// 15. BADGE FILTER MODAL
// ══════════════════════════════════════════════
function showBadgeModal(type){
  const cfgMap={active:{title:'📋 진행중 인플루언서',color:'#4F46E5',desc:'마감 이전 단계 전체'},ongoing:{title:'🛍️ 공구 진행중',color:'#2563EB',desc:'현재 공구 운영 단계'},urgent:{title:'🔴 긴급 처리 필요',color:'#EF4444',desc:'정산 3일 이내 또는 샘플 발송 필요'}};
  const cfg=cfgMap[type];let filtered=[];
  if(type==='active')filtered=data.filter(d=>{const cl=getChecklist(d);return d.phase<4||(d.phase===4&&!cl.closing.next_recommend);});
  else if(type==='ongoing')filtered=data.filter(d=>{const cl=getChecklist(d);return d.phase===3&&cl.operation.ongoing;});
  else if(type==='urgent')filtered=data.filter(d=>{const cl=getChecklist(d);const sd=d.settlement_date||autoSettlementDate(d);const settleSoon=sd&&!cl.closing.settled&&d.phase===4&&diff(sd)!==null&&diff(sd)<=3&&diff(sd)>=-3;const needSample=d.phase===2&&cl.sample.info&&!cl.sample.sent;return settleSoon||needSample;});
  const listHTML=filtered.length?filtered.map(inf=>{const ph=PM[inf.phase||1];const p=getNextAction(inf);return`<div class="bm-item" style="border-left-color:${ph.color}" onclick="closeBadgeModal();openEdit('${inf.id}')"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span style="font-size:14px;font-weight:800">${inf.name}</span><span style="font-size:10px;font-weight:700;background:${ph.bg};color:${ph.color};padding:2px 7px;border-radius:7px">${ph.id}. ${ph.label}</span></div><div style="font-size:11px;color:#94A3B8;margin-bottom:3px">${inf.instagram||''}${inf.negotiating_product||inf.product?` · ${inf.negotiating_product||inf.product}`:''}</div>${p?`<div style="font-size:12px;font-weight:600;color:${p.urgent?'#EF4444':'#475569'}">→ ${p.action}</div>`:''}</div>${inf.scheduleDate?`<div style="text-align:right;flex-shrink:0"><div style="font-size:10px;font-weight:800;color:#2563EB">${fmt(inf.scheduleDate)}</div><div style="font-size:9px;color:#94A3B8">공구</div></div>`:''}</div>`;}).join(''):`<div class="empty-state"><div class="empty-ico">✅</div><div class="empty-tit">해당 항목이 없어요</div></div>`;
  const ov=mkOverlay('badge-modal');
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()"><div class="m-handle"></div><div class="m-head" style="color:${cfg.color}">${cfg.title}<button class="m-x" onclick="closeBadgeModal()">✕</button></div><div style="font-size:12px;color:#94A3B8;margin-bottom:14px">${cfg.desc} · <b style="color:${cfg.color}">${filtered.length}명</b></div>${listHTML}</div>`;
  document.body.appendChild(ov);
}
function closeBadgeModal(){closeId('badge-modal');}

// ══════════════════════════════════════════════
// 16. INIT
// ══════════════════════════════════════════════
async function init(){
  await openDB();
  const raw=await dbAll(INF_STORE);
  data=raw.map(migrateInf);
  for(const item of data)await dbPut(INF_STORE,item);
  pTasks=await dbAll(TASK_STORE);
  warmPC(data);
  render();
}
init();
</script>
