<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공구 매니저 v5</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   BASE
════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#ECEEF5;color:#1E293B;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}

/* ════════════════════════════════════════
   LAYOUT SHELL
════════════════════════════════════════ */
.shell{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{
  display:none;
  width:210px;flex-shrink:0;
  background:linear-gradient(180deg,#1E1B4B 0%,#312E81 60%,#4C1D95 100%);
  flex-direction:column;
  position:fixed;top:0;left:0;height:100vh;z-index:200;overflow-y:auto;
}
.sb-logo{padding:22px 16px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-title{font-size:15px;font-weight:900;color:white;display:flex;align-items:center;gap:8px}
.sb-logo-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:3px}
.sb-kpis{padding:12px 12px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;gap:5px}
.sb-kpi{background:rgba(255,255,255,.09);border-radius:8px;padding:8px 11px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
.sb-kpi:hover{background:rgba(255,255,255,.16)}
.sb-kpi-lbl{font-size:11px;color:rgba(255,255,255,.55);font-weight:600}
.sb-kpi-num{font-size:20px;font-weight:900;color:white}
.sb-kpi.urg{background:rgba(239,68,68,.18)}
.sb-nav{padding:10px 8px;flex:1;display:flex;flex-direction:column;gap:2px}
.sb-link{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:9px;border:none;background:none;cursor:pointer;font-family:inherit;color:rgba(255,255,255,.6);font-size:13px;font-weight:600;text-align:left;width:100%;transition:all .15s;position:relative}
.sb-link:hover{background:rgba(255,255,255,.08);color:white}
.sb-link.on{background:rgba(255,255,255,.15);color:white}
.sb-link-ico{font-size:16px;width:20px;text-align:center}
.sb-nb{background:#EF4444;color:white;border-radius:8px;font-size:9px;font-weight:800;padding:1px 5px;margin-left:auto}
.sb-foot{padding:10px 8px 18px;border-top:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;gap:5px;margin-top:auto}
.sb-action{padding:10px;border-radius:9px;border:2px solid rgba(255,255,255,.2);background:transparent;color:white;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;width:100%;text-align:left;padding-left:12px}
.sb-action:hover{background:rgba(255,255,255,.1)}
.sb-tool{padding:7px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.6);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s;width:100%}
.sb-tool:hover{background:rgba(255,255,255,.08);color:white}
.sb-gd{border-color:rgba(255,255,255,.28);color:rgba(255,255,255,.85);font-weight:700}
.sb-gd.on{border-color:#4ADE8060;background:rgba(74,222,128,.08);color:#4ADE80}
.sb-hint{font-size:10px;color:rgba(255,255,255,.25);text-align:center;padding-top:4px}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* MOBILE HEADER */
.mob-hdr{
  background:linear-gradient(135deg,#1E1B4B,#4C1D95);
  color:white;padding:13px 14px 15px;
  position:sticky;top:0;z-index:100;
}
.mob-hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mob-hdr-title{font-size:17px;font-weight:800}
.mob-acts{display:flex;gap:5px}
.mob-act{background:rgba(255,255,255,.18);border:none;border-radius:7px;padding:5px 8px;color:white;font-size:11px;font-weight:700;cursor:pointer}
.mob-gd.on{background:rgba(74,222,128,.2);color:#4ADE80}
.mob-kpis{display:flex;gap:6px;flex-wrap:wrap}
.mob-kpi{background:rgba(255,255,255,.14);border-radius:14px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}
.mob-kpi b{font-size:13px;display:block;font-weight:900}
.mob-kpi.urg{background:rgba(239,68,68,.25)}

/* PC TOPBAR */
.pc-topbar{display:none;padding:16px 22px 12px;align-items:center;justify-content:space-between;background:white;border-bottom:1px solid #E2E8F0;position:sticky;top:0;z-index:100}
.pc-tb-left .pc-tb-title{font-size:20px;font-weight:800}
.pc-tb-left .pc-tb-date{font-size:12px;color:#64748B;margin-top:2px}
.pc-tb-right{display:flex;align-items:center;gap:8px}
.pc-kpis{display:flex;gap:7px}
.pc-kpi{background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:9px;padding:7px 13px;font-size:11px;font-weight:700;color:#64748B;cursor:pointer;transition:all .15s}
.pc-kpi:hover{border-color:#A5B4FC;background:#EEF2FF}
.pc-kpi-n{font-size:17px;font-weight:900;display:block;color:#4F46E5}
.pc-kpi.urg .pc-kpi-n{color:#EF4444}
.pc-btns{display:flex;gap:6px}
.pc-btn{padding:7px 12px;border-radius:8px;border:1.5px solid #E2E8F0;background:white;color:#64748B;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.pc-btn:hover{border-color:#A5B4FC;color:#4F46E5}

/* PAGE */
.page{padding:14px;padding-bottom:88px;flex:1}

/* BOTTOM NAV */
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #E2E8F0;display:flex;padding:7px 0 max(7px,env(safe-area-inset-bottom));z-index:150;box-shadow:0 -2px 12px rgba(0,0,0,.07)}
.bot-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:3px 0;position:relative}
.bot-ico{font-size:18px}
.bot-lbl{font-size:10px;font-weight:700;color:#94A3B8}
.bot-btn.on .bot-lbl{color:#4F46E5}
.bot-nb{position:absolute;top:-1px;right:calc(50% - 16px);background:#EF4444;color:white;border-radius:8px;font-size:9px;font-weight:800;padding:1px 5px}
.fab{position:fixed;bottom:70px;right:14px;background:linear-gradient(135deg,#312E81,#4C1D95);color:white;border:none;border-radius:14px;width:50px;height:50px;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(79,70,229,.4);display:flex;align-items:center;justify-content:center;z-index:99}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1E293B;color:white;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;animation:sdp 1.5s infinite}
@keyframes sdp{0%,100%{opacity:1}50%{opacity:.3}}

/* ════════════════════════════════════════
   COMMAND CENTER DASHBOARD
════════════════════════════════════════ */
/* 3-column on wide PC */
.cmd-center{display:flex;flex-direction:column;gap:16px}

/* ── Section wrapper ── */
.cmd-section{background:white;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.cmd-section-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;border-bottom:2px solid #F1F5F9;position:sticky;top:0;background:white;z-index:10}
.cmd-section-hdr.urgent-hdr{border-bottom-color:#FCA5A5;background:#FFF5F5}
.cmd-section-hdr.gonggu-hdr{border-bottom-color:#BFDBFE;background:#EFF6FF}
.cmd-section-hdr.work-hdr{border-bottom-color:#BBF7D0;background:#F0FDF4}
.cmd-hdr-ico{font-size:20px}
.cmd-hdr-txt{}
.cmd-hdr-title{font-size:14px;font-weight:800}
.cmd-hdr-sub{font-size:11px;font-weight:600;margin-top:1px}
.cmd-hdr.urgent-hdr .cmd-hdr-title{color:#DC2626}
.cmd-hdr-sub.urg{color:#EF4444}
.cmd-hdr-sub.blue{color:#2563EB}
.cmd-hdr-sub.green{color:#059669}
.cmd-section-body{padding:10px 12px 14px;display:flex;flex-direction:column;gap:7px}

/* ── TODAY badge ── */
.today-badge{display:inline-flex;align-items:center;gap:4px;background:#FEE2E2;color:#DC2626;font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;margin-left:auto}

/* ── URGENT CARD ── */
.u-card{border-radius:11px;padding:12px 13px;border:1.5px solid transparent;display:flex;align-items:flex-start;gap:11px;cursor:pointer;transition:transform .1s,box-shadow .1s}
.u-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.u-card.is-today{border-color:#FECACA;background:linear-gradient(135deg,#FFF5F5,#FFF0F0)}
.u-card.is-future{background:#F8FAFC;border-color:#E2E8F0}
.u-card.is-personal{background:#F5F3FF;border-color:#DDD6FE}
.u-card-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;margin-top:1px}
.u-card-body{flex:1;min-width:0}
.u-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:4px}
.u-card-name{font-size:13px;font-weight:800;line-height:1.2}
.u-card-action{font-size:12px;font-weight:700;margin-bottom:3px;line-height:1.4}
.u-card-action.urgent-txt{color:#DC2626}
.u-card-meta{font-size:11px;color:#64748B;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.u-card-ph{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;flex-shrink:0}
.u-card-time{font-size:10px;color:#94A3B8;font-weight:600}
.u-card-memo{font-size:11px;color:#94A3B8;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}
.u-urg-dot{width:8px;height:8px;border-radius:50%;background:#EF4444;flex-shrink:0;margin-top:5px;animation:sdp 1s infinite}

/* ── GONGGU CARD ── */
.g-card{border-radius:11px;padding:12px 13px;cursor:pointer;transition:transform .1s,box-shadow .1s;border:1.5px solid transparent}
.g-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.09)}
.g-card.is-live{border-color:#93C5FD;background:linear-gradient(135deg,#EFF6FF,#EBF5FF)}
.g-card.is-today-start{border-color:#60A5FA;background:linear-gradient(135deg,#DBEAFE,#EFF6FF)}
.g-card.is-upcoming{background:#F8FAFC;border-color:#E2E8F0}
.g-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:6px}
.g-card-name{font-size:13px;font-weight:800}
.g-card-product{font-size:12px;font-weight:700;color:#2563EB;margin-bottom:5px}
.g-card-bar-wrap{height:8px;background:#E0EAFF;border-radius:4px;overflow:hidden;margin-bottom:5px}
.g-card-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.g-card-dates{display:flex;align-items:center;justify-content:space-between}
.g-card-date-lbl{font-size:11px;color:#64748B;font-weight:600}
.g-card-status{font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px}
.g-card-status.live{background:#DBEAFE;color:#1D4ED8}
.g-card-status.today{background:#FEE2E2;color:#DC2626}
.g-card-status.upcoming{background:#F1F5F9;color:#64748B}
.g-card-color-bar{height:4px;border-radius:4px 4px 0 0;margin:-12px -13px 10px;background:#E2E8F0}

/* ── WORK CARD (30-day tasks) ── */
.w-card{border-radius:11px;padding:11px 12px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:transform .1s,box-shadow .1s;border:1.5px solid transparent}
.w-card:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.08)}
.w-card.is-today{background:linear-gradient(135deg,#F0FDF4,#ECFDF5);border-color:#6EE7B7}
.w-card.is-future{background:#F8FAFC;border-color:#E2E8F0}
.w-card-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:1px}
.w-card-body{flex:1;min-width:0}
.w-card-date{font-size:10px;font-weight:800;color:#94A3B8;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.w-card-date.today-date{color:#059669;font-weight:900}
.w-card-title{font-size:13px;font-weight:700;margin-bottom:2px;line-height:1.3}
.w-card-sub{font-size:11px;color:#64748B;font-weight:600}
.w-card-memo{font-size:11px;color:#94A3B8;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}
.w-card-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.w-cat-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap}

/* Day group header */
.day-group-hdr{padding:6px 4px 4px;display:flex;align-items:center;gap:8px}
.day-group-date{font-size:12px;font-weight:800;color:#334155}
.day-group-date.today-grp{color:#DC2626}
.day-group-line{flex:1;height:1px;background:#E2E8F0}
.day-group-today-pill{background:#FEE2E2;color:#DC2626;font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px}

/* Empty state */
.empty-s{text-align:center;padding:32px 20px;color:#94A3B8}
.empty-s-ico{font-size:36px;margin-bottom:8px}
.empty-s-txt{font-size:13px;font-weight:700}

/* ════════════════════════════════════════
   CALENDAR
════════════════════════════════════════ */
.cal-mode-row{display:flex;gap:7px;margin-bottom:10px}
.cal-mode-btn{flex:1;padding:8px;border-radius:9px;border:2px solid #E2E8F0;background:white;font-size:12px;font-weight:700;color:#94A3B8;cursor:pointer;font-family:inherit;transition:all .15s}
.cal-mode-btn.on{border-color:#4F46E5;background:#EEF2FF;color:#4F46E5}
.legend-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.leg-it{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:#64748B}
.leg-dot{width:11px;height:7px;border-radius:3px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cal-arr{width:32px;height:32px;border-radius:8px;border:none;background:white;box-shadow:0 1px 5px rgba(0,0,0,.08);cursor:pointer;font-size:16px;color:#4F46E5;display:flex;align-items:center;justify-content:center}
.cal-month-lbl{font-size:16px;font-weight:800}
.cal-grid-wrap{background:white;border-radius:13px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:#F8FAFC;border-bottom:1px solid #F1F5F9}
.cal-dow-row div{text-align:center;font-size:10px;font-weight:700;color:#94A3B8;padding:7px 0}
.cal-dow-row div:first-child{color:#EF4444}
.cal-dow-row div:last-child{color:#6366F1}
.cal-weeks{display:flex;flex-direction:column}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid #F1F5F9;position:relative;min-height:68px}
.cal-cell{padding:3px 2px 2px;cursor:pointer}
.cal-cell:hover{background:#FAFBFF}
.cal-cell.today-cell .day-num{background:linear-gradient(135deg,#312E81,#4C1D95);color:white;border-radius:50%}
.cal-cell.sel-cell{background:#EEF2FF}
.cal-cell.dim-cell .day-num{color:#D1D5DB}
.day-num{font-size:11px;font-weight:700;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 2px;color:#1E293B}
.cal-cell:nth-child(7n+1) .day-num{color:#EF4444}
.cal-cell:nth-child(7n+1).today-cell .day-num,.cal-cell:nth-child(7n).today-cell .day-num{color:white}
.cal-cell:nth-child(7n) .day-num{color:#6366F1}
.ev-layer{position:absolute;top:27px;left:0;right:0;pointer-events:none}
.ev-bar{position:absolute;height:20px;display:flex;align-items:center;padding:0 5px;font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:all;cursor:pointer;border-radius:4px}
.ev-bar:hover{opacity:.85}
.ev-pt{position:absolute;height:18px;display:flex;align-items:center;padding:0 5px;font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:all;cursor:pointer;border-radius:4px}
.day-detail-panel{background:white;border-radius:13px;padding:14px;margin-top:10px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.dd-hdr{font-size:13px;font-weight:800;margin-bottom:10px}
.dd-ev{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:5px;cursor:pointer}
.dd-ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.dd-ev-action{font-size:12px;font-weight:800}
.dd-ev-meta{font-size:11px;color:#94A3B8;margin-top:1px}

/* ════════════════════════════════════════
   INF LIST
════════════════════════════════════════ */
.search-box{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #E2E8F0;font-size:13px;font-family:inherit;background:white;outline:none;margin-bottom:10px}
.search-box:focus{border-color:#6366F1}
.chip-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px}
.chip-row::-webkit-scrollbar{display:none}
.chip{padding:5px 10px;border-radius:15px;border:none;background:#F1F5F9;color:#64748B;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.chip.on{background:#4F46E5;color:white}
.inf-grid-wrap{display:block}
.inf-card{background:white;border-radius:12px;padding:12px 13px;margin-bottom:7px;cursor:pointer;box-shadow:0 1px 8px rgba(0,0,0,.05);border-left:4px solid #E2E8F0;transition:transform .1s,box-shadow .1s}
.inf-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.09)}
.inf-card.p1{border-left-color:#6366F1}
.inf-card.p2{border-left-color:#F59E0B}
.inf-card.p3{border-left-color:#2563EB}
.inf-card.p4{border-left-color:#10B981}
.inf-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.inf-name{font-size:14px;font-weight:800}
.inf-sub{font-size:11px;color:#94A3B8;margin-top:2px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.ph-badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.prog-txt{font-size:10px;font-weight:700;color:#94A3B8;text-align:right;margin-bottom:3px}
.prog-bar{height:4px;background:#F1F5F9;border-radius:3px;overflow:hidden;margin-bottom:7px}
.prog-fill{height:100%;border-radius:3px}
.nxt-box{display:flex;align-items:center;gap:5px;border-radius:7px;padding:5px 8px;margin-bottom:5px}
.nxt-txt{font-size:11px;font-weight:700}
.dtags{display:flex;gap:4px;flex-wrap:wrap}
.dtag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px}

/* ════════════════════════════════════════
   MODAL
════════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:white;border-radius:22px 22px 0 0;width:100%;max-width:660px;max-height:93vh;overflow-y:auto;padding:16px 16px 40px}
.m-hnd{width:32px;height:4px;background:#E2E8F0;border-radius:2px;margin:0 auto 14px}
.m-head{font-size:16px;font-weight:800;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.m-sub{font-size:12px;color:#94A3B8;margin-bottom:12px}
.m-x{width:28px;height:28px;border-radius:7px;border:none;background:#F1F5F9;color:#94A3B8;cursor:pointer;font-size:14px}
.ph-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px}
.ph-tab{padding:9px 3px;border-radius:10px;border:2px solid #E2E8F0;background:white;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}

</div><script>
// ════════════════════════════════════════
// 1. CONSTANTS
// ════════════════════════════════════════
const PHASES=[
  {id:1,key:'contact',   label:'컨택',ico:'📨',color:'#6366F1',bg:'#EEF2FF',
   checks:[{k:'dm',lbl:'DM 발송',cat:'contact',urg:false},{k:'reply',lbl:'답장 확인',cat:'contact',urg:true},{k:'proposal',lbl:'제품 제안',cat:'contact',urg:true},{k:'kakao',lbl:'카톡 연결',cat:'contact',urg:true}]},
  {id:2,key:'sample',    label:'샘플', ico:'📦',color:'#D97706',bg:'#FFFBEB',
   checks:[{k:'decided',lbl:'공구 결정',cat:'sample',urg:true},{k:'info',lbl:'샘플 정보 수집',cat:'sample',urg:true},{k:'sent',lbl:'샘플 발송',cat:'sample',urg:true},{k:'tracking',lbl:'송장번호 전달',cat:'sample',urg:false},{k:'received',lbl:'수령 확인',cat:'sample',urg:false}]},
  {id:3,key:'operation', label:'운영', ico:'🛍️',color:'#2563EB',bg:'#EFF6FF',
   checks:[{k:'schedule',lbl:'공구 일정 확정',cat:'groupbuy',urg:false},{k:'ongoing',lbl:'공구 진행 중',cat:'groupbuy',urg:false}]},
  {id:4,key:'closing',   label:'마감', ico:'💰',color:'#059669',bg:'#ECFDF5',
   checks:[{k:'done',lbl:'공구 완료',cat:'settlement',urg:false},{k:'settlement_info',lbl:'정산 일정 안내',cat:'settlement',urg:false},{k:'settled',lbl:'정산 완료',cat:'settlement',urg:true},{k:'next_recommend',lbl:'다음 제품 추천',cat:'contact',urg:false}]},
];
const PM=Object.fromEntries(PHASES.map(p=>[p.id,p]));
const CAT_META={contact:{lbl:'소통',ico:'💬',color:'#6366F1',bg:'#EEF2FF'},sample:{lbl:'샘플',ico:'📦',color:'#D97706',bg:'#FFFBEB'},groupbuy:{lbl:'공구',ico:'🛍️',color:'#2563EB',bg:'#EFF6FF'},settlement:{lbl:'정산',ico:'💰',color:'#059669',bg:'#ECFDF5'}};
const PTASK_CATS=['미팅','업체 연락','샘플 신청','개인 메모','기타'];
const PTASK_COLORS={'미팅':'#6366F1','업체 연락':'#D97706','샘플 신청':'#FB8C00','개인 메모':'#059669','기타':'#94A3B8'};
const DAYS_=['일','월','화','수','목','금','토'];
const MONTHS_=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

// ════════════════════════════════════════
// 2. HELPERS
// ════════════════════════════════════════
const uid   =()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today =()=>new Date().toISOString().split('T')[0];
const addD  =(n,b)=>{const d=new Date((b||today())+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]};
const fmt   =s=>{if(!s)return'';const d=new Date(s+'T00:00:00');return`${d.getMonth()+1}/${d.getDate()}`};
const fmtFull=s=>{if(!s)return'';const d=new Date(s+'T00:00:00');return`${d.getMonth()+1}월 ${d.getDate()}일 ${DAYS_[d.getDay()]}`;};
const diff  =s=>{if(!s)return null;const d=new Date(s+'T00:00:00');const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000)};
const fmtF  =n=>{if(!n)return'';const x=parseInt(n);return x>=10000?`${(x/10000).toFixed(1)}만명`:`${x.toLocaleString()}명`};

/** 중복 이름 에러 방지를 위해 변수형 도우미 이름을 변경함 **/
const calcAutoSettleDate =inf=>inf.scheduleEndDate?addD(30,inf.scheduleEndDate):'';

const getCL=inf=>{
  const cl=inf.checklist||{};
  return{
    contact:{dm:false,reply:false,proposal:false,kakao:false,...(cl.contact||{})},
    sample:{decided:false,info:false,sent:false,tracking:false,received:false,...(cl.sample||{})},
    operation:{schedule:false,ongoing:false,...(cl.operation||{})},
    closing:{done:false,settlement_info:false,settled:false,next_recommend:false,...(cl.closing||{})},
  };
};
const getTotalProg=inf=>{const cl=getCL(inf);let done=0,total=0;PHASES.forEach(p=>{p.checks.forEach(c=>{total++;if(cl[p.key][c.k])done++;});});return{done,total}};

function getNextAct(inf){
  const ph=PM[inf.phase||1];const cl=getCL(inf);const phCl=cl[ph.key];
  for(const c of ph.checks){
    if(!phCl[c.k]){
      if(c.k==='settled'){const sd=inf.settlement_date||calcAutoSettleDate(inf);return{cat:c.cat,action:`정산 진행${sd?` (${fmt(sd)})`:''}`,urg:sd?diff(sd)<=3:false};}
      return{cat:c.cat,action:c.lbl,urg:c.urg};
    }
  }
  if(inf.phase<4)return{cat:'contact',action:`${inf.phase+1}단계(${PM[inf.phase+1].label})로 이동`,urg:false};
  return null;
}

// ════════════════════════════════════════
// 3. MIGRATION
// ════════════════════════════════════════
function migrateInf(inf){
  if(inf.phase)return inf;
  const sm={dm_sent:{phase:1,contact:{dm:true}},replied:{phase:1,contact:{dm:true,reply:true}},kakao_req:{phase:1,contact:{dm:true,reply:true,proposal:true}},proposal:{phase:1,contact:{dm:true,reply:true,proposal:true}},decided:{phase:2,sample:{decided:true}},delivery_info:{phase:2,sample:{decided:true,info:true}},sample_req:{phase:2,sample:{decided:true,info:true}},tracking:{phase:2,sample:{decided:true,info:true,sent:true,tracking:true}},delivery_ok:{phase:2,sample:{decided:true,info:true,sent:true,tracking:true,received:true}},sch_set:{phase:3,operation:{schedule:true}},link_sent:{phase:3,operation:{schedule:true}},ongoing:{phase:3,operation:{schedule:true,ongoing:true}},done:{phase:4,closing:{done:true}},settle_soon:{phase:4,closing:{done:true,settlement_info:true}},settled:{phase:4,closing:{done:true,settlement_info:true,settled:true}}};
  const m=sm[inf.stage]||{phase:1};const cl={contact:{},sample:{},operation:{},closing:{}};
  const phKey=PM[m.phase].key;Object.assign(cl[phKey],m[phKey]||{});
  return{...inf,phase:m.phase,checklist:cl,recipient_name:inf.sampleRecipient||inf.recipient_name||'',recipient_phone:inf.samplePhone||inf.recipient_phone||'',recipient_address:inf.sampleAddress||inf.recipient_address||'',sample_detail:inf.sampleProduct||inf.sample_detail||'',instagramUrl:inf.instagramUrl||inf.channel_url||''};
}

// ════════════════════════════════════════
// 4. PRODUCT COLORS
// ════════════════════════════════════════
const PALETTE=['#C62828','#AD1457','#6A1B9A','#283593','#1565C0','#00695C','#2E7D32','#E65100','#4527A0','#00838F','#558B2F','#F9A825','#D84315','#37474F','#880E4F','#1A237E','#006064','#33691E','#BF360C','#4E342E'];
let _pc={};try{_pc=JSON.parse(localStorage.getItem('pc_v5')||'{}');}catch{}
function getPC(name){if(!name)return'#1E88E5';const k=name.trim().toLowerCase();if(_pc[k])return _pc[k];const used=new Set(Object.values(_pc));const next=PALETTE.find(c=>!used.has(c))||PALETTE[Object.keys(_pc).length%PALETTE.length];_pc[k]=next;localStorage.setItem('pc_v5',JSON.stringify(_pc));return next;}
function warmPC(infs){infs.forEach(i=>{const p=i.negotiating_product||i.product;if(p)getPC(p);});}
function getProductLegend(infs){const seen=new Map();infs.forEach(i=>{const p=i.negotiating_product||i.product;if(p&&i.scheduleDate)seen.set(p.trim(),getPC(p));});return[...seen.entries()].map(([n,c])=>({name:n,color:c}));}

// ════════════════════════════════════════
// 5. IndexedDB
// ════════════════════════════════════════
const DB_NAME='gm_v5',DB_VER=1,IS='influencers',TS='personal_tasks';
let db=null;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(IS))d.createObjectStore(IS,{keyPath:'id'});if(!d.objectStoreNames.contains(TS))d.createObjectStore(TS,{keyPath:'id'});};r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=e=>rej(e.target.error);});}
const dbAll=(s)=>new Promise((res,rej)=>{const t=db.transaction(s,'readonly');const r=t.objectStore(s).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
const dbPut=(s,item)=>new Promise((res,rej)=>{const t=db.transaction(s,'readwrite');const r=t.objectStore(s).put(item);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const dbDel=(s,id)=>new Promise((res,rej)=>{const t=db.transaction(s,'readwrite');const r=t.objectStore(s).delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const dbClear=(s)=>new Promise((res,rej)=>{const t=db.transaction(s,'readwrite');const r=t.objectStore(s).clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const dbCount=(s)=>new Promise(res=>{const t=db.transaction(s,'readonly');const r=t.objectStore(s).count();r.onsuccess=()=>res(r.result);r.onerror=()=>res(0);});

// ════════════════════════════════════════
// 6. BACKUP / RESTORE
// ════════════════════════════════════════
async function exportData(){
  const infs=await dbAll(IS);const tasks=await dbAll(TS);
  const blob=new Blob([JSON.stringify({version:5,exportDate:new Date().toISOString(),influencers:infs,tasks},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  const d=new Date();a.href=url;a.download=`공구매니저_백업_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;a.click();URL.revokeObjectURL(url);
  showToast(`✅ 백업 완료 (${infs.length}명 + 업무 ${tasks.length}건)`);
}
async function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const json=JSON.parse(e.target.result);
      const infs=(json.influencers||json.data||[]).map(migrateInf);
      const tasks=json.tasks||[];
      if(!confirm(`인플루언서 ${infs.length}명 + 업무 ${tasks.length}건 불러올까요?`))return;
      for(const i of infs)await dbPut(IS,i);
      for(const t of tasks)await dbPut(TS,t);
      data=await dbAll(IS);pTasks=await dbAll(TS);render();showToast('✅ 불러오기 완료!');
    }catch{alert('파일 형식이 올바르지 않아요.');}
    event.target.value='';
  };reader.readAsText(file);
}

// ════════════════════════════════════════
// 7. GOOGLE DRIVE SYNC
// ════════════════════════════════════════
const GD_FILE='공구매니저_데이터.json',GD_SCOPE='https://www.googleapis.com/auth/drive.file';
let gdClientId=localStorage.getItem('gd_client_id')||'';
let gdFileId=localStorage.getItem('gd_file_id')||'';
let isGD=false,isSyncing=false,tokenClient=null,gapiReady=false,gisReady=false;

// These functions are called via onload= attributes on the Google script tags at bottom of body
function onGapiLoad(){gapi.load('client',async()=>{await gapi.client.init({});await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');gapiReady=true;maybeAutoConnect();});}

function maybeAutoConnect(){if(!gapiReady||!gisReady||!gdClientId)return;setupTC();tokenClient.requestAccessToken({prompt:''});}

async function gdLoad(){
  if(!isGD)return;isSyncing=true;updateGD();
  try{
    if(!gdFileId){const r=await gapi.client.drive.files.list({q:`name='${GD_FILE}' and trashed=false`,fields:'files(id)',spaces:'drive',pageSize:1});const f=r.result.files;if(f&&f.length){gdFileId=f[0].id;localStorage.setItem('gd_file_id',gdFileId);}}
    if(gdFileId){
      const r=await gapi.client.drive.files.get({fileId:gdFileId,alt:'media'});
      const json=JSON.parse(r.body);
      const dInfs=(json.influencers||json||[]).map(migrateInf);
      const dTasks=json.tasks||[];
      const lInfs=await dbAll(IS);const lTasks=await dbAll(TS);
      const mInfs=mergeArr(lInfs,dInfs);const mTasks=mergeArr(lTasks,dTasks);
      await dbClear(IS);for(const i of mInfs)await dbPut(IS,i);
      await dbClear(TS);for(const t of mTasks)await dbPut(TS,t);
      data=mInfs;pTasks=mTasks;
    }else{await gdSaveNow();}
  }catch(e){console.error('GDrive load:',e);showToast('⚠️ 드라이브 동기화 실패 (로컬 사용)');}
  isSyncing=false;updateGD();
}
let _gdT=null;
function gdSave(){if(!isGD)return;clearTimeout(_gdT);_gdT=setTimeout(gdSaveNow,1500);}
async function gdSaveNow(){
  if(!isGD)return;isSyncing=true;updateGD();
  try{
    const content=JSON.stringify({version:5,influencers:data,tasks:pTasks});
    const b='gm5_boundary';
    const body=[`--${b}`,'Content-Type: application/json; charset=UTF-8','',JSON.stringify({name:GD_FILE,mimeType:'application/json'}),`--${b}`,'Content-Type: application/json','',content,`--${b}--`].join('\r\n');
    if(gdFileId){await gapi.client.request({path:`/upload/drive/v3/files/${gdFileId}`,method:'PATCH',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${b}`},body});}
    else{const r=await gapi.client.request({path:'/upload/drive/v3/files',method:'POST',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${b}`},body});gdFileId=r.result.id;localStorage.setItem('gd_file_id',gdFileId);}
  }catch(e){console.error('GDrive save:',e);showToast('⚠️ 드라이브 저장 실패');}
  isSyncing=false;updateGD();
}
function mergeArr(local,remote){const map={};[...remote,...local].forEach(item=>{const ex=map[item.id];if(!ex){map[item.id]=item;return;}const et=new Date(ex.updatedAt||ex.createdAt||0).getTime();const nt=new Date(item.updatedAt||item.createdAt||0).getTime();if(nt>=et)map[item.id]=item;});return Object.values(map);}

// Section 1: Urgent + Today
function buildUrgentItems(){
  const t=today();const items=[];
  data.forEach(inf=>{
    const na=getNextAct(inf);if(!na)return;
    const ph=PM[inf.phase||1];
    const isUrgent=na.urg;
    const sd=inf.settlement_date||calcAutoSettleDate(inf);
    // Always show today's tasks + urgent tasks
    const settleDue=sd&&diff(sd)!==null&&diff(sd)<=3&&diff(sd)>=-3&&inf.phase===4;
    const sampleDue=inf.phase===2&&getCL(inf).sample.info&&!getCL(inf).sample.sent;
    if(isUrgent||settleDue||sampleDue){
      items.push({
        type:'inf',id:inf.id,
        name:inf.name,
        product:inf.negotiating_product||inf.product||'',
        phase:ph,
        action:na.action,
        cat:na.cat,
        urg:true,
        date:t,
      });
    }
  });
  // Today personal tasks
  pTasks.filter(t2=>!t2.done&&t2.date===t).forEach(t2=>{
    items.push({type:'personal',id:t2.id,title:t2.title,category:t2.category,time:t2.time,notes:t2.notes,date:t2.date,urg:false});
  });
  return items;
}

// Section 2: Gonggu schedule 30 days
function buildGongguSchedule(){
  const t=today(),end=addD(30);
  return data
    .filter(inf=>inf.scheduleDate&&inf.scheduleEndDate&&inf.scheduleDate<=end)
    .sort((a,b)=>a.scheduleDate.localeCompare(b.scheduleDate))
    .map(inf=>({
      id:inf.id,
      name:inf.name,
      product:inf.negotiating_product||inf.product||'',
      start:inf.scheduleDate,
      end:inf.scheduleEndDate,
      color:getPC(inf.negotiating_product||inf.product),
      phase:PM[inf.phase||1],
    }));
}

// Section 3: All work tasks 30 days (inf operational + personal)
function buildWorkItems(){
  const t=today(),endDate=addD(30);
  const items=[];
  // Inf-related work tasks
  data.forEach(inf=>{
    const ph=PM[inf.phase||1];
    const na=getNextAct(inf);
    if(na){
      // Show non-urgent inf tasks in work section too
      items.push({
        type:'inf',id:inf.id,date:t,
        name:inf.name,product:inf.negotiating_product||inf.product||'',
        phase:ph,action:na.action,cat:na.cat,urg:na.urg,
      });
    }
    // Sample sent date tasks
    if(inf.sampleSentDate&&inf.sampleSentDate>=t&&inf.sampleSentDate<=endDate){
      items.push({type:'inf',id:inf.id,date:inf.sampleSentDate,name:inf.name,product:inf.negotiating_product||inf.product||'',phase:ph,action:'샘플 발송일',cat:'sample',urg:false});
    }
    // Settlement tasks
    const sd=inf.settlement_date||calcAutoSettleDate(inf);
    if(sd&&sd>=t&&sd<=endDate&&!getCL(inf).closing.settled&&inf.phase===4){
      items.push({type:'inf',id:inf.id,date:sd,name:inf.name,product:inf.negotiating_product||inf.product||'',phase:ph,action:`정산 예정 (${fmt(sd)})`,cat:'settlement',urg:diff(sd)<=3});
    }
  });
  // Personal tasks within 30 days
  pTasks.filter(t2=>!t2.done&&t2.date&&t2.date>=t&&t2.date<=endDate).forEach(t2=>{
    items.push({type:'personal',id:t2.id,date:t2.date,title:t2.title,category:t2.category,time:t2.time,notes:t2.notes,urg:false});
  });
  // Deduplicate inf items by id (keep most specific)
  const seen=new Set();
  const deduped=items.filter(item=>{
    if(item.type!=='inf')return true;
    const key=`${item.id}-${item.date}-${item.action}`;
    if(seen.has(key))return false;seen.add(key);return true;
  });
  return deduped.sort((a,b)=>a.date.localeCompare(b.date));
}

function getCatIco(cat){const m={'미팅':'🤝','업체 연락':'📞','샘플 신청':'📦','개인 메모':'📌','기타':'📋'};return m[cat]||'📋';}

// ── CALENDAR ──
function rCal(){
  warmPC(data);
  const spans=[],points=[];
  data.forEach(inf=>{
    const pc=getPC(inf.negotiating_product||inf.product);
    if(inf.scheduleDate){const e=inf.scheduleEndDate||inf.scheduleDate;spans.push({id:inf.id,label:`${inf.name} · ${inf.negotiating_product||inf.product||''}`,shortLabel:inf.name,start:inf.scheduleDate,end:e,color:pc,cat:'gonggu'});}
    if(inf.sampleSentDate){const tr=inf.trackingNumber?` (${inf.trackingNumber})`:'';points.push({id:inf.id,label:`샘플 · ${inf.name}${tr}`,shortLabel:`샘플 · ${inf.name}`,date:inf.sampleSentDate,color:'#FB8C00',cat:'work'});points.push({id:inf.id,label:`배송확인 · ${inf.name}`,shortLabel:`배송확인 · ${inf.name}`,date:addD(2,inf.sampleSentDate),color:'#FF7043',cat:'work'});}
    const sd=inf.settlement_date||calcAutoSettleDate(inf);
    if(sd){const cl=getCL(inf);if(!cl.closing.settled)points.push({id:inf.id,label:`정산 · ${inf.name}`,shortLabel:`정산 · ${inf.name}`,date:sd,color:'#059669',cat:'work'});}
  });
  pTasks.filter(t=>!t.done&&t.date).forEach(t=>{const c=PTASK_COLORS[t.category]||'#94A3B8';points.push({id:t.id,label:`${t.category} · ${t.title}`,shortLabel:t.title,date:t.date,color:c,cat:'work',isPT:true});});

  const modeSpans=calMode==='gonggu'?spans:[];
  const modePoints=calMode==='work'?points:[];
  const first=new Date(calY,calM,1);const lastDate=new Date(calY,calM+1,0).getDate();const dow=first.getDay();
  const pm=new Date(calY,calM,0).getDate();
  let cells=[];
  for(let i=dow-1;i>=0;i--)cells.push({d:pm-i,dim:true,date:null});
  for(let d=1;d<=lastDate;d++){const m=(calM+1).toString().padStart(2,'0');const dd=d.toString().padStart(2,'0');cells.push({d,dim:false,date:`${calY}-${m}-${dd}`});}
  while(cells.length%7)cells.push({d:cells.length-dow-lastDate+1,dim:true,date:null});
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
  const t=today();

  const weeksHTML=weeks.map(wk=>{
    const wkD=wk.map(c=>c.date).filter(Boolean);const ws=wkD[0],we=wkD[wkD.length-1];
    if(!ws)return`<div class="cal-week">${wk.map(c=>cellH(c,t)).join('')}</div>`;
    const activeSpans=modeSpans.filter(sp=>sp.start<=we&&sp.end>=ws);const rows=[];
    activeSpans.forEach(sp=>{const sc=sp.start<ws?0:wk.findIndex(c=>c.date===sp.start);const ec=sp.end>we?6:wk.findLastIndex(c=>c.date===sp.end);const s=sc<0?0:sc,e=ec<0?6:ec;for(let r=0;r<5;r++){if(!rows[r])rows[r]=[];if(!rows[r].some(x=>!(x.e<s||x.s>e))){rows[r].push({sp,s,e});break;}}});
    const ptsByDay={};modePoints.forEach(pt=>{if(pt.date>=ws&&pt.date<=we){if(!ptsByDay[pt.date])ptsByDay[pt.date]=[];ptsByDay[pt.date].push(pt);}});
    const cw=100/7;let bars='';
    rows.forEach((row,ri)=>{row.forEach(({sp,s,e})=>{const left=(s*cw).toFixed(2)+'%';const width=((e-s+1)*cw-.3).toFixed(2)+'%';const top=(ri*22+2)+'px';const isS=sp.start>=ws,isE=sp.end<=we;const r2=isS&&isE?'5px':isS?'5px 2px 2px 5px':isE?'2px 5px 5px 2px':'2px';const lbl=isS?`${sp.label} ${sp.start===sp.end?fmt(sp.start):`${fmt(sp.start)}~${fmt(sp.end)}`}`:'';bars+=`<div class="ev-bar" onclick="openEdit('${sp.id}')" style="left:${left};width:${width};top:${top};background:${sp.color};color:white;border-radius:${r2}">${lbl}</div>`;});});
    const ptRow=rows.length;
    wk.forEach((cell,ci)=>{if(!cell.date)return;(ptsByDay[cell.date]||[]).forEach((pt,pi)=>{const top=((ptRow+pi)*22+2)+'px';const left=(ci*cw).toFixed(2)+'%';const width=(cw-.3).toFixed(2)+'%';const fn=pt.isPT?`openTaskEdit('${pt.id}')`:`openEdit('${pt.id}')`;bars+=`<div class="ev-pt" onclick="${fn}" style="left:${left};width:${width};top:${top};background:${pt.color};color:white">${pt.shortLabel}</div>`;});});
    const maxR=ptRow+Math.max(0,...Object.values(ptsByDay).map(a=>a.length),0);const mh=Math.max(68,28+maxR*22+4);
    return`<div class="cal-week" style="min-height:${mh}px">${wk.map(c=>cellH(c,t)).join('')}<div class="ev-layer">${bars}</div></div>`;
  }).join('');

  const selEvs=[];
  if(selDate){
    modeSpans.forEach(sp=>{if(sp.start<=selDate&&selDate<=sp.end)selEvs.push({...sp,isSpan:true});});
    modePoints.forEach(pt=>{if(pt.date===selDate)selEvs.push({...pt,isSpan:false});});
  }
  const selD=selDate?new Date(selDate+'T00:00:00'):null;
  const selLbl=selD?`${selD.getMonth()+1}월 ${selD.getDate()}일 ${DAYS_[selD.getDay()]}요일`:'';
  const ddContent=selEvs.length
    ?`<div class="dd-hdr">📌 ${selLbl} · ${selEvs.length}건</div>${selEvs.map(e=>`<div class="dd-ev" style="background:${e.color}15" onclick="${e.isPT?`openTaskEdit('${e.id}')`:`openEdit('${e.id}')`}"><div class="dd-ev-dot" style="background:${e.color}"></div><div><div class="dd-ev-action" style="color:${e.color}">${e.isSpan?'공구 기간':e.label.split(' · ')[0]}</div><div class="dd-ev-meta">${e.label}${e.isSpan&&e.start!==e.end?` (${fmt(e.start)}~${fmt(e.end)})`:''}</div></div></div>`).join('')}`
    :(selDate?`<div class="dd-hdr">🗓️ ${selLbl}</div><div style="font-size:12px;color:#94A3B8;padding:8px 0">일정 없음</div>`:'');
  const ddPanel=ddContent?`<div class="day-detail-panel">${ddContent}</div>`:'';

  const prodLeg=calMode==='gonggu'?getProductLegend(data).map(p=>`<div class="leg-it"><div class="leg-dot" style="background:${p.color}"></div><span style="max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span></div>`).join(''):'';
  const workLeg=calMode==='work'?`<div class="leg-it"><div class="leg-dot" style="background:#FB8C00"></div>샘플</div><div class="leg-it"><div class="leg-dot" style="background:#059669"></div>정산</div>${Object.entries(PTASK_COLORS).map(([k,v])=>`<div class="leg-it"><div class="leg-dot" style="background:${v}"></div>${k}</div>`).join('')}`:'';

  const calContent=`
    <div class="cal-mode-row"><button class="cal-mode-btn${calMode==='gonggu'?' on':''}" onclick="setCalMode('gonggu')">🛍️ 공구 캘린더</button><button class="cal-mode-btn${calMode==='work'?' on':''}" onclick="setCalMode('work')">📝 업무 캘린더</button></div>
    <div class="legend-row">${prodLeg}${workLeg}</div>
    <div class="cal-nav"><button class="cal-arr" onclick="calMove(-1)">‹</button><span class="cal-month-lbl">${calY}년 ${MONTHS_[calM]}</span><button class="cal-arr" onclick="calMove(1)">›</button></div>
    <div class="cal-grid-wrap"><div class="cal-dow-row">${['일','월','화','수','목','금','토'].map(d=>`<div>${d}</div>`).join('')}</div><div class="cal-weeks">${weeksHTML}</div></div>`;

  return`<div class="cal-full"><div class="cal-full-main">${calContent}</div><div class="cal-full-side">${ddPanel}</div></div>`;
}
function cellH(cell,t){const isTd=cell.date===t,isSel=cell.date===selDate;return`<div class="cal-cell${isTd?' today-cell':''}${isSel&&!isTd?' sel-cell':''}${cell.dim?' dim-cell':''}" onclick="${cell.date?`selectDate('${cell.date}')`:''}" ><div class="day-num">${cell.d}</div></div>`;}
function calMove(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}rContent();}
function selectDate(d){selDate=d;rContent();}
function setCalMode(m){calMode=m;rContent();}

    const ms=(inf.name||'').includes(srch)||(inf.instagram||'').includes(srch)||(inf.negotiating_product||inf.product||'').includes(srch)||(inf.nickname||'').includes(srch);

  });

    return`<div class="inf-card p${ph.id}" onclick="openEdit('${inf.id}')">
      <div class="inf-top"><div><div class="inf-name">${inf.name}${inf.nickname?` <span style="font-size:11px;color:#94A3B8">(${inf.nickname})</span>`:''}</div><div class="inf-sub">${iLink}${inf.followers?`<span>· ${fmtF(inf.followers)}</span>`:''}</div></div><span class="ph-badge" style="background:${ph.bg};color:${ph.color}">${ph.ico} ${ph.label}</span></div>
      <div class="prog-txt">${prog.done}/${prog.total} 완료</div><div class="prog-bar"><div class="prog-fill" style="width:${Math.round(prog.done/prog.total*100)}%;background:${ph.color}"></div></div>
      ${na?`<div class="nxt-box" style="background:${na.urg?'#FEF2F2':'#F8FAFC'}"><span>${cm2.ico}</span><span class="nxt-txt" style="color:${na.urg?'#EF4444':'#475569'}">→ ${inf.negotiating_product||inf.product?`<b>${inf.negotiating_product||inf.product}</b> · `:''} ${na.action}</span></div>`:''}
      ${dTags?`<div class="dtags">${dTags}</div>`:''}
    </div>`;
  }).join('')}</div>`:`<div class="empty-s"><div class="empty-s-ico">👥</div><div class="empty-s-txt">인플루언서가 없어요</div></div>`;
  return`<input class="search-box" placeholder="이름 · 인스타 · 제품 · 별명 검색" value="${srch}" oninput="setSrch(this.value)">${chips}${cards}<button class="fab" onclick="openAdd()">＋</button>`;
}

}

/** 중복 선언 방지를 위해 함수 이름 변경 **/
function autoSettleUpdate(endDate){const el=document.getElementById('f-settle');if(el&&endDate)el.value=addD(30,endDate);}

function switchPh(ph){const f=collectInf();_mi={..._mi,...f,phase:ph};modalPh=ph;if(editInf)editInf={...editInf,...f,phase:ph};else editInf={..._mi,id:_mi.id||uid()};closeId('inf-modal');showInfModal();}
async function toggleCk(phId,key,infId){
  let inf=data.find(x=>x.id===infId)||(editInf?.id===infId?editInf:null);if(!inf)return;
  const ph=PM[phId];const cl=getCL(inf);cl[ph.key][key]=!cl[ph.key][key];
  const allDone=ph.checks.every(c=>cl[ph.key][c.k]);const newPh=allDone&&phId<4?phId+1:inf.phase;
  const updated={...inf,checklist:cl,phase:newPh,updatedAt:new Date().toISOString()};
  await dbPut(IS,updated);data=await dbAll(IS);if(editInf?.id===infId){editInf=updated;modalPh=newPh;}
  gdSave();closeId('inf-modal');showInfModal();
}
function collectInf(){
  const gv=id=>{const e=document.getElementById(id);return e?e.value:''};
  return{name:gv('f-name'),nickname:gv('f-nick'),instagram:gv('f-insta'),instagramUrl:gv('f-url'),channel_url:gv('f-url'),followers:parseInt(gv('f-flw'))||0,category:gv('f-cat'),kakaoId:gv('f-kakao'),kakao_email:gv('f-email'),phone:gv('f-email'),negotiating_product:gv('f-prod'),product:gv('f-prod'),chat_history:gv('f-chat'),sample_detail:gv('f-sdet'),recipient_name:gv('f-rname'),sampleRecipient:gv('f-rname'),recipient_phone:gv('f-rphone'),samplePhone:gv('f-rphone'),recipient_address:gv('f-raddr'),sampleAddress:gv('f-raddr'),sampleSentDate:gv('f-sdate'),trackingNumber:gv('f-track'),scheduleDate:gv('f-ss'),scheduleEndDate:gv('f-se'),paymentLink:gv('f-link'),settlement_date:gv('f-settle')||(gv('f-se')?addD(30,gv('f-se')):''),settlementAmount:gv('f-samount'),notes:gv('f-notes')};
}
async function saveInfModal(id){
  const form=collectInf();const existing=data.find(x=>x.id===id);
  const final={...(existing||{}),...form,id,phase:modalPh||editInf?.phase||1,checklist:getCL({...existing,...editInf}),createdAt:existing?.createdAt||editInf?.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()};
  await dbPut(IS,final);data=await dbAll(IS);gdSave();showToast('✅ 저장됐어요!');closeInfModal();
}
async function delInf(id){if(!confirm('삭제할까요?'))return;await dbDel(IS,id);data=await dbAll(IS);gdSave();showToast('🗑️ 삭제됐어요');closeInfModal();}
function closeInfModal(){closeId('inf-modal');editInf=null;modalPh=null;_mi={};render();}

// ════════════════════════════════════════
// 13. PERSONAL TASK MODAL
// ════════════════════════════════════════
function openTaskAdd(){editTask=null;showTaskModal();}
function openTaskEdit(id){editTask=pTasks.find(x=>x.id===id)||null;showTaskModal();}
function showTaskModal(){
  const isNew=!editTask;const t=editTask||{id:uid(),title:'',date:'',time:'',category:'미팅',notes:'',done:false,createdAt:new Date().toISOString()};
  const ov=mkOv('task-modal');
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()"><div class="m-hnd"></div>
    <div class="m-head">${isNew?'📝 업무 일정 추가':'✏️ 업무 수정'}<button class="m-x" onclick="closeId('task-modal')">✕</button></div>
    <div class="m-sub">공구와 무관한 개인 업무 일정</div>
    <div class="fsec" style="border-color:#F1F5F9">
      <div class="field"><label>제목 *</label><input id="t-title" value="${t.title}" placeholder="미팅, 업체 연락, 개인 메모 등"></div>
      <div class="field-row"><div class="field"><label>날짜</label><input type="date" id="t-date" value="${t.date}"></div><div class="field"><label>시간 (선택)</label><input type="time" id="t-time" value="${t.time||''}"></div></div>
      <div class="field"><label>카테고리</label><select id="t-cat">${PTASK_CATS.map(c=>`<option${c===t.category?' selected':''}>${c}</option>`).join('')}</select></div>
      <div class="field"><label>메모 (선택)</label><textarea id="t-notes">${t.notes||''}</textarea></div>
      ${!isNew?`<div class="field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="t-done" ${t.done?'checked':''} style="width:15px;height:15px;accent-color:#059669"> 완료 처리</label></div>`:''}
    </div>
    <div class="btn-row">${!isNew?`<button class="btn-d" onclick="delPTask('${t.id}')">삭제</button>`:''}
    <button class="btn-c" onclick="closeId('task-modal')">취소</button>
    <button class="btn-s" onclick="savePTask('${t.id}')">저장 ✓</button></div>
  </div>`;
  document.body.appendChild(ov);
}
async function savePTask(id){
  const gv=i=>{const e=document.getElementById(i);return e?e.type==='checkbox'?e.checked:e.value:''};
  const task={id,title:gv('t-title')||'제목없음',date:gv('t-date'),time:gv('t-time'),category:gv('t-cat'),notes:gv('t-notes'),done:gv('t-done')||false,createdAt:editTask?.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()};
  await dbPut(TS,task);pTasks=await dbAll(TS);gdSave();showToast('✅ 업무 일정 저장!');closeId('task-modal');render();
}
async function delPTask(id){if(!confirm('삭제할까요?'))return;await dbDel(TS,id);pTasks=await dbAll(TS);gdSave();showToast('🗑️ 삭제됐어요');closeId('task-modal');render();}

// ════════════════════════════════════════
// 14. BADGE FILTER MODAL
// ════════════════════════════════════════
function showBadgeModal(type){
  const cfg={active:{title:'📋 진행중 인플루언서',color:'#4F46E5',desc:'마감 이전 단계 전체'},ongoing:{title:'🛍️ 공구 진행중',color:'#2563EB',desc:'현재 공구 운영 단계'},urgent:{title:'🚨 긴급 처리 필요',color:'#DC2626',desc:'즉시 처리가 필요한 항목'}};
  const c=cfg[type];let filtered=[];
  if(type==='active')filtered=data.filter(d=>{const cl=getCL(d);return d.phase<4||(d.phase===4&&!cl.closing.next_recommend);});
  else if(type==='ongoing')filtered=data.filter(d=>{const cl=getCL(d);return d.phase===3&&cl.operation.ongoing;});
  else if(type==='urgent'){
    const urgItems=buildUrgentItems();
    const ids=new Set(urgItems.filter(i=>i.type==='inf').map(i=>i.id));
    filtered=data.filter(d=>ids.has(d.id));
  }
  const listHTML=filtered.length?filtered.map(inf=>{const ph=PM[inf.phase||1];const na=getNextAct(inf);return`<div class="bm-item" style="border-left-color:${ph.color}" onclick="closeBM();openEdit('${inf.id}')"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><b style="font-size:14px">${inf.name}</b><span style="font-size:10px;font-weight:700;background:${ph.bg};color:${ph.color};padding:2px 6px;border-radius:4px">${ph.ico} ${ph.label}</span></div><div style="font-size:11px;color:#94A3B8;margin-bottom:3px">${inf.instagram||''}${inf.negotiating_product||inf.product?` · ${inf.negotiating_product||inf.product}`:''}</div>${na?`<div style="font-size:12px;font-weight:700;color:${na.urg?'#DC2626':'#475569'}">→ ${na.action}</div>`:''}</div>`;}).join(''):`<div class="empty-s"><div class="empty-s-ico">✅</div><div class="empty-s-txt">해당 항목이 없어요</div></div>`;
  const ov=mkOv('bm');ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()"><div class="m-hnd"></div><div class="m-head" style="color:${c.color}">${c.title}<button class="m-x" onclick="closeBM()">✕</button></div><div style="font-size:12px;color:#94A3B8;margin-bottom:12px">${c.desc} · <b style="color:${c.color}">${filtered.length}명</b></div>${listHTML}</div>`;document.body.appendChild(ov);
}
function closeBM(){closeId('bm');}

// ════════════════════════════════════════
// 15. INIT
// ════════════════════════════════════════
async function init(){
  await openDB();
  const raw=await dbAll(IS);
  data=raw.map(migrateInf);
  for(const item of data)await dbPut(IS,item);
  pTasks=await dbAll(TS);
  warmPC(data);
  render();
}
init();
</script>
