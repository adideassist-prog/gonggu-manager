<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공구 매니저 v8.6</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════ BASE ════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#F0F0FA;color:#1E293B;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
a{text-decoration:none}

/* ════════════════════════════════════════ SHELL ════════════════════════════════════════ */
.shell{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{display:none;width:210px;flex-shrink:0;background:linear-gradient(180deg,#E8E4FF,#DDD5FF 50%,#D4C8FF);flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:300;overflow-y:auto}
.sb-logo{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-title{font-size:15px;font-weight:900;color:#3D2B8C;display:flex;align-items:center;gap:8px}
.sb-logo-sub{font-size:10px;color:rgba(61,43,140,.55);margin-top:3px}
.sb-kpis{padding:10px 10px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;gap:8px}
.sb-kpi-group{display:flex;flex-direction:column;gap:4px}
.sb-kpi-group-lbl{font-size:9px;font-weight:800;color:rgba(61,43,140,.45);text-transform:uppercase;letter-spacing:.5px;padding:0 2px}
.sb-kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:4px}
/* 세로 카드: 숫자 위, 라벨 아래 */
.sb-kpi{background:rgba(255,255,255,.55);border-radius:8px;padding:8px 10px;cursor:pointer;transition:background .15s;display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.sb-kpi:hover{background:rgba(255,255,255,.8)}
.sb-kpi-num{font-size:20px;font-weight:900;color:#3D2B8C;line-height:1}
.sb-kpi-lbl{font-size:10px;color:rgba(61,43,140,.6);font-weight:600;white-space:nowrap}
.sb-kpi.urg{background:rgba(255,150,150,.35)}
/* 오늘처리 큰 박스: 가로 배치 유지 */
.sb-kpi-big{background:rgba(255,100,100,.2);border-radius:9px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s;border:1px solid rgba(255,100,100,.18)}
.sb-kpi-big:hover{background:rgba(255,100,100,.32)}
.sb-kpi-big .sb-kpi-lbl{font-size:12px;color:rgba(120,20,20,.85);font-weight:700;white-space:nowrap}
.sb-kpi-big .sb-kpi-num{font-size:26px;font-weight:900;color:#B91C1C}
.sb-kpi{background:rgba(255,255,255,.55);border-radius:8px;padding:8px 11px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
.sb-kpi:hover{background:rgba(255,255,255,.8)}
.sb-kpi-lbl{font-size:11px;color:rgba(61,43,140,.65);font-weight:600}
.sb-kpi-num{font-size:19px;font-weight:900;color:#3D2B8C}
.sb-kpi.urg{background:rgba(255,150,150,.35)}
.sb-nav{padding:10px 8px;flex:1;display:flex;flex-direction:column;gap:2px}
.sb-link{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:9px;border:none;background:none;cursor:pointer;font-family:inherit;color:rgba(61,43,140,.7);font-size:13px;font-weight:600;text-align:left;width:100%;transition:all .15s;position:relative}
.sb-link:hover{background:rgba(255,255,255,.55);color:#3D2B8C}
.sb-link.on{background:rgba(255,255,255,.7);color:#3D2B8C}
.sb-link-ico{font-size:16px;width:20px;text-align:center}
.sb-nb{background:#FF6B6B;color:white;border-radius:8px;font-size:9px;font-weight:800;padding:1px 5px;margin-left:auto}
.sb-foot{padding:10px 8px 18px;border-top:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;gap:5px;margin-top:auto}
.sb-action{padding:10px 12px;border-radius:9px;border:2px solid rgba(61,43,140,.25);background:rgba(255,255,255,.4);color:#3D2B8C;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;width:100%;text-align:left}
.sb-action:hover{background:rgba(255,255,255,.7)}
.sb-tool{padding:7px 10px;border-radius:8px;border:1px solid rgba(61,43,140,.2);background:rgba(255,255,255,.35);color:rgba(61,43,140,.7);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s;width:100%}
.sb-tool:hover{background:rgba(255,255,255,.65);color:#3D2B8C}
.sb-gd{border-color:rgba(61,43,140,.35);color:#3D2B8C;font-weight:700}
.sb-gd.on{border-color:#4ADE8099;background:rgba(74,222,128,.2);color:#157A4A}
.sb-hr{height:1px;background:rgba(61,43,140,.15);margin:3px 0}
.sb-hint{font-size:10px;color:rgba(61,43,140,.45);text-align:center;padding-top:4px}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* MOBILE HEADER */
.mob-hdr{background:linear-gradient(135deg,#C5B8FF,#B8A8FF);color:#3D2B8C;padding:10px 12px 12px;position:sticky;top:0;z-index:200;display:flex;flex-direction:column;gap:8px}
.mob-row{display:flex;justify-content:space-between;align-items:center}
.mob-title{font-size:16px;font-weight:800;color:#3D2B8C}
.mob-acts{display:flex;gap:4px}
.mob-act{background:rgba(255,255,255,.5);border:none;border-radius:7px;padding:5px 8px;color:#3D2B8C;font-size:11px;font-weight:700;cursor:pointer}
.mob-gd.on{background:rgba(74,222,128,.35);color:#157A4A}
/* 오늘처리 큰 박스 */
.mob-today{background:rgba(255,100,100,.2);border:1px solid rgba(255,100,100,.25);border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.mob-today-lbl{font-size:11px;font-weight:700;color:rgba(140,20,20,.85)}
.mob-today-n{font-size:24px;font-weight:900;color:#B91C1C;line-height:1}
/* 공구현황 + 파이프라인 2열 */
.mob-kpi-row2{display:flex;gap:6px}
.mob-kpi-group{flex:1;display:flex;flex-direction:column;gap:3px}
.mob-kpi-group-lbl{font-size:8px;font-weight:800;color:rgba(61,43,140,.5);text-transform:uppercase;letter-spacing:.4px}
.mob-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.mob-kpis{display:flex;gap:5px;flex-wrap:wrap}
/* 각 KPI 카드 */
.mob-kpi{background:rgba(255,255,255,.55);border-radius:8px;padding:5px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;transition:background .15s}
.mob-kpi:hover{background:rgba(255,255,255,.8)}
.mob-kpi b{font-size:16px;display:block;font-weight:900;color:#3D2B8C;line-height:1.1}
.mob-kpi span{font-size:9px;font-weight:600;color:rgba(61,43,140,.6);white-space:nowrap}
.mob-kpi.urg b{color:#B91C1C}

/* PC TOPBAR */
.pc-topbar{display:none;background:white;border-bottom:1px solid #E2E8F0;padding:10px 20px;position:sticky;top:0;z-index:200;flex-direction:column;gap:8px}
.pc-topbar-row1{display:flex;align-items:center;justify-content:space-between}
.pc-topbar-row2{display:flex;gap:12px;align-items:stretch}
.pc-tb-title{font-size:18px;font-weight:800}
.pc-tb-date{font-size:11px;color:#64748B;margin-top:1px}
.pc-tb-right{display:flex;align-items:center;gap:6px}
/* 오늘처리 큰 박스 */
.pc-today-box{background:#FFF0F0;border:1.5px solid #FECACA;border-radius:10px;padding:6px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s}
.pc-today-box:hover{background:#FFE4E4}
.pc-today-lbl{font-size:11px;font-weight:700;color:#DC2626}
.pc-today-n{font-size:22px;font-weight:900;color:#B91C1C;line-height:1}
/* 공구현황 / 파이프라인 그룹 */
.pc-kpi-group{flex:1;display:flex;flex-direction:column;gap:4px}
.pc-kpi-group-lbl{font-size:9px;font-weight:800;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px}
.pc-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.pc-kpis{display:flex;gap:5px;align-items:stretch}
.pc-kpi{background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:8px;padding:4px 8px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:0}
.pc-kpi:hover{border-color:#A5B4FC;background:#EEF2FF}
.pc-kpi-n{font-size:16px;font-weight:900;display:block;color:#7C6FCD;line-height:1.1}
.pc-kpi-lbl{font-size:10px;font-weight:600;color:#64748B;white-space:nowrap}
.pc-kpi.urg .pc-kpi-n{color:#EF4444}
.pc-kpi.urg{border-color:#FECACA;background:#FFF5F5}
.pc-kpi-div{width:1px;background:#E2E8F0;align-self:stretch;margin:0 2px}
.pc-btns{display:flex;gap:5px}
.pc-btns{display:flex;gap:5px}
.pc-btn{padding:7px 12px;border-radius:8px;border:1.5px solid #E2E8F0;background:white;color:#64748B;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.pc-btn:hover{border-color:#A5B4FC;color:#4F46E5}

.page{padding:12px 14px 88px;flex:1}

/* BOTTOM NAV */
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #E2E8F0;display:flex;padding:7px 0 max(7px,env(safe-area-inset-bottom));z-index:150;box-shadow:0 -2px 10px rgba(0,0,0,.07)}
.bot-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:3px 0;position:relative}
.bot-ico{font-size:18px}
.bot-lbl{font-size:10px;font-weight:700;color:#94A3B8}
.bot-btn.on .bot-lbl{color:#4F46E5}
.bot-nb{position:absolute;top:-1px;right:calc(50% - 16px);background:#EF4444;color:white;border-radius:8px;font-size:9px;font-weight:800;padding:1px 5px}
.fab{position:fixed;bottom:70px;right:14px;background:linear-gradient(135deg,#A78BFA,#C4B5FD);color:white;border:none;border-radius:14px;width:50px;height:50px;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(79,70,229,.4);display:flex;align-items:center;justify-content:center;z-index:99}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1E293B;color:white;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;animation:sdp 1.5s infinite}
@keyframes sdp{0%,100%{opacity:1}50%{opacity:.3}}

/* ════════════════════════════════════════ DASHBOARD ════════════════════════════════════════ */

/* Sticky section nav */
.dash-nav{position:sticky;top:0;z-index:100;background:white;border-bottom:1px solid #E2E8F0;padding:8px 14px;display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.dash-nav::-webkit-scrollbar{display:none}
.dash-nav-btn{flex-shrink:0;padding:6px 12px;border-radius:18px;border:1.5px solid #E2E8F0;background:white;font-size:11px;font-weight:700;color:#64748B;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.dash-nav-btn:hover{border-color:#A5B4FC;color:#4F46E5}
.dash-nav-btn.active{background:#4F46E5;border-color:#4F46E5;color:white}
.dash-nav-cnt{background:rgba(255,255,255,.25);border-radius:9px;padding:1px 5px;font-size:10px;font-weight:900}
.dash-nav-btn:not(.active) .dash-nav-cnt{background:#F1F5F9;color:#4F46E5}
.dash-nav-btn.urg-btn.active{background:#DC2626;border-color:#DC2626}
.dash-nav-btn.urg-btn:not(.active){border-color:#FECACA;color:#DC2626}
.dash-nav-btn.urg-btn:not(.active) .dash-nav-cnt{background:#FEF2F2;color:#DC2626}

.dash-body{display:flex;flex-direction:column;gap:16px;padding:12px 0}

/* Section wrapper */
.ds{background:white;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.ds-hdr{display:flex;align-items:center;gap:10px;padding:13px 15px 11px;border-bottom:1px solid #F1F5F9}
.ds-hdr.h-urg{border-bottom-color:#FECACA;background:linear-gradient(90deg,#FFF5F5,white)}
.ds-hdr.h-gonggu{border-bottom-color:#BFDBFE;background:linear-gradient(90deg,#EFF6FF,white)}
.ds-hdr.h-sample{border-bottom-color:#FED7AA;background:linear-gradient(90deg,#FFF7ED,white)}
.ds-hdr.h-settle{border-bottom-color:#A7F3D0;background:linear-gradient(90deg,#ECFDF5,white)}
.ds-hdr.h-contact{border-bottom-color:#DDD6FE;background:linear-gradient(90deg,#F5F3FF,white)}
.ds-hdr.h-personal{border-bottom-color:#BAE6FD;background:linear-gradient(90deg,#F0F9FF,white)}
.ds-hdr-ico{font-size:20px}
.ds-hdr-info{flex:1}
.ds-hdr-title{font-size:14px;font-weight:800}
.ds-hdr-sub{font-size:11px;font-weight:600;margin-top:1px}
.ds-hdr-sub.c-urg{color:#DC2626}
.ds-hdr-sub.c-blue{color:#1D4ED8}
.ds-hdr-sub.c-orange{color:#C2410C}
.ds-hdr-sub.c-green{color:#065F46}
.ds-hdr-sub.c-purple{color:#5B21B6}
.ds-hdr-sub.c-sky{color:#0369A1}
.ds-add-btn{padding:5px 10px;border-radius:7px;border:1.5px solid;background:white;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}

.ds-body{padding:10px 12px 13px;display:flex;flex-direction:column;gap:6px}

/* ── URGENT CARD ── */
.uc{border-radius:11px;padding:12px 13px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;border:1.5px solid #F1F5F9;transition:transform .1s,box-shadow .1s;background:#FAFAFA}
.uc:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.uc.today{border-color:#FECACA;background:linear-gradient(135deg,#FFF5F5,#FFF8F8)}
.uc.personal{background:#F5F3FF;border-color:#DDD6FE}
.uc-urg{width:8px;height:8px;border-radius:50%;background:#EF4444;flex-shrink:0;margin-top:5px;animation:sdp 1s infinite}
.uc-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:1px}
.uc-body{flex:1;min-width:0}
.uc-name{font-size:13px;font-weight:800;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px}
.uc-product{font-size:11px;font-weight:600;color:#94A3B8}
.uc-action{font-size:13px;font-weight:700;color:#DC2626;margin-bottom:3px}
.uc-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.uc-ph{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px}
.uc-time{font-size:10px;color:#94A3B8;font-weight:600}
.uc-memo{font-size:11px;color:#94A3B8;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:3px}
.today-pill{background:#FEE2E2;color:#DC2626;font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;flex-shrink:0}

/* ── GONGGU CARD ── */
.gc{border-radius:11px;padding:12px 13px;cursor:pointer;border:1.5px solid #E2E8F0;background:#F8FAFC;transition:transform .1s,box-shadow .1s}
.gc:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.09)}
.gc.live{border-color:#93C5FD;background:linear-gradient(135deg,#EFF6FF,#F8FAFF)}
.gc.today-start{border-color:#FCD34D;background:linear-gradient(135deg,#FFFBEB,#FFFFF5)}
.gc-color-stripe{height:4px;border-radius:4px 4px 0 0;margin:-12px -13px 10px}
.gc-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.gc-name{font-size:14px;font-weight:800}
.gc-status{font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px}
.gc-status.live{background:#DBEAFE;color:#1D4ED8}
.gc-status.today{background:#FEF3C7;color:#92400E}
.gc-status.soon{background:#F1F5F9;color:#64748B}
.gc-product{font-size:12px;font-weight:700;color:#2563EB;margin-bottom:6px}
.gc-prog{height:7px;background:#E0EAFF;border-radius:4px;overflow:hidden;margin-bottom:5px}
.gc-prog-fill{height:100%;border-radius:4px}
.gc-dates{display:flex;justify-content:space-between;align-items:center}
.gc-date-txt{font-size:11px;color:#64748B;font-weight:600}
.gc-d{font-size:11px;font-weight:700}

/* ── SAMPLE CARD ── */
.sc{border-radius:11px;padding:12px 13px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;border:1.5px solid #E2E8F0;background:#FFFBF5;transition:transform .1s,box-shadow .1s}
.sc:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.09)}
.sc-ico{width:36px;height:36px;border-radius:9px;background:#FFF7ED;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sc-body{flex:1;min-width:0}
.sc-name{font-size:13px;font-weight:800;margin-bottom:3px}
.sc-product{color:#5B21B6;font-weight:800;margin-bottom:5px}
.sc-checks{display:flex;flex-direction:column;gap:3px}
.sc-ck{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.sc-ck-box{width:14px;height:14px;border-radius:4px;border:1.5px solid #D1D5DB;background:white;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sc-ck-box.done{background:#F59E0B;border-color:#F59E0B}
.sc-ck-lbl{color:#374151}
.sc-ck.is-done .sc-ck-lbl{text-decoration:line-through;color:#94A3B8}
.sc-detail{font-size:11px;color:#94A3B8;margin-top:4px}
.sc-ck-arrow{font-size:10px;color:#F59E0B;font-weight:800;margin-left:auto;flex-shrink:0}

/* ── SETTLEMENT CARD ── */
.stc{border-radius:11px;padding:11px 13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border:1.5px solid #D1FAE5;background:#F0FDF4;transition:transform .1s,box-shadow .1s}
.stc:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.08)}
.stc.urgent-settle{border-color:#6EE7B7;background:linear-gradient(135deg,#ECFDF5,#F0FDF4)}
.stc-left{display:flex;align-items:center;gap:10px}
.stc-ico{font-size:20px}
.stc-name{font-size:14px;font-weight:800;margin-bottom:2px}
.stc-product{color:#5B21B6;font-weight:800}
.stc-right{text-align:right;flex-shrink:0}
.stc-date{font-size:13px;font-weight:800;color:#065F46}
.stc-d{font-size:10px;font-weight:700;margin-top:2px}
.settle-summary{background:#ECFDF5;border-radius:9px;padding:9px 12px;font-size:12px;font-weight:700;color:#065F46;margin-bottom:8px;border:1px solid #A7F3D0}

/* ── CONTACT CARD ── */
.cc{border-radius:11px;padding:11px 13px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;border:1.5px solid #EDE9FE;background:#FAF8FF;transition:transform .1s,box-shadow .1s}
.cc:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.08)}
.cc.remind14{border-color:#7C3AED;background:linear-gradient(135deg,#F5F3FF,#FAF8FF)}
.cc.remind21{border-color:#DC2626;background:linear-gradient(135deg,#FFF5F5,#FAF8FF)}
.cc-ico{width:34px;height:34px;border-radius:8px;background:#EDE9FE;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cc-body{flex:1;min-width:0}
.cc-name{font-size:13px;font-weight:800;margin-bottom:2px}
.cc-product{color:#5B21B6;font-weight:800;margin-bottom:4px}
.cc-action{font-size:12px;font-weight:700;color:#5B21B6}
.cc-remind{font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;margin-top:5px}
.cc-remind.r14{background:#EDE9FE;color:#7C3AED}
.cc-remind.r21{background:#FEE2E2;color:#DC2626}
.cc-days{font-size:10px;color:#94A3B8;font-weight:600;margin-left:auto;flex-shrink:0}

/* ── PERSONAL TASK CARD ── */
.ptc{border-radius:11px;padding:11px 13px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;border:1.5px solid #BAE6FD;background:#F0F9FF;transition:transform .1s,box-shadow .1s}
.ptc:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.08)}
.ptc.is-today{border-color:#38BDF8;background:linear-gradient(135deg,#E0F2FE,#F0F9FF)}
.ptc-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:1px}
.ptc-body{flex:1;min-width:0}
.ptc-date{font-size:10px;font-weight:800;color:#0369A1;margin-bottom:3px}
.ptc-date.today-date{color:#DC2626}
.ptc-title{font-size:13px;font-weight:800;margin-bottom:2px}
.ptc-meta{font-size:11px;color:#64748B;font-weight:600}
.ptc-memo{font-size:11px;color:#94A3B8;font-style:italic;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ptc-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;flex-shrink:0;white-space:nowrap}

.empty-s{text-align:center;padding:28px 20px;color:#94A3B8}
.empty-s-ico{font-size:34px;margin-bottom:7px}
.empty-s-txt{font-size:13px;font-weight:700}

/* ════════════════════════════════════════ CALENDAR ════════════════════════════════════════ */
.cal-wrap{display:flex;flex-direction:column;gap:10px}
.cal-mode-row{display:flex;gap:7px}
.cal-mode-btn{flex:1;padding:8px;border-radius:9px;border:2px solid #E2E8F0;background:white;font-size:12px;font-weight:700;color:#94A3B8;cursor:pointer;font-family:inherit;transition:all .15s}
.cal-mode-btn.on{border-color:#4F46E5;background:#EEF2FF;color:#4F46E5}
.legend-row{display:flex;gap:5px;flex-wrap:wrap}
.leg-it{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:#64748B}
.leg-dot{width:11px;height:7px;border-radius:3px}
.cal-nav{display:flex;align-items:center;justify-content:space-between}
.cal-arr{width:32px;height:32px;border-radius:8px;border:none;background:white;box-shadow:0 1px 5px rgba(0,0,0,.08);cursor:pointer;font-size:16px;color:#4F46E5;display:flex;align-items:center;justify-content:center}
.cal-month-lbl{font-size:16px;font-weight:800}
/* Grid */
.cal-grid-box{background:#FAFAFE;border-radius:13px;overflow:hidden;box-shadow:0 2px 14px rgba(100,80,200,.1)}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:#F3F3FC;border-bottom:1px solid #E8E8F5}
.cal-dow-row div{text-align:center;font-size:11px;font-weight:700;color:#94A3B8;padding:8px 0}
.cal-dow-row div:first-child{color:#EF4444}
.cal-dow-row div:last-child{color:#6366F1}
.cal-weeks-wrap{display:flex;flex-direction:column}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid #F1F5F9;position:relative;min-height:80px}
.cal-cell{padding:4px 2px 2px;cursor:pointer;overflow:hidden}
.cal-cell:hover{background:#FAFBFF}
.cal-cell.today-cell .day-num{background:linear-gradient(135deg,#A78BFA,#C4B5FD);color:white;border-radius:50%}
.cal-cell.sel-cell{background:#EDE9FF}
.cal-cell.dim-cell .day-num{color:#D1D5DB}
.day-num{font-size:12px;font-weight:700;width:24px;height:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 2px;color:#1E293B}
.cal-cell:nth-child(7n+1) .day-num{color:#EF4444}
.cal-cell:nth-child(7n+1).today-cell .day-num,.cal-cell:nth-child(7n).today-cell .day-num{color:white}
.cal-cell:nth-child(7n) .day-num{color:#6366F1}
.ev-layer{position:absolute;top:30px;left:0;right:0;pointer-events:none}
.ev-bar{position:absolute;height:36px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:2px 7px;gap:1px;overflow:hidden;pointer-events:all;cursor:pointer;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,.12);opacity:.88}
.evb-n{font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;color:#1E1B4B;line-height:1.3}
.evb-p{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;color:rgba(30,27,75,.65);line-height:1.3}
.ev-bar:hover{opacity:1;box-shadow:0 3px 10px rgba(0,0,0,.18)}
.ev-pt{position:absolute;height:36px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:2px 7px;gap:1px;overflow:hidden;pointer-events:all;cursor:pointer;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,.12);opacity:.88}.evp-c{font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;color:#1E1B4B;line-height:1.3}.evp-t{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;color:rgba(30,27,75,.65);line-height:1.3}
.ev-pt:hover{opacity:1;box-shadow:0 3px 10px rgba(0,0,0,.18)}
/* Day detail */
.day-detail-panel{background:white;border-radius:13px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.dd-hdr{font-size:14px;font-weight:800;margin-bottom:12px;color:#1E293B}
.dd-ev{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:5px;cursor:pointer}
.dd-ev:hover{opacity:.85}
.dd-ev-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
.dd-ev-action{font-size:13px;font-weight:800;color:#1E293B}
.dd-ev-meta{font-size:12px;color:#475569;margin-top:2px}

/* ════════════════════════════════════════ INF LIST ════════════════════════════════════════ */
.search-box{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #E2E8F0;font-size:13px;font-family:inherit;background:white;outline:none;margin-bottom:10px}
.search-box:focus{border-color:#6366F1}
.chip-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px}
.chip-row::-webkit-scrollbar{display:none}
.chip{padding:5px 10px;border-radius:15px;border:none;background:#F1F5F9;color:#64748B;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.chip.on{background:#4F46E5;color:white}
.inf-grid-wrap{display:block}
.inf-card{background:white;border-radius:12px;padding:12px 13px;margin-bottom:7px;cursor:pointer;box-shadow:0 1px 8px rgba(0,0,0,.05);border-left:4px solid #E2E8F0;transition:transform .1s,box-shadow .1s}
.inf-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.09)}
.inf-card.p1{border-left-color:#6366F1}
.inf-card.p2{border-left-color:#D97706}
.inf-card.p3{border-left-color:#2563EB}
.inf-card.p4{border-left-color:#059669}
.inf-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.inf-name{font-size:14px;font-weight:800}
.inf-sub{font-size:11px;color:#94A3B8;margin-top:2px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.ph-badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.prog-txt{font-size:10px;font-weight:700;color:#94A3B8;text-align:right;margin-bottom:3px}
.prog-bar{height:4px;background:#F1F5F9;border-radius:3px;overflow:hidden;margin-bottom:7px}
.prog-fill{height:100%;border-radius:3px}
.nxt-box{display:flex;align-items:center;gap:5px;border-radius:7px;padding:5px 8px;margin-bottom:5px}
.nxt-txt{font-size:11px;font-weight:700}
.dtags{display:flex;gap:4px;flex-wrap:wrap}
.dtag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px}

/* ════════════════════════════════════════ MODAL ════════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:white;border-radius:22px 22px 0 0;width:100%;max-width:660px;max-height:93vh;overflow-y:auto;padding:16px 16px 40px}
.m-hnd{width:32px;height:4px;background:#E2E8F0;border-radius:2px;margin:0 auto 14px}
.m-head{font-size:16px;font-weight:800;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.m-sub{font-size:12px;color:#94A3B8;margin-bottom:12px}
.m-x{width:28px;height:28px;border-radius:7px;border:none;background:#F1F5F9;color:#94A3B8;cursor:pointer;font-size:14px}
.ph-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px}
.ph-tab{padding:9px 3px;border-radius:10px;border:2px solid #E2E8F0;background:white;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}
.ph-tab:hover{border-color:#C7D2FE}
.ph-tab.on{border-color:var(--pc);background:var(--pb)}
.ph-tab-ico{font-size:16px;margin-bottom:2px}
.ph-tab-lbl{font-size:10px;font-weight:800;color:#94A3B8;display:block}
.ph-tab.on .ph-tab-lbl{color:var(--pc)}
.ph-tab-ck{font-size:10px;color:#94A3B8;display:block;margin-top:1px}
.cl-wrap{background:#F8FAFC;border-radius:11px;padding:11px;margin-bottom:10px;border:1.5px solid #EEF2FF}
.cl-title{font-size:10px;font-weight:800;color:#4F46E5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.cl-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:background .1s}
.cl-item:hover{background:rgba(79,70,229,.04)}
.cl-item.nxt-item{background:#EEF2FF}
.cl-item input[type=checkbox]{width:15px;height:15px;accent-color:#4F46E5;cursor:pointer;flex-shrink:0}
.cl-lbl{font-size:12px;font-weight:600;flex:1}
.cl-item.ckd .cl-lbl{text-decoration:line-through;color:#94A3B8}
.nxt-tag{font-size:9px;font-weight:800;background:#4F46E5;color:white;padding:2px 5px;border-radius:5px;margin-left:auto;flex-shrink:0}
.fsec{background:#F8FAFC;border-radius:11px;padding:12px;margin-bottom:9px;border:1.5px solid #EEF2FF}
.fsec-hd{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.fsec-num{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#A78BFA,#C4B5FD);color:white;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fsec-lbl{font-size:12px;font-weight:800}
.fsec-sub{font-size:11px;color:#94A3B8}
.field{margin-bottom:8px}
.field:last-child{margin-bottom:0}
.field label{font-size:11px;font-weight:700;color:#64748B;display:block;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid #E2E8F0;font-size:13px;font-family:inherit;color:#1E293B;background:white;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#6366F1}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.btn-row{display:flex;gap:7px;margin-top:14px}
.btn-c{flex:1;padding:11px;border-radius:11px;border:2px solid #E2E8F0;background:white;color:#64748B;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.btn-s{flex:2;padding:11px;border-radius:11px;border:none;background:linear-gradient(135deg,#A78BFA,#C4B5FD);color:white;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit}
.btn-d{padding:11px 12px;border-radius:11px;border:none;background:#FEF2F2;color:#EF4444;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.guide-box{background:#F8FAFC;border-radius:11px;padding:11px;border:1.5px solid #EEF2FF;margin-bottom:9px}
.guide-step{font-size:12px;color:#475569;line-height:2;background:white;border-radius:8px;padding:10px;border:1px solid #E2E8F0}
.guide-step a{color:#4F46E5;font-weight:700}
.guide-step code{background:#F1F5F9;padding:1px 4px;border-radius:3px;font-size:11px}
.warn-box{background:#FEF2F2;border-radius:11px;padding:11px;border:1.5px solid #FECACA;margin-bottom:9px}
.bm-item{padding:10px 12px;border-radius:10px;background:#F8FAFC;margin-bottom:5px;cursor:pointer;border-left:4px solid #E2E8F0;transition:all .1s}
.bm-item:hover{background:#F1F5F9}

/* ════════════════════════════════════════ PC RESPONSIVE ════════════════════════════════════════ */
@media(min-width:860px){
  body{background:#EAEBF8}
  .sidebar{display:flex}
  .main{margin-left:210px}
  .mob-hdr{display:none}
  .bot-nav{display:none}
  .fab{display:none}
  .pc-topbar{display:flex;flex-direction:column}
  .page{padding:12px 20px 40px}
  .inf-grid-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .inf-grid-wrap .inf-card{margin-bottom:0}

  /* ── 뷰포트 꽉 채우기: 상위 컨테이너 flex 체인 ── */
  .main{height:100vh;overflow:hidden;display:flex;flex-direction:column}
  .pc-topbar{flex-shrink:0}
  .page{flex:1;overflow-y:auto;min-height:0;padding:12px 20px 20px;position:relative}
  #srch-wrap{padding:10px 20px 0}
  /* 캘린더 탭일 때만 page도 flex로 */
  .page.cal-page{display:flex;flex-direction:column;overflow:hidden;padding-bottom:12px}
  /* Calendar body fills remaining space */
  .cal-body-pc{flex:1;display:flex;flex-direction:column;gap:10px;min-height:0}
  .cal-main-pc{flex:1;display:flex;flex-direction:column;min-height:0}
  .cal-side-pc{flex-shrink:0}
  .cal-wrap{flex:1;display:flex;flex-direction:column;gap:8px;min-height:0}
  .cal-grid-box{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .cal-weeks-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
  .cal-week{flex:1;min-height:80px}
  .cal-cell{height:100%}
  /* Bigger text on PC */
  .day-num{font-size:14px;width:26px;height:26px}
  .ev-bar{height:38px}.evb-n{font-size:12px;font-weight:800;color:#1E1B4B}.evb-p{font-size:11px;font-weight:600;color:rgba(30,27,75,.65)}.evp-c{font-size:12px;font-weight:800;color:#1E1B4B}.evp-t{font-size:11px;font-weight:600;color:rgba(30,27,75,.65)}
  .ev-pt{height:38px}
  .ev-layer{top:32px}
  .day-detail-panel{margin-top:0;flex-shrink:0}
}

/* Wide dashboard - 2-col on 1200px+ */
@media(min-width:1200px){
  .dash-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .dash-wide{grid-column:1/-1}
}
/* ── 카테고리 멀티셀렉트 드롭다운 ── */
.cat-select{position:relative}
.cat-select-box{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:7px 10px;border:1.5px solid #E2E8F0;border-radius:10px;background:white;cursor:pointer;min-height:38px;transition:border-color .15s}
.cat-select-box:hover,.cat-select-box.open{border-color:#6366F1}
.cat-select-placeholder{font-size:12px;color:#94A3B8;font-weight:500}
.cat-selected-tag{display:inline-flex;align-items:center;gap:3px;background:#EEF2FF;color:#4F46E5;font-size:11px;font-weight:700;padding:3px 8px;border-radius:12px}
.cat-selected-tag button{border:none;background:none;color:#6366F1;cursor:pointer;font-size:12px;padding:0;line-height:1;margin-left:1px}
.cat-arrow{margin-left:auto;color:#94A3B8;font-size:12px;flex-shrink:0;transition:transform .2s}
.cat-arrow.open{transform:rotate(180deg)}
.cat-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border:1.5px solid #E2E8F0;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:600;overflow:hidden}
.cat-dropdown.show{display:block}
.cat-dropdown-inner{max-height:220px;overflow-y:auto;padding:6px}
.cat-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:#374151;transition:background .1s}
.cat-item:hover{background:#F5F3FF}
.cat-item.selected{background:#EEF2FF;color:#4F46E5;font-weight:700}
.cat-item-check{width:16px;height:16px;border-radius:4px;border:1.5px solid #D1D5DB;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}

</style>

<script>
/* ════════════════════════════════════════════════
   1. CONSTANTS
════════════════════════════════════════════════ */
const PHASES=[
  {id:1,key:'contact',   label:'컨택', ico:'📨',color:'#6366F1',bg:'#EEF2FF',
   checks:[{k:'dm',lbl:'DM 발송',cat:'contact',urg:false},{k:'reply',lbl:'답장 확인',cat:'contact',urg:false},{k:'proposal',lbl:'제품 제안',cat:'contact',urg:false},{k:'kakao',lbl:'카톡 연결',cat:'contact',urg:false}]},
  {id:2,key:'sample',   label:'샘플', ico:'📦',color:'#D97706',bg:'#FFFBEB',
   checks:[{k:'decided',lbl:'공구 결정',cat:'sample',urg:true},{k:'info',lbl:'샘플 정보 수집',cat:'sample',urg:true},{k:'sent',lbl:'샘플 발송',cat:'sample',urg:true},{k:'tracking',lbl:'송장번호 전달',cat:'sample',urg:false},{k:'received',lbl:'수령 확인',cat:'sample',urg:false}]},
  {id:3,key:'operation',label:'공구확정', ico:'🛍️',color:'#2563EB',bg:'#EFF6FF',
   checks:[{k:'schedule',lbl:'공구 일정 확정',cat:'groupbuy',urg:false},{k:'link_sent',lbl:'결제링크 전달',cat:'groupbuy',urg:false}]},
  {id:4,key:'closing',  label:'마감', ico:'💰',color:'#059669',bg:'#ECFDF5',
   checks:[{k:'done',lbl:'공구 완료',cat:'settlement',urg:false},{k:'settlement_info',lbl:'정산 일정 안내',cat:'settlement',urg:false},{k:'settled',lbl:'정산 완료',cat:'settlement',urg:true},{k:'next_recommend',lbl:'다음 제품 추천',cat:'contact',urg:false}]},
];
const PM=Object.fromEntries(PHASES.map(p=>[p.id,p]));
const CAT_META={
  contact:   {lbl:'소통', ico:'💬',color:'#6366F1',bg:'#EEF2FF'},
  sample:    {lbl:'샘플', ico:'📦',color:'#D97706',bg:'#FFFBEB'},
  groupbuy:  {lbl:'공구', ico:'🛍️',color:'#2563EB',bg:'#EFF6FF'},
  settlement:{lbl:'정산', ico:'💰',color:'#059669',bg:'#ECFDF5'},
};
const INF_CATS=['육아','여행','뷰티','다이어트','교육','생활/살림','요리','주방','패션','반려동물','운동/헬스','맛집','인테리어','자동차','IT/테크'];
const PTASK_CATS=['미팅','업체연락','샘플신청','장기 업무','개인 약속','개인메모','기타'];
const PTASK_COLORS={'미팅':'#BFDBFE','업체연락':'#FDE68A','샘플신청':'#A7F3D0','장기 업무':'#E9D5FF','개인 약속':'#FBCFE8','개인메모':'#FEF08A','기타':'#E2E8F0'};
const PTASK_ICOS={'미팅':'🤝','업체연락':'📞','샘플신청':'📦','장기 업무':'📋','개인 약속':'🗓️','개인메모':'📌','기타':'🔖'};
const PTASK_PRIORITY={HIGH:'🔴 긴급',MID:'🟡 보통',LOW:'🟢 낮음'};
const DAYS_=['일','월','화','수','목','금','토'];
const MONTHS_=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

/* ════════════════════════════════════════════════
   2. HELPERS (no name conflicts — calcSettleDate, not autoSettle)
════════════════════════════════════════════════ */
const uid    = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today  = ()=>new Date().toISOString().split('T')[0];
const addDays= (n,b)=>{const d=new Date((b||today())+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]};
const fmtDate= s=>{if(!s)return'';const d=new Date(s+'T00:00:00');return`${d.getMonth()+1}/${d.getDate()}`};
const fmtFull= s=>{if(!s)return'';const d=new Date(s+'T00:00:00');return`${d.getMonth()+1}월 ${d.getDate()}일 ${DAYS_[d.getDay()]}`;};
const diffDays=s=>{if(!s)return null;const d=new Date(s+'T00:00:00');const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000)};
const fmtFollowers=n=>{if(!n)return'';const x=parseInt(n);return x>=10000?`${(x/10000).toFixed(1)}만명`:`${x.toLocaleString()}명`};

// ← renamed to calcSettleDate to avoid collision with any variable named autoSettle
function calcSettleDate(inf){return inf.settlement_date||(inf.scheduleEndDate?addDays(30,inf.scheduleEndDate):'');}

const getCL=inf=>{
  const cl=inf.checklist||{};
  return{
    contact:  {dm:false,reply:false,proposal:false,kakao:false,...(cl.contact||{})},
    sample:   {decided:false,info:false,sent:false,tracking:false,received:false,...(cl.sample||{})},
    operation:{schedule:false,ongoing:false,...(cl.operation||{})},
    closing:  {done:false,settlement_info:false,settled:false,next_recommend:false,...(cl.closing||{})},
  };
};
const getTotalProg=inf=>{const cl=getCL(inf);let done=0,total=0;PHASES.forEach(p=>{p.checks.forEach(c=>{total++;if(cl[p.key][c.k])done++;});});return{done,total}};

function getNextAct(inf){
  const ph=PM[inf.phase||1];const cl=getCL(inf);const phCl=cl[ph.key];
  for(const c of ph.checks){
    if(!phCl[c.k]){
      if(c.k==='settled'){
        const sd=calcSettleDate(inf);
        return{cat:c.cat,action:`정산 진행${sd?` (${fmtDate(sd)})`:''}`,urg:sd?diffDays(sd)<=3:false};
      }
      return{cat:c.cat,action:c.lbl,urg:c.urg};
    }
  }
  if(inf.phase<4)return{cat:'contact',action:`${inf.phase+1}단계(${PM[inf.phase+1].label})로 이동`,urg:false};
  return null;
}

/* ════════════════════════════════════════════════
   3. MIGRATION (v3/v4/v5 → v6)
════════════════════════════════════════════════ */
function migrateInf(inf){
  if(inf.phase)return inf;
  const sm={dm_sent:{phase:1,contact:{dm:true}},replied:{phase:1,contact:{dm:true,reply:true}},kakao_req:{phase:1,contact:{dm:true,reply:true,proposal:true}},proposal:{phase:1,contact:{dm:true,reply:true,proposal:true}},decided:{phase:2,sample:{decided:true}},delivery_info:{phase:2,sample:{decided:true,info:true}},sample_req:{phase:2,sample:{decided:true,info:true}},tracking:{phase:2,sample:{decided:true,info:true,sent:true,tracking:true}},delivery_ok:{phase:2,sample:{decided:true,info:true,sent:true,tracking:true,received:true}},sch_set:{phase:3,operation:{schedule:true}},link_sent:{phase:3,operation:{schedule:true}},ongoing:{phase:3,operation:{schedule:true,ongoing:true}},done:{phase:4,closing:{done:true}},settle_soon:{phase:4,closing:{done:true,settlement_info:true}},settled:{phase:4,closing:{done:true,settlement_info:true,settled:true}}};
  const m=sm[inf.stage]||{phase:1};const cl={contact:{},sample:{},operation:{},closing:{}};
  const phKey=PM[m.phase].key;Object.assign(cl[phKey],m[phKey]||{});
  return{...inf,phase:m.phase,checklist:cl,recipient_name:inf.sampleRecipient||inf.recipient_name||'',recipient_phone:inf.samplePhone||inf.recipient_phone||'',recipient_address:inf.sampleAddress||inf.recipient_address||'',sample_detail:inf.sampleProduct||inf.sample_detail||'',instagramUrl:inf.instagramUrl||inf.channel_url||''};
}

/* ════════════════════════════════════════════════
   4. PRODUCT COLORS
════════════════════════════════════════════════ */
const PALETTE=['#FECDD3','#FED7AA','#FEF08A','#BBF7D0','#A7F3D0','#BAE6FD','#C7D2FE','#E9D5FF','#FBCFE8','#DDD6FE','#CFFAFE','#D1FAE5','#FEE2E2','#FDE68A','#E0F2FE','#FCE7F3','#ECFDF5','#EFF6FF','#FFF7ED','#F5F3FF'];
let _pcMap={};try{_pcMap=JSON.parse(localStorage.getItem('pc_v6p')||'{}');}catch{}
function getProductColor(name){
  if(!name)return'#1E88E5';const k=name.trim().toLowerCase();
  if(_pcMap[k])return _pcMap[k];
  const used=new Set(Object.values(_pcMap));
  const next=PALETTE.find(c=>!used.has(c))||PALETTE[Object.keys(_pcMap).length%PALETTE.length];
  _pcMap[k]=next;localStorage.setItem('pc_v6p',JSON.stringify(_pcMap));return next;
}
function warmProductColors(infs){infs.forEach(i=>{const p=i.negotiating_product||i.product;if(p)getProductColor(p);});}
function getProductLegend(infs){const seen=new Map();infs.forEach(i=>{const p=i.negotiating_product||i.product;if(p&&i.scheduleDate)seen.set(p.trim(),getProductColor(p));});return[...seen.entries()].map(([n,c])=>({name:n,color:c}));}

/* ════════════════════════════════════════════════
   5. IndexedDB
════════════════════════════════════════════════ */
const DB_NAME='gm_v6',DB_VER=1,IS='influencers',TS='personal_tasks';
let db=null;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(IS))d.createObjectStore(IS,{keyPath:'id'});if(!d.objectStoreNames.contains(TS))d.createObjectStore(TS,{keyPath:'id'});};r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=e=>rej(e.target.error);});}
const dbAll  =(s)=>new Promise((res,rej)=>{const t=db.transaction(s,'readonly');const r=t.objectStore(s).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
const dbPut  =(s,item)=>new Promise((res,rej)=>{const t=db.transaction(s,'readwrite');const r=t.objectStore(s).put(item);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const dbDel  =(s,id)=>new Promise((res,rej)=>{const t=db.transaction(s,'readwrite');const r=t.objectStore(s).delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const dbClear=(s)=>new Promise((res,rej)=>{const t=db.transaction(s,'readwrite');const r=t.objectStore(s).clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const dbCount=(s)=>new Promise(res=>{const t=db.transaction(s,'readonly');const r=t.objectStore(s).count();r.onsuccess=()=>res(r.result);r.onerror=()=>res(0);});

/* ════════════════════════════════════════════════
   6. BACKUP / RESTORE
════════════════════════════════════════════════ */
async function exportData(){
  const infs=await dbAll(IS);const tasks=await dbAll(TS);
  const blob=new Blob([JSON.stringify({version:6,exportDate:new Date().toISOString(),influencers:infs,tasks},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  const d=new Date();a.href=url;a.download=`공구매니저_백업_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;a.click();URL.revokeObjectURL(url);
  showToast(`✅ 백업 완료 (${infs.length}명 + 업무 ${tasks.length}건)`);
}
async function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const json=JSON.parse(e.target.result);
      const infs=(json.influencers||json.data||[]).map(migrateInf);
      const tasks=json.tasks||[];
      if(!confirm(`인플루언서 ${infs.length}명 + 업무 ${tasks.length}건 불러올까요?`))return;
      for(const i of infs)await dbPut(IS,i);
      for(const t of tasks)await dbPut(TS,t);
      data=await dbAll(IS);pTasks=await dbAll(TS);render();updateInfBadge();showToast('✅ 불러오기 완료!');
    }catch{alert('파일 형식이 올바르지 않아요.');}
    event.target.value='';
  };reader.readAsText(file);
}

/* ════════════════════════════════════════════════
   7. GOOGLE DRIVE SYNC
   (onGapiLoad / onGisLoad defined here — called by scripts at bottom of body)
════════════════════════════════════════════════ */
const GD_FILE='공구매니저_데이터.json',GD_SCOPE='https://www.googleapis.com/auth/drive.file';
let gdClientId=localStorage.getItem('gd_client_id')||'';
let gdFileId  =localStorage.getItem('gd_file_id')||'';
let isGD=false,isSyncing=false,tokenClient=null,gapiReady=false,gisReady=false;

function onGapiLoad(){gapi.load('client',async()=>{await gapi.client.init({});await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');gapiReady=true;maybeAutoConnect();});}
function onGisLoad(){gisReady=true;maybeAutoConnect();}
function maybeAutoConnect(){if(!gapiReady||!gisReady||!gdClientId)return;setupTokenClient();tokenClient.requestAccessToken({prompt:''});}
function setupTokenClient(){if(!window.google?.accounts?.oauth2)return;tokenClient=google.accounts.oauth2.initTokenClient({client_id:gdClientId,scope:GD_SCOPE,callback:handleGDToken,error_callback:err=>{if(err.type==='popup_closed'||err.type==='popup_failed_to_open')return;isGD=false;updateGDUI();}});}
async function handleGDToken(resp){if(resp.error){isGD=false;updateGDUI();return;}isGD=true;gapi.client.setToken({access_token:resp.access_token});updateGDUI();await gdLoad();render();showToast('☁️ 구글드라이브 연동 완료!',3000);}
function gdConnect(){if(isGD){gdDisconnect();return;}if(!gdClientId){showGDModal();return;}if(!gapiReady||!gisReady){showToast('⏳ API 로딩 중...');return;}setupTokenClient();tokenClient.requestAccessToken({prompt:'consent'});}
async function gdDisconnect(){if(!confirm('연동 해제할까요?'))return;const t=gapi.client.getToken();if(t)google.accounts.oauth2.revoke(t.access_token,()=>{});gapi.client.setToken(null);isGD=false;updateGDUI();render();showToast('🔌 드라이브 연동 해제됨');}
async function gdLoad(){
  if(!isGD)return;isSyncing=true;updateGDUI();
  try{
    if(!gdFileId){const r=await gapi.client.drive.files.list({q:`name='${GD_FILE}' and trashed=false`,fields:'files(id)',spaces:'drive',pageSize:1});const f=r.result.files;if(f&&f.length){gdFileId=f[0].id;localStorage.setItem('gd_file_id',gdFileId);}}
    if(gdFileId){
      const r=await gapi.client.drive.files.get({fileId:gdFileId,alt:'media'});
      const json=JSON.parse(r.body);
      const dInfs=(json.influencers||json||[]).map(migrateInf);
      const dTasks=json.tasks||[];
      const lInfs=await dbAll(IS);const lTasks=await dbAll(TS);
      const mInfs=mergeArr(lInfs,dInfs);const mTasks=mergeArr(lTasks,dTasks);
      await dbClear(IS);for(const i of mInfs)await dbPut(IS,i);
      await dbClear(TS);for(const t of mTasks)await dbPut(TS,t);
      data=mInfs;pTasks=mTasks;
    }else await gdSaveNow();
  }catch(e){console.error('GDrive load:',e);showToast('⚠️ 드라이브 동기화 실패 (로컬 사용)');}
  isSyncing=false;updateGDUI();
}
let _gdTimer=null;
function gdSave(){if(!isGD)return;clearTimeout(_gdTimer);_gdTimer=setTimeout(gdSaveNow,1500);}
async function gdSaveNow(){
  if(!isGD)return;isSyncing=true;updateGDUI();
  try{
    const content=JSON.stringify({version:6,influencers:data,tasks:pTasks});
    const b='gm6_bound';
    const body=[`--${b}`,'Content-Type: application/json; charset=UTF-8','',JSON.stringify({name:GD_FILE,mimeType:'application/json'}),`--${b}`,'Content-Type: application/json','',content,`--${b}--`].join('\r\n');
    if(gdFileId){await gapi.client.request({path:`/upload/drive/v3/files/${gdFileId}`,method:'PATCH',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${b}`},body});}
    else{const r=await gapi.client.request({path:'/upload/drive/v3/files',method:'POST',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${b}`},body});gdFileId=r.result.id;localStorage.setItem('gd_file_id',gdFileId);}
  }catch(e){console.error('GDrive save:',e);showToast('⚠️ 드라이브 저장 실패');}
  isSyncing=false;updateGDUI();
}
function mergeArr(local,remote){const map={};[...remote,...local].forEach(item=>{const ex=map[item.id];if(!ex){map[item.id]=item;return;}const et=new Date(ex.updatedAt||ex.createdAt||0).getTime();const nt=new Date(item.updatedAt||item.createdAt||0).getTime();if(nt>=et)map[item.id]=item;});return Object.values(map);}
function updateGDUI(){
  const sb=document.getElementById('sb-gd'),mb=document.getElementById('m-gd');
  if(isSyncing){const t='<span class="sdot" style="background:#60A5FA"></span>동기화 중...';if(sb)sb.innerHTML=t;if(mb)mb.innerHTML='🔄';}
  else if(isGD){if(sb){sb.innerHTML='☁️ 드라이브 연동됨 ✓';sb.classList.add('on');}if(mb){mb.innerHTML='☁️✓';mb.classList.add('on');}}
  else{if(sb){sb.innerHTML='☁️ 구글드라이브 연동';sb.classList.remove('on');}if(mb){mb.innerHTML='☁️';mb.classList.remove('on');}}
}
function showGDModal(){
  const isFile=window.location.protocol==='file:';
  const ov=mkOv('gd-modal');
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()"><div class="m-hnd"></div>
    <div class="m-head">☁️ 구글드라이브 연동<button class="m-x" onclick="closeId('gd-modal')">✕</button></div>
    <div class="m-sub">PC·모바일 어디서든 자동 동기화!</div>
    ${isFile?`<div class="warn-box"><b style="color:#EF4444">⚠️ 파일로 열면 드라이브 연동이 안 돼요</b><br><br>GitHub Pages에 올린 후 사용해주세요.<button onclick="closeId('gd-modal');showGHModal()" style="margin-top:8px;background:#4F46E5;color:white;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;border:none;cursor:pointer;display:block">📖 GitHub Pages 가이드</button></div>`:''}
    <div class="guide-box"><b style="font-size:12px;color:#4F46E5">⚙️ Google Cloud 설정 (처음 한 번만)</b><div class="guide-step" style="margin-top:8px">① <a href="https://console.cloud.google.com" target="_blank">console.cloud.google.com</a> 접속<br>② 새 프로젝트 만들기<br>③ Google Drive API 사용 설정<br>④ 사용자 인증 정보 → OAuth 클라이언트 ID<br>⑤ 애플리케이션 유형: <b>웹 애플리케이션</b><br>⑥ 승인된 JavaScript 원본에 앱 URL 추가<br>&nbsp;&nbsp;&nbsp;예: <code>https://내아이디.github.io</code><br>⑦ 클라이언트 ID 복사</div></div>
    <div class="guide-box"><b style="font-size:12px;color:#4F46E5">🔑 클라이언트 ID 입력</b>
    <div class="field" style="margin-top:8px"><label>Google OAuth 클라이언트 ID</label><input id="gd-cid" value="${gdClientId}" placeholder="000000000000-xxxxx.apps.googleusercontent.com" style="font-size:12px"></div></div>
    <div class="btn-row"><button class="btn-c" onclick="closeId('gd-modal')">취소</button><button class="btn-s" onclick="saveGDCid()">연동 시작 ☁️</button></div>

/* Section 1: Urgent + Today */
function buildUrgent(){
  const t=today();const items=[];
  const addDays3=addDays(3);

  /* ── ① 날짜 임박 ── */
  // 공구 시작일 D-3 이내
  data.forEach(inf=>{
    if(!inf.scheduleDate)return;
    const dv=diffDays(inf.scheduleDate);
    if(dv===null||dv<0||dv>3)return;
    const dvTxt=dv===0?'오늘 시작!':dv===1?'내일 시작':`D-${dv} 시작`;
    const ph=PM[inf.phase||1];
    items.push({type:'inf',id:inf.id,name:inf.name,nickname:inf.nickname||'',
      product:inf.negotiating_product||inf.product||'',phase:ph,
      urgReason:`🗓️ 공구 ${dvTxt} — ${fmtDate(inf.scheduleDate)}`,
      cat:'operation',date:t,isToday:dv===0,dv});
  });
  // 3일 내 정산 마감
  data.forEach(inf=>{
    const sd=calcSettleDate(inf);if(!sd)return;
    const dv=diffDays(sd);if(dv===null||dv>3||dv<0)return;
    if(getCL(inf).closing.settled)return;
    const dvTxt=dv===0?'오늘 정산!':dv===1?'내일 정산':`D-${dv} 정산`;
    items.push({type:'settle',id:inf.id,name:inf.name,nickname:inf.nickname||'',
      product:inf.negotiating_product||inf.product||'',
      settleDate:sd,dv,dvTxt,isToday:dv===0,
      urgReason:`💰 정산 ${dvTxt} — ${fmtDate(sd)}`});
  });
  // 오늘 개인 업무 + HIGH 우선순위
  pTasks.filter(p=>!p.done&&(p.date===t||p.priority==='HIGH')).forEach(p=>{
    if(items.some(i=>i.id===p.id))return;
    items.push({type:'personal',id:p.id,title:p.title,category:p.category,
      priority:p.priority||'MID',time:p.time,notes:p.notes,url:p.url,
      date:p.date,isToday:p.date===t});
  });

  /* ── ② 공구 일정 있는데 빠진 것 ── */
  data.forEach(inf=>{
    const cl=getCL(inf);const ph=inf.phase||1;
    const dv=inf.scheduleDate?diffDays(inf.scheduleDate):null;
    // 공구 시작 D-3 이내인데 결제링크 없음
    if(inf.scheduleDate&&dv!==null&&dv>=0&&dv<=3&&!inf.paymentLink&&!cl.operation.schedule)
      items.push({type:'warn',id:inf.id,name:inf.name,nickname:inf.nickname||'',
        product:inf.negotiating_product||inf.product||'',
        issue:`🔗 공구 D-${dv}, 결제링크 미전달`,suggest:'결제링크를 인플루언서에게 전달하세요'});
    // 공구확정인데 샘플 미발송
    if(ph>=3&&!cl.sample.sent)
      items.push({type:'warn',id:inf.id,name:inf.name,nickname:inf.nickname||'',
        product:inf.negotiating_product||inf.product||'',
        issue:'📦 공구확정인데 샘플 미발송',suggest:'샘플을 발송하고 체크리스트를 업데이트하세요'});
  });

  /* ── ③ 오래 방치된 것 (14일/21일 무응답) ── */
  data.filter(inf=>(inf.phase||1)===1).forEach(inf=>{
    const ref=new Date(inf.updatedAt||inf.createdAt||Date.now());
    const daysSince=Math.floor((new Date()-ref)/86400000);
    if(daysSince>=14&&daysSince<=16)
      items.push({type:'warn',id:inf.id,name:inf.name,nickname:inf.nickname||'',
        product:inf.negotiating_product||inf.product||'',
        issue:`🚨 1차 재연락 필요 (${daysSince}일 경과)`,suggest:'한 번 더 연락해보세요'});
    else if(daysSince>=21&&daysSince<=23)
      items.push({type:'warn',id:inf.id,name:inf.name,nickname:inf.nickname||'',
        product:inf.negotiating_product||inf.product||'',
        issue:`⚠️ 최종 확인 필요 (${daysSince}일 경과)`,suggest:'마지막으로 연락 후 미응답 시 보류 고려'});
  });

  // 중요도 순 정렬: 오늘 > D-1 > D-2 > D-3
  return items.sort((a,b)=>{
    const da=a.dv??99,db=b.dv??99;
    if(a.isToday&&!b.isToday)return -1;
    if(!a.isToday&&b.isToday)return 1;
    return da-db;
  });
}

function catTagsHTML(category,fontSize,inline){

  if(inline)return tagSpans; // 인라인: span만 반환

function buildGonggu(){

  return data

    .sort((a,b)=>a.scheduleDate.localeCompare(b.scheduleDate))

      product:inf.negotiating_product||inf.product||'',
      nickname:inf.nickname||'',
      category:inf.category||'',
      start:inf.scheduleDate,end:inf.scheduleEndDate,

/* Section 3: Sample — not-sent OR not-received regardless of date */
function buildSample(){
  return data.filter(inf=>{
    const cl=getCL(inf);
    // Phase 2+ and either sent or received not completed
    return inf.phase>=2&&(!cl.sample.sent||!cl.sample.received);
  }).map(inf=>({
    id:inf.id,name:inf.name,nickname:inf.nickname||'',product:inf.negotiating_product||inf.product||'',category:inf.category||'',
    phase:PM[inf.phase||1],cl:getCL(inf),
    detail:inf.sample_detail||'',
    sentDate:inf.sampleSentDate||'',
    tracking:inf.trackingNumber||'',
  }));
}

/* Section 4: Settlement — next 30 days */
function buildSettlement(){
  const t=today();const e=addDays(30);
  return data.filter(inf=>{
    const sd=calcSettleDate(inf);
    const cl=getCL(inf);
    return sd&&sd>=t&&sd<=e&&!cl.closing.settled;
  }).sort((a,b)=>{
    const sa=calcSettleDate(a),sb=calcSettleDate(b);return sa.localeCompare(sb);
  }).map(inf=>({
    id:inf.id,name:inf.name,nickname:inf.nickname||'',product:inf.negotiating_product||inf.product||'',category:inf.category||'',
    settleDate:calcSettleDate(inf),phase:PM[inf.phase||1],
  }));
}

/* Section 5: Contact — Smart Remind Logic
   - Phase 1 only
   - daysSince = days since updatedAt/createdAt
   - < 7: show normally
   - 7-13: hide
   - 14-16: show with 🚨 1차 재연락
   - 17-20: hide
   - 21-23: show with ⚠️ 최종 확인
   - 24+: hide
*/
function buildContact(){
  const t=today();
  return data
    .filter(inf=>inf.phase===1)
    .map(inf=>{
      const ref=new Date(inf.updatedAt||inf.createdAt||Date.now());
      const daysSince=Math.floor((new Date()-ref)/86400000);
      let show=false;let remindLabel='';
      if(daysSince<7){show=true;remindLabel='';}
      else if(daysSince>=14&&daysSince<=16){show=true;remindLabel='remind14';}
      else if(daysSince>=21&&daysSince<=23){show=true;remindLabel='remind21';}
      else{show=false;}
      return{id:inf.id,name:inf.name,nickname:inf.nickname||'',instagram:inf.instagram||'',chat_history:inf.chat_history||'',product:inf.negotiating_product||inf.product||'',
        phase:PM[inf.phase||1],na:getNextAct(inf),daysSince,remindLabel,show};
    })
    .filter(x=>x.show);
}

/* Section 6: Personal — incomplete, within 30 days */
function buildPersonal(){
  const t=today();const e=addDays(30);
  const priOrder={HIGH:0,MID:1,LOW:2};
  return pTasks
    .filter(p=>{
      if(p.done||p.priority==='HIGH')return false; // HIGH는 긴급 섹션에서 표시
      if(!p.date)return false;
      // 기간 업무: 시작~종료 범위 내 또는 시작일 30일 이내
      const endOk=p.endDate?p.endDate>=t:true;
      return p.date<=e&&endOk;
    })
    .sort((a,b)=>{
      const po=(priOrder[a.priority||'MID']||1)-(priOrder[b.priority||'MID']||1);
      if(po!==0)return po;
      return a.date.localeCompare(b.date);
    });
}

    function elH(sel){const e=document.querySelector(sel);return e?e.offsetHeight:0;}
    if(isPageScroll){
      // PC: .page가 position:relative라서 offsetParent 체인이 .page에서 정확히 멈춤
      const navH=elH('#dash-nav');
      let elTop=0,node=el;
      while(node&&node!==pageEl){elTop+=node.offsetTop;node=node.offsetParent;}
      pageEl.scrollTo({top:elTop-navH-8,behavior:'smooth'});
    } else {
      // 모바일: mob-hdr만 (dash-nav는 z-index상 mob-hdr 뒤)
      const offset=elH('.mob-hdr')+8;
      const target=el.getBoundingClientRect().top+window.pageYOffset-offset;
      window.scrollTo({top:target,behavior:'smooth'});
    }
  },80);
}

/* ── CALENDAR ── */
function rCal(){
  warmProductColors(data);
  const spans=[],points=[];
  data.forEach(inf=>{
    const pc=getProductColor(inf.negotiating_product||inf.product);
    if(inf.scheduleDate){const e=inf.scheduleEndDate||inf.scheduleDate;spans.push({id:inf.id,label:`${inf.name} · ${inf.negotiating_product||inf.product||''}`,shortLabel:inf.name+(inf.nickname?`(${inf.nickname})`:'')+' ',product:inf.negotiating_product||inf.product||'',name:inf.name,nickname:inf.nickname||'',start:inf.scheduleDate,end:e,color:pc,cat:'gonggu'});}
    if(inf.sampleSentDate){const tr=inf.trackingNumber?` (${inf.trackingNumber})`:'';const infNickS=inf.nickname?`(${inf.nickname})`:'';points.push({id:inf.id,label:`샘플 · ${inf.name}${infNickS}${tr}`,shortLabel:`${inf.name}${infNickS}`,ptCategory:'샘플',date:inf.sampleSentDate,color:'#FED7AA',cat:'work'});points.push({id:inf.id,label:`배송확인 · ${inf.name}${infNickS}`,shortLabel:`${inf.name}${infNickS}`,ptCategory:'배송확인',date:addDays(2,inf.sampleSentDate),color:'#FBCFE8',cat:'work'});}
    const sd=calcSettleDate(inf);
    if(sd){const cl=getCL(inf);const infNickSt=inf.nickname?`(${inf.nickname})`:'';if(!cl.closing.settled)points.push({id:inf.id,label:`정산 · ${inf.name}${infNickSt}`,shortLabel:`${inf.name}${infNickSt}`,ptCategory:'정산',date:sd,color:'#A7F3D0',cat:'work'});}
  });
  pTasks.filter(p=>!p.done&&p.date).forEach(p=>{
    const c=PTASK_COLORS[p.category]||'#94A3B8';
    if(p.endDate&&p.endDate>p.date){
      // 기간 업무 → spans 바로 추가
      spans.push({id:p.id,label:`${p.category} · ${p.title}`,shortLabel:p.title,product:'',name:p.title,nickname:'',start:p.date,end:p.endDate,color:c,cat:'work',isPT:true,isTaskSpan:true});
    } else {
      points.push({id:p.id,label:`${p.category} · ${p.title}`,shortLabel:p.title,category:p.category,notes:p.notes||'',time:p.time||'',date:p.date,color:c,cat:'work',isPT:true,url:p.url||''});
    }
  });
  const modeSpans =calMode==='gonggu'
    ? spans.filter(sp=>!sp.isTaskSpan)        // 공구 캘린더: 인플루언서 공구 바만
    : spans.filter(sp=>sp.isTaskSpan);        // 업무 캘린더: 기간 업무 바만
  const modePoints=calMode==='work'?points:[];
  const first=new Date(calY,calM,1);const lastDate=new Date(calY,calM+1,0).getDate();const dow=first.getDay();
  const pm=new Date(calY,calM,0).getDate();
  let cells=[];
  for(let i=dow-1;i>=0;i--)cells.push({d:pm-i,dim:true,date:null});
  for(let d=1;d<=lastDate;d++){const m=(calM+1).toString().padStart(2,'0');const dd=d.toString().padStart(2,'0');cells.push({d,dim:false,date:`${calY}-${m}-${dd}`});}
  while(cells.length%7)cells.push({d:cells.length-dow-lastDate+1,dim:true,date:null});
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
  const t=today();

  const weeksHTML=weeks.map(wk=>{
    const wkD=wk.map(c=>c.date).filter(Boolean);const ws=wkD[0],we=wkD[wkD.length-1];
    if(!ws)return`<div class="cal-week">${wk.map(c=>cellH(c,t)).join('')}</div>`;
    const activeSpans=modeSpans.filter(sp=>sp.start<=we&&sp.end>=ws);const rows=[];
    activeSpans.forEach(sp=>{const sc=sp.start<ws?0:wk.findIndex(c=>c.date===sp.start);const ec=sp.end>we?6:wk.findLastIndex(c=>c.date===sp.end);const s=sc<0?0:sc,e=ec<0?6:ec;for(let r=0;r<5;r++){if(!rows[r])rows[r]=[];if(!rows[r].some(x=>!(x.e<s||x.s>e))){rows[r].push({sp,s,e});break;}}});
    const ptsByDay={};modePoints.forEach(pt=>{if(pt.date>=ws&&pt.date<=we){if(!ptsByDay[pt.date])ptsByDay[pt.date]=[];ptsByDay[pt.date].push(pt);}});
    const cw=100/7;let bars='';
    const BAR_H=38;rows.forEach((row,ri)=>{row.forEach(({sp,s,e})=>{const left=(s*cw).toFixed(2)+'%';const width=((e-s+1)*cw-.3).toFixed(2)+'%';const top=(ri*BAR_H+2)+'px';const isS=sp.start>=ws,isE=sp.end<=we;const r2=isS&&isE?'5px':isS?'5px 2px 2px 5px':isE?'2px 5px 5px 2px':'2px';const nameHtml=`<span class="evb-n">${sp.shortLabel}</span>`;const prodHtml=sp.product?`<span class="evb-p">${sp.product}</span>`:'';const barFn=sp.isTaskSpan?`openTaskEdit('${sp.id}')`:`openEdit('${sp.id}')`;bars+=`<div class="ev-bar" onclick="${barFn}" style="left:${left};width:${width};top:${top};background:${sp.color};border-radius:${r2}">${nameHtml}${prodHtml}</div>`;});});
    const ptRow=rows.length;
    wk.forEach((cell,ci)=>{if(!cell.date)return;(ptsByDay[cell.date]||[]).forEach((pt,pi)=>{const top=((ptRow+pi)*BAR_H+2)+'px';const left=(ci*cw).toFixed(2)+'%';const width=(cw-.3).toFixed(2)+'%';const fn=pt.isPT?`openTaskEdit('${pt.id}')`:`openEdit('${pt.id}')`;const ptCat=pt.isPT?pt.category:(pt.ptCategory||'');const ptInner=ptCat?`<span class="evp-c">${ptCat}</span><span class="evp-t">${pt.shortLabel}</span>`:`<span class="evp-t">${pt.shortLabel}</span>`;bars+=`<div class="ev-pt" onclick="${fn}" style="left:${left};width:${width};top:${top};background:${pt.color}">${ptInner}</div>`;});});
    const maxR=ptRow+Math.max(0,...Object.values(ptsByDay).map(a=>a.length),0);const mh=Math.max(90,32+maxR*BAR_H+4);
    return`<div class="cal-week" style="min-height:${mh}px">${wk.map(c=>cellH(c,t)).join('')}<div class="ev-layer">${bars}</div></div>`;
  }).join('');

  const selEvs=[];
  if(selDate){modeSpans.forEach(sp=>{if(sp.start<=selDate&&selDate<=sp.end)selEvs.push({...sp,isSpan:true});});modePoints.forEach(pt=>{if(pt.date===selDate)selEvs.push({...pt,isSpan:false});});}
  const selD=selDate?new Date(selDate+'T00:00:00'):null;
  const selLbl=selD?`${selD.getMonth()+1}월 ${selD.getDate()}일 ${DAYS_[selD.getDay()]}요일`:'';
  // 캘린더 하단 패널 — 대시보드 카드 형식
  function ddCard(e){
    if(e.isSpan){
      // 공구 기간 → gc 카드 형식
      const d=diffDays(e.start),de=diffDays(e.end);
      const isLive=d<=0&&de>=0;const pct=isLive?Math.round(((-d)/((-d)+de+1))*100):0;
      const statusLbl=isLive?'진행중 🔥':d===0?'오늘 시작':d>0?`D-${d}`:'';
      const cardCls=isLive?'live':d===0?'today-start':'';
      const nameWithNick=e.name+(e.nickname?` <span style="color:#5B21B6;font-weight:800">(${e.nickname})</span>`:'');
      return`<div class="gc ${cardCls}" onclick="openEdit('${e.id}')">
        <div class="gc-color-stripe" style="background:${e.color}"></div>
        <div class="gc-row1"><div class="gc-name">${nameWithNick}</div><span class="gc-status ${isLive?'live':d===0?'today':'soon'}">${statusLbl||'예정'}</span></div>
        <div class="gc-product">${e.product}</div>
        ${isLive?`<div class="gc-prog"><div class="gc-prog-fill" style="width:${pct}%;background:${e.color}"></div></div>`:''}
        <div class="gc-dates"><span class="gc-date-txt">📅 ${fmtDate(e.start)} ~ ${fmtDate(e.end)}</span>${isLive?`<span class="gc-d" style="color:#2563EB">진행 ${Math.abs(d)+1}일차</span>`:''}</div>
      </div>`;
    }
    // 업무/포인트 → ptc 카드 형식
    const cat=e.isPT?e.category:(e.ptCategory||'');
    const ico=PTASK_ICOS[cat]||'📋';
    const c2=PTASK_COLORS[cat]||e.color||'#94A3B8';
    const titleTxt=e.isPT?e.shortLabel:(e.shortLabel||'');
    const fn=e.isPT?`openTaskEdit('${e.id}')`:`openEdit('${e.id}')`;
    const dv2=e.date?diffDays(e.date):null;
    const dvTxt2=dv2===0?'오늘':dv2===1?'내일':dv2>0?`D-${dv2}`:'';
    return`<div class="ptc" onclick="${fn}">
      <div class="ptc-ico" style="background:${c2}35;color:#1E1B4B">${ico}</div>
      <div class="ptc-body">
        <div class="ptc-date">${e.date?fmtFull(e.date):''}${e.time?` · ${e.time}`:''}</div>
        <div class="ptc-title">${titleTxt}</div>
        ${e.notes?`<div class="ptc-memo">"${e.notes.slice(0,55)}${e.notes.length>55?'...':''}"</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        ${cat?`<span class="ptc-badge" style="background:${c2}35;color:#1E1B4B;border:1px solid ${c2}">${cat}</span>`:''}
        ${dvTxt2?`<span style="font-size:12px;font-weight:800;color:${dv2===0?'#DC2626':dv2<=3?'#D97706':'#94A3B8'}">${dvTxt2}</span>`:''}
      </div>
    </div>`;
  }
  const ddContent=selEvs.length
    ?`<div class="dd-hdr">📌 ${selLbl} · ${selEvs.length}건</div>${selEvs.map(e=>ddCard(e)).join('')}`
    :(selDate?`<div class="dd-hdr">🗓️ ${selLbl}</div><div style="font-size:12px;color:#94A3B8;padding:8px 0">일정 없음</div>`:'');
  const ddPanel=ddContent?`<div class="day-detail-panel">${ddContent}</div>`:'';

  const prodLeg=calMode==='gonggu'?getProductLegend(data).map(p=>`<div class="leg-it"><div class="leg-dot" style="background:${p.color}"></div><span style="max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span></div>`).join(''):'';
  const workLeg=calMode==='work'?`<div class="leg-it"><div class="leg-dot" style="background:#FED7AA"></div>샘플</div><div class="leg-it"><div class="leg-dot" style="background:#A7F3D0"></div>정산</div>${Object.entries(PTASK_COLORS).map(([k,v])=>`<div class="leg-it"><div class="leg-dot" style="background:${v}"></div>${k}</div>`).join('')}`:'';

  const calCore=`
    <div class="cal-mode-row"><button class="cal-mode-btn${calMode==='gonggu'?' on':''}" onclick="setCalMode('gonggu')">🛍️ 공구 캘린더</button><button class="cal-mode-btn${calMode==='work'?' on':''}" onclick="setCalMode('work')">📝 업무 캘린더</button></div>
    <div class="legend-row">${prodLeg}${workLeg}</div>
    <div class="cal-nav"><button class="cal-arr" onclick="calMove(-1)">‹</button><span class="cal-month-lbl">${calY}년 ${MONTHS_[calM]}</span><button class="cal-arr" onclick="calMove(1)">›</button></div>
    <div class="cal-grid-box"><div class="cal-dow-row">${['일','월','화','수','목','금','토'].map(d=>`<div>${d}</div>`).join('')}</div><div class="cal-weeks-wrap">${weeksHTML}</div></div>`;

  // 캘린더 풀 width + 일자 상세 하단 배치 (PC/모바일 동일)
  return`<div class="cal-body-pc"><div class="cal-main-pc"><div class="cal-wrap">${calCore}</div></div>${ddPanel?`<div class="cal-side-pc">${ddPanel}</div>`:''}</div>`;
}
function cellH(cell,t){const isTd=cell.date===t,isSel=cell.date===selDate;return`<div class="cal-cell${isTd?' today-cell':''}${isSel&&!isTd?' sel-cell':''}${cell.dim?' dim-cell':''}" onclick="${cell.date?`selectDate('${cell.date}')`:''}" ><div class="day-num">${cell.d}</div></div>`;}
function calMove(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}rContent();}
function selectDate(d){selDate=d;rContent();}
function setCalMode(m){calMode=m;rContent();}

   TASKS TAB

let taskFilter='all',taskSort='date',taskSearch='';

function rTasks(){
  const t=today();
  const priOrder={HIGH:0,MID:1,LOW:2};
  // 검색+필터
  let tasks=pTasks.filter(p=>{
    if(taskFilter==='done')return p.done;
    if(taskFilter==='HIGH')return !p.done&&p.priority==='HIGH';
    if(taskFilter==='MID')return !p.done&&(p.priority||'MID')==='MID';
    if(taskFilter==='LOW')return !p.done&&p.priority==='LOW';
    const catMatch=PTASK_CATS.includes(taskFilter)?p.category===taskFilter:true;
    return !p.done&&catMatch;
  });
  if(taskSearch){const s=taskSearch.toLowerCase();tasks=tasks.filter(p=>(p.title||'').toLowerCase().includes(s)||(p.notes||'').toLowerCase().includes(s)||(p.category||'').toLowerCase().includes(s));}
  // 정렬
  if(taskSort==='priority'){tasks.sort((a,b)=>(priOrder[a.priority||'MID']||1)-(priOrder[b.priority||'MID']||1)||a.date.localeCompare(b.date));}
  else{tasks.sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999'));}
  
  // 기간별 그룹
  const groups=[
    {id:'today',label:'오늘',icon:'🔴',items:[]},
    {id:'week', label:'이번 주',icon:'📅',items:[]},
    {id:'month',label:'이번 달',icon:'📆',items:[]},
    {id:'later',label:'나중에',icon:'🗓️',items:[]},
    {id:'nodate',label:'날짜 없음',icon:'📌',items:[]},
  ];
  const now=new Date(t+'T00:00:00');
  const endOfWeek=new Date(now);endOfWeek.setDate(now.getDate()+(6-now.getDay()));
  const endOfMonth=new Date(now.getFullYear(),now.getMonth()+1,0);
  const ewStr=endOfWeek.toISOString().slice(0,10);
  const emStr=endOfMonth.toISOString().slice(0,10);
  tasks.forEach(p=>{
    if(!p.date){groups[4].items.push(p);return;}
    const d=p.date;
    if(d===t)groups[0].items.push(p);
    else if(d>t&&d<=ewStr)groups[1].items.push(p);
    else if(d>ewStr&&d<=emStr)groups[2].items.push(p);
    else groups[3].items.push(p);
  });
  const doneTasks=pTasks.filter(p=>p.done).sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||'')).slice(0,10);
  
  // 칩 필터
  const filterChips=[
    {v:'all',l:'전체'},
    {v:'HIGH',l:'🔴 긴급'},
    {v:'MID',l:'🟡 보통'},
    {v:'LOW',l:'🟢 낮음'},
    ...PTASK_CATS.map(c=>({v:c,l:c})),
    {v:'done',l:'✅ 완료'},
  ];
  const chips=`<div class="chip-row" style="flex-wrap:wrap;gap:5px 4px">${filterChips.map(f=>`<button class="chip${taskFilter===f.v?' on':''}" onclick="setTaskFilter('${f.v}')">${f.l}</button>`).join('')}</div>`;
  // 정렬 토글
  const sortBtns=`<div style="display:flex;gap:6px;margin-bottom:10px;align-items:center">
    <span style="font-size:11px;color:#94A3B8;font-weight:600">정렬:</span>
    <button onclick="setTaskSort('date')" style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;border:1.5px solid ${taskSort==='date'?'#4F46E5':'#E2E8F0'};background:${taskSort==='date'?'#EEF2FF':'white'};color:${taskSort==='date'?'#4F46E5':'#64748B'};cursor:pointer">날짜순</button>
    <button onclick="setTaskSort('priority')" style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;border:1.5px solid ${taskSort==='priority'?'#4F46E5':'#E2E8F0'};background:${taskSort==='priority'?'#EEF2FF':'white'};color:${taskSort==='priority'?'#4F46E5':'#64748B'};cursor:pointer">중요도순</button>
  </div>`;
  
  function taskCard(p){
    const c=PTASK_COLORS[p.category]||'#94A3B8';const ico=PTASK_ICOS[p.category]||'📋';
    const dv=p.date?diffDays(p.date):null;
    const dvTxt=dv===0?'오늘':dv===1?'내일':dv>0?`D-${dv}`:'';
    const priLbl={HIGH:'🔴',MID:'🟡',LOW:'🟢'}[p.priority||'MID'];
    const isRange=p.endDate&&p.endDate!==p.date;
    const dateTxt=p.date?(isRange?`${fmtDate(p.date)}~${fmtDate(p.endDate)}`:fmtFull(p.date)):'날짜 없음';
    return`<div class="ptc${p.done?' is-done':''}" onclick="openTaskEdit('${p.id}')" style="opacity:${p.done?.6:1}">
      <div class="ptc-ico" style="background:${c}35;color:#1E1B4B">${ico}</div>
      <div class="ptc-body">
        <div class="ptc-date">${dateTxt}${p.time?` · ${p.time}`:''}</div>
        <div class="ptc-title" style="${p.done?'text-decoration:line-through;color:#94A3B8':''}">${priLbl} ${p.title}</div>
        ${p.url?`<div style="font-size:11px;color:#4F46E5;font-weight:600;margin-top:2px">🔗 ${p.url.length>35?p.url.slice(0,35)+'...':p.url}</div>`:''}
        ${p.notes?`<div class="ptc-memo">"${p.notes.slice(0,55)}${p.notes.length>55?'...':''}"</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        <span class="ptc-badge" style="background:${c}35;color:#1E1B4B;border:1px solid ${c}">${p.category||'기타'}</span>
        ${dvTxt&&!p.done?`<span style="font-size:12px;font-weight:800;color:${dv===0?'#DC2626':dv<=3?'#D97706':'#94A3B8'}">${dvTxt}</span>`:''}
        ${p.repeat&&p.repeat!=='none'?`<span style="font-size:9px;color:#94A3B8;font-weight:700">${p.repeat==='weekly'?'매주':'매월'}</span>`:''}
        ${p.done?`<span style="font-size:10px;color:#059669;font-weight:700">완료</span>`:''}
      </div>
    </div>`;
  }
  
  const groupHTML=groups.filter(g=>g.items.length).map(g=>`
    <div style="margin-bottom:20px">
      <div style="font-size:13px;font-weight:800;color:#1E293B;margin-bottom:8px;display:flex;align-items:center;gap:6px">
        ${g.icon} ${g.label} <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:#EEF2FF;color:#4F46E5">${g.items.length}건</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">${g.items.map(taskCard).join('')}</div>
    </div>`).join('');
  
  const doneHTML=doneTasks.length?`<details style="margin-top:8px">
    <summary style="font-size:13px;font-weight:800;color:#94A3B8;cursor:pointer;padding:8px 0;list-style:none;display:flex;align-items:center;gap:6px">
      ✅ 완료된 업무 <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:#F1F5F9;color:#64748B">${pTasks.filter(p=>p.done).length}건</span>
    </summary>
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">${doneTasks.map(taskCard).join('')}</div>
  </details>`:''
  
  const emptyMsg=!groups.some(g=>g.items.length)?`<div class="empty-s"><div class="empty-s-ico">📝</div><div class="empty-s-txt">업무 일정이 없어요</div></div>`:'';
  
  return`<div class="dash-body">
    <div style="background:white;border-radius:14px;padding:12px 14px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:0">
      <input style="width:100%;padding:9px 12px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:13px;font-family:inherit;margin-bottom:10px;outline:none" 
        placeholder="제목, 메모, 카테고리 검색..." value="${taskSearch}"
        oninput="setTaskSearch(this.value)"
        oncompositionstart="_isComposing=true"
        oncompositionend="_isComposing=false;setTaskSearch(this.value)">
      ${chips}
    </div>
    <div style="background:white;border-radius:14px;padding:12px 14px;box-shadow:0 2px 10px rgba(0,0,0,.06)">
      ${sortBtns}${groupHTML}${emptyMsg}${doneHTML}
    </div>
  </div>`;
}

function setTaskFilter(f){taskFilter=f;rContent();}
function setTaskSort(s){taskSort=s;rContent();}
let _taskSearchTimer=null;
function setTaskSearch(v){
  taskSearch=v;
  if(_isComposing)return;
  clearTimeout(_taskSearchTimer);
  _taskSearchTimer=setTimeout(()=>{rContent();},150);
}

function buildInfListHTML(){

    return ms&&(phFilter==='all'||inf.phase===parseInt(phFilter));

  return chips+cards;

function buildInfCards(filtered){return`<div class="inf-grid-wrap">${filtered.map(inf=>{
  const ph=PM[inf.phase||1];const prog=getTotalProg(inf);const na=getNextAct(inf);const cm2=na?CAT_META[na.cat]:null;const cl=getCL(inf);

  const dTags=[inf.scheduleDate?`<span class="dtag" style="background:#EFF6FF;color:#2563EB">📅 ${fmtDate(inf.scheduleDate)}${inf.scheduleEndDate?`~${fmtDate(inf.scheduleEndDate)}`:''}</span>`:'',sd&&!getCL(inf).closing.settled&&inf.phase===4?`<span class="dtag" style="background:#ECFDF5;color:#059669">💰 ${fmtDate(sd)}</span>`:''].filter(Boolean).join('');
  const catTags=(inf.category||'').split(',').map(x=>x.trim()).filter(Boolean);

  const phChecks=ph.checks.map(c=>{const done=!!cl[ph.key][c.k];return`<div class="sc-ck${done?' is-done':''}"><div class="sc-ck-box${done?' done':''}">${done?'✓':''}</div><span class="sc-ck-lbl">${c.lbl}</span></div>`;}).join('');
  return`<div class="inf-card p${ph.id}" onclick="openEdit('${inf.id}')">
    <div class="inf-top"><div><div class="inf-name">${inf.name}${inf.nickname?` <span style="color:#5B21B6;font-weight:800">(${inf.nickname})</span>`:''}${catInline}</div><div class="inf-sub">${iLink}${inf.followers?`<span>· ${fmtFollowers(inf.followers)}</span>`:''}</div></div><span class="ph-badge" style="background:${ph.bg};color:${ph.color}">${ph.ico} ${ph.label}</span></div>
    ${inf.negotiating_product||inf.product?`<div style="font-size:12px;font-weight:700;color:#2563EB;margin-bottom:6px">${inf.negotiating_product||inf.product}</div>`:''}
    <div class="sc-checks">${phChecks}</div>
