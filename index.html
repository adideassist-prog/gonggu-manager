function switchPh(ph){const f=collectInf();_mi={..._mi,...f,phase:ph};modalPh=ph;if(editInf)editInf={...editInf,...f,phase:ph};else editInf={..._mi,id:_mi.id||uid()};closeId('inf-modal');showInfModal();}

async function toggleCk(phId,key,infId){
  // 1. 현재 inf 찾기
  let inf=data.find(x=>x.id===infId)||(editInf?.id===infId?editInf:null);
  const isNew=!data.find(x=>x.id===infId);
  if(!inf&&isNew){
    // 신규: editInf가 없으면 기본값으로 생성
    inf={id:infId,phase:1,checklist:{contact:{},sample:{},operation:{},closing:{}},gongguHistory:[]};
  }
  if(!inf)return;

  // 2. 체크리스트 토글
  const ph=PM[phId];
  const cl=getCL(inf);
  const newVal=!cl[ph.key][key];
  cl[ph.key][key]=newVal;

  // 3. 상태 업데이트
  const updated={...inf,checklist:cl,updatedAt:new Date().toISOString()};
  editInf={...(editInf||{}), ...updated};

  // 4. 기존 인플루언서: DB 저장
  if(!isNew){
    // 정산 완료 이력 자동 저장
    if(key==='settled'&&cl.closing.settled){
      const hist=[...(updated.gongguHistory||[])];
      if(!hist.some(h=>h.product===(inf.negotiating_product||inf.product)&&h.endDate===inf.scheduleEndDate)){
        hist.push({product:inf.negotiating_product||inf.product||'',startDate:inf.scheduleDate||'',endDate:inf.scheduleEndDate||'',settleDate:inf.settlement_date||'',amount:inf.settlementAmount||'',notes:'정산 완료 자동 저장',savedAt:new Date().toISOString()});
        editInf={...editInf,gongguHistory:hist};
        showToast('📜 정산 완료 → 공구 이력에 자동 저장됐어요!');
      }
    }
    await dbPut(IS,editInf);data=await dbAll(IS);
    gdSave();
  }

  // 5. 모달 닫지 않고 DOM만 업데이트
  modalPh=phId;
  const lbl=document.querySelector(`[data-ck='${phId}-${key}']`);
  if(lbl){
    lbl.classList.toggle('ckd',newVal);
    const cb=lbl.querySelector('input[type=checkbox]');
    if(cb)cb.checked=newVal;
    // nxt-tag 재계산
    let nf2=false;
    document.querySelectorAll('.cl-wrap label').forEach(l=>{
      const chk=l.querySelector('input[type=checkbox]');
      const checked=chk&&chk.checked;
      l.classList.remove('nxt-item');
      const t=l.querySelector('.nxt-tag');if(t)t.remove();
      if(!checked&&!nf2){nf2=true;l.classList.add('nxt-item');const s=document.createElement('span');s.className='nxt-tag';s.textContent='다음';l.appendChild(s);}
    });
    // 탭 카운트 업데이트
    PHASES.forEach(p=>{
      const tab=document.querySelector(`.ph-tab[data-ph="${p.id}"]`);
      if(!tab)return;
      const pcl=getCL(editInf)[p.key];
      const done=p.checks.filter(c=>pcl[c.k]).length;
      const ck2=tab.querySelector('.ph-tab-ck');
      if(ck2)ck2.textContent=done+'/'+p.checks.length;
    });
  } else {
    // fallback
    closeId('inf-modal');showInfModal();
  }
}

function toggleCatDrop(){
  const dd=document.getElementById('f-cat-dropdown');
  const box=document.getElementById('f-cat-box');
  const arrow=document.getElementById('cat-arrow');
  if(!dd)return;
  const isOpen=dd.classList.contains('show');
  if(isOpen){dd.classList.remove('show');box.classList.remove('open');arrow.classList.remove('open');}
  else{dd.classList.add('show');box.classList.add('open');arrow.classList.add('open');}
}
function selectCat(cat){
  const inp=document.getElementById('f-cat');
  if(!inp)return;
  let sels=inp.value.split(',').map(x=>x.trim()).filter(Boolean);
  const idx=sels.indexOf(cat);
  if(idx>=0)sels.splice(idx,1);else sels.push(cat);
  inp.value=sels.join(',');
  updateCatUI(sels);
}
function removeCat(cat){
  const inp=document.getElementById('f-cat');
  if(!inp)return;
  let sels=inp.value.split(',').map(x=>x.trim()).filter(Boolean);
  sels=sels.filter(s=>s!==cat);
  inp.value=sels.join(',');
  updateCatUI(sels);
}
function updateCatUI(sels){
  const tags=document.getElementById('f-cat-tags');
  if(tags){
    tags.innerHTML=sels.length
      ?sels.map(s=>`<span class="cat-selected-tag">${s}<button type="button" onclick="event.stopPropagation();removeCat('${s}')">✕</button></span>`).join('')
      :`<span class="cat-select-placeholder">카테고리 선택...</span>`;
  }
  document.querySelectorAll('#f-cat-dropdown .cat-item').forEach(el=>{
    const c=el.dataset.cat;const on=sels.includes(c);
    el.classList.toggle('selected',on);
    el.querySelector('.cat-item-check').textContent=on?'✓':'';
  });
}

async function saveInfModal(id){
  const form=collectInf();const existing=data.find(x=>x.id===id);
  let finalPh=modalPh||editInf?.phase||1;
  if(form.scheduleDate&&finalPh<3)finalPh=3;
  // 신규면 _modalCL, 기존이면 기존 체크리스트 유지
  const finalCL=existing?getCL({...existing,...editInf}):_modalCL;
  const final={...(existing||{}),...form,id,phase:finalPh,checklist:finalCL,checklist:getCL({...existing,...editInf}),gongguHistory:existing?.gongguHistory||editInf?.gongguHistory||[],createdAt:existing?.createdAt||editInf?.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()};
  await dbPut(IS,final);data=await dbAll(IS);gdSave();showToast('✅ 저장됐어요!');closeInfModal();

async function startNewGonggu(infId){
  if(!confirm('현재 공구 정보를 이력으로 저장하고 새 공구를 시작할까요?\n\n(체크리스트도 초기화됩니다)'))return;
  const form=collectInf(); // 현재 모달에 입력된 값 수집
  const existing=data.find(x=>x.id===infId)||editInf||{};
  const prod=form.negotiating_product||form.product||existing.negotiating_product||existing.product||'';
  const sDate=form.scheduleDate||existing.scheduleDate||'';
  const eDate=form.scheduleEndDate||existing.scheduleEndDate||'';
  const settleDate=form.settlement_date||existing.settlement_date||'';
  const amount=form.settlementAmount||existing.settlementAmount||'';
  if(!prod&&!sDate){showToast('⚠️ 제품명 또는 공구일정을 먼저 입력해주세요');return;}
  const histItem={product:prod,startDate:sDate,endDate:eDate,settleDate,amount,notes:'',savedAt:new Date().toISOString()};
  const prevHistory=existing.gongguHistory||[];
  // 현재 공구 → 이력 저장 후 공구 관련 필드 초기화
  const reset={...existing,...form,
    negotiating_product:'',product:'',
    scheduleDate:'',scheduleEndDate:'',paymentLink:'',
    settlement_date:'',settlementAmount:'',
    sampleSentDate:'',trackingNumber:'',sample_detail:'',
    checklist:{contact:existing.checklist?.contact||{},sample:{},operation:{},closing:{}},
    phase:2, // 샘플 단계부터 다시
    gongguHistory:[...prevHistory,histItem],
    updatedAt:new Date().toISOString()
  };
  await dbPut(IS,reset);data=await dbAll(IS);
  editInf=reset;modalPh=2;
  gdSave();showToast('✅ 이력 저장! 새 공구를 시작하세요.');
  closeId('inf-modal');showInfModal();
}

async function deleteGongguHistory(infId,idx){
  if(!confirm('이 이력을 삭제할까요?'))return;
  const inf=data.find(x=>x.id===infId);if(!inf)return;
  const hist=[...(inf.gongguHistory||[])];hist.splice(idx,1);
  const updated={...inf,gongguHistory:hist,updatedAt:new Date().toISOString()};
  await dbPut(IS,updated);data=await dbAll(IS);
  editInf=updated;

          <option value="none"${(tk.repeat||'none')==='none'?' selected':''}>반복 없음</option>
          <option value="weekly"${tk.repeat==='weekly'?' selected':''}>매주</option>
          <option value="monthly"${tk.repeat==='monthly'?' selected':''}>매월</option>
        </select></div>
      </div>
      <div class="field"><label>링크/URL <span style="color:#94A3B8;font-size:10px">(선택)</span></label><input id="t-url" value="${tk.url||''}" placeholder="https://..."></div>
      <div class="field"><label>메모 (선택)</label><textarea id="t-notes">${tk.notes||''}</textarea></div>
      ${!isNew?`<div class="field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="t-done" ${tk.done?'checked':''} style="width:15px;height:15px;accent-color:#059669"> ✅ 완료 처리 (완료 시 대시보드에서 자동 숨김)</label></div>`:''}
    </div>
    <div class="btn-row">${!isNew?`<button class="btn-d" onclick="delPTask('${tk.id}')">삭제</button>`:''}
    <button class="btn-c" onclick="closeId('task-modal')">취소</button>
    <button class="btn-s" onclick="savePTask('${tk.id}')">저장 ✓</button></div>
  </div>`;
  document.body.appendChild(ov);

async function savePTask(id){
  const gv=i=>{const e=document.getElementById(i);return e?e.type==='checkbox'?e.checked:e.value:''};
  const task={id,
    title:gv('t-title')||'제목없음',
    date:gv('t-date'),endDate:gv('t-enddate'),time:gv('t-time'),
    priority:gv('t-priority')||'MID',
    category:gv('t-cat'),
    repeat:gv('t-repeat')||'none',
    url:gv('t-url'),
    notes:gv('t-notes'),
    done:gv('t-done')||false,
    createdAt:editTask?.createdAt||new Date().toISOString(),
    updatedAt:new Date().toISOString()
  };
  // 반복 일정 생성 (새 일정 + 반복설정 있을 때)
  if(!editTask&&task.repeat!=='none'&&task.date){
    const baseDate=new Date(task.date+'T00:00:00');
    for(let i=1;i<=3;i++){
      const nd=new Date(baseDate);
      if(task.repeat==='weekly')nd.setDate(nd.getDate()+7*i);
      else nd.setMonth(nd.getMonth()+i);
      const rep={...task,id:uid(),date:nd.toISOString().slice(0,10),endDate:task.endDate?advanceDate(task.endDate,task.repeat,i):'',createdAt:new Date().toISOString()};
      await dbPut(TS,rep);
    }
  }
  await dbPut(TS,task);pTasks=await dbAll(TS);gdSave();
  showToast(task.repeat!=='none'&&!editTask?'✅ 반복 일정 4건 저장!':'✅ 업무 일정 저장!');
  closeId('task-modal');render();
}
function advanceDate(dateStr,repeat,count){
  const d=new Date(dateStr+'T00:00:00');
  if(repeat==='weekly')d.setDate(d.getDate()+7*count);
  else d.setMonth(d.getMonth()+count);
  return d.toISOString().slice(0,10);
}
async function delPTask(id){if(!confirm('삭제할까요?'))return;await dbDel(TS,id);pTasks=await dbAll(TS);gdSave();showToast('🗑️ 삭제됐어요');closeId('task-modal');render();}

function showBadgeModal(type){
  const t0=today();const e30=addDays(30);
  const t0b=today();const e30b=addDays(30);const now3=new Date();const ymb=`${now3.getFullYear()}-${String(now3.getMonth()+1).padStart(2,'0')}`;const cfg={contact:{title:'📨 컨택 단계',color:'#6366F1',desc:'현재 컨택 진행 중'},sample:{title:'📦 샘플 단계',color:'#D97706',desc:'샘플 진행 중'},operation:{title:'🛍️ 공구확정 단계',color:'#2563EB',desc:'공구확정 진행 중'},closing:{title:'💰 마감 단계',color:'#059669',desc:'정산 진행 중'},ongoing:{title:'🛍️ 공구 진행중',color:'#2563EB',desc:'오늘 기준 판매 중'},upcoming:{title:'📅 공구 예정',color:'#7C3AED',desc:'30일 내 공구 예정'},settle:{title:'💰 정산 예정',color:'#059669',desc:'30일 내 정산 예정'},done:{title:'✅ 이달 완료',color:'#0369A1',desc:'이번 달 공구 완료'},urgent:{title:'🚨 오늘 처리 필요',color:'#DC2626',desc:'긴급 업무 + 3일내 정산'}};
  const c=cfg[type]||cfg.urgent;let filtered=[];
  if(type==='contact')filtered=data.filter(d=>d.phase===1);
  else if(type==='sample')filtered=data.filter(d=>d.phase===2);
  else if(type==='operation')filtered=data.filter(d=>d.phase===3);
  else if(type==='closing')filtered=data.filter(d=>d.phase===4);
  else if(type==='ongoing')filtered=data.filter(d=>{const s=d.scheduleDate,e=d.scheduleEndDate;return s&&e&&s<=t0b&&e>=t0b;});
  else if(type==='upcoming')filtered=data.filter(d=>{const s=d.scheduleDate;return s&&s>t0b&&s<=e30b;});
  else if(type==='settle')filtered=data.filter(d=>{const sd=calcSettleDate(d);return sd&&sd>=t0b&&sd<=e30b&&!getCL(d).closing.settled;});
  else if(type==='done')filtered=data.filter(d=>d.scheduleEndDate&&d.scheduleEndDate.startsWith(ymb)&&getCL(d).closing.done);
  else if(type==='urgent'){
    const urgItems=buildUrgent();
    const ids=new Set(urgItems.filter(i=>i.id&&i.type!=='personal').map(i=>i.id));
    filtered=data.filter(d=>ids.has(d.id));
    // 개인일정(personal) 항목은 별도 렌더링
    const personalItems=urgItems.filter(i=>i.type==='personal');
    const PTASK_COLORS2={'미팅':'#FBCFE8','업체연락':'#BFDBFE','샘플신청':'#FED7AA','장기 업무':'#E9D5FF','개인 약속':'#BBF7D0','개인메모':'#FEF08A','기타':'#E2E8F0'};
    const personalHTML=personalItems.map(p=>{
      const c2=PTASK_COLORS2[p.category]||'#E2E8F0';
      return`<div class="bm-item" style="border-left-color:${c2}" onclick="closeBM();openTaskEdit('${p.id}')">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap">
          <b style="font-size:14px">${p.title}</b>
          <span style="font-size:10px;font-weight:700;background:${c2};color:#1E293B;padding:2px 6px;border-radius:4px">${p.category}</span>
          ${p.priority==='HIGH'?'<span style="font-size:10px;font-weight:700;color:#DC2626">🔴 높음</span>':''}
        </div>
        <div style="font-size:11px;color:#94A3B8">${p.date}${p.time?' · '+p.time:''}</div>
        ${p.notes?`<div style="font-size:12px;color:#475569;margin-top:2px">${p.notes.slice(0,50)}</div>`:''}
      </div>`;
    }).join('');
    const infHTML=filtered.length?filtered.map(inf=>{const ph=PM[inf.phase||1];const na=getNextAct(inf);const schedInfo=inf.scheduleDate?`<span style="font-size:11px;font-weight:700;color:#2563EB;background:#EFF6FF;padding:2px 7px;border-radius:5px;margin-left:4px">📅 ${fmtDate(inf.scheduleDate)}${inf.scheduleEndDate?`~${fmtDate(inf.scheduleEndDate)}`:''}</span>`:'';return`<div class="bm-item" style="border-left-color:${ph.color}" onclick="closeBM();openEdit('${inf.id}')"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap"><b style="font-size:14px">${inf.name}${inf.nickname?` <span style="color:#5B21B6;font-weight:800">(${inf.nickname})</span>`:''}</b><span style="font-size:10px;font-weight:700;background:${ph.bg};color:${ph.color};padding:2px 6px;border-radius:4px">${ph.ico} ${ph.label}</span>${schedInfo}</div><div style="font-size:11px;color:#94A3B8;margin-bottom:3px">${inf.instagram||''}${inf.negotiating_product||inf.product?` · ${inf.negotiating_product||inf.product}`:''}</div>${na?`<div style="font-size:12px;font-weight:700;color:#475569">→ ${na.action}</div>`:''}</div>`;}).join(''):'';
    const listHTML=(infHTML+personalHTML)||`<div class="empty-s"><div class="empty-s-ico">✅</div><div class="empty-s-txt">해당 항목이 없어요</div></div>`;
    const totalN=filtered.length+personalItems.length;
    const ov=mkOv('bm-modal');ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()"><div class="m-hnd"></div><div class="m-head" style="color:${c.color}">${c.title}<button class="m-x" onclick="closeBM()">✕</button></div><div style="font-size:12px;color:#94A3B8;margin-bottom:12px">${c.desc} · <b style="color:${c.color}">${totalN}건</b></div>${listHTML}</div>`;document.body.appendChild(ov);
    return;
  }
  const listHTML=filtered.length?filtered.map(inf=>{const ph=PM[inf.phase||1];const na=getNextAct(inf);const schedInfo=inf.scheduleDate?`<span style="font-size:11px;font-weight:700;color:#2563EB;background:#EFF6FF;padding:2px 7px;border-radius:5px;margin-left:4px">📅 ${fmtDate(inf.scheduleDate)}${inf.scheduleEndDate?`~${fmtDate(inf.scheduleEndDate)}`:''}</span>`:'';return`<div class="bm-item" style="border-left-color:${ph.color}" onclick="closeBM();openEdit('${inf.id}')"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap"><b style="font-size:14px">${inf.name}${inf.nickname?` <span style="color:#5B21B6;font-weight:800">(${inf.nickname})</span>`:''}</b><span style="font-size:10px;font-weight:700;background:${ph.bg};color:${ph.color};padding:2px 6px;border-radius:4px">${ph.ico} ${ph.label}</span>${schedInfo}</div><div style="font-size:11px;color:#94A3B8;margin-bottom:3px">${inf.instagram||''}${inf.negotiating_product||inf.product?` · ${inf.negotiating_product||inf.product}`:''}</div>${na?`<div style="font-size:12px;font-weight:700;color:${na.urg?'#DC2626':'#475569'}">→ ${na.action}</div>`:''}</div>`;}).join(''):`<div class="empty-s"><div class="empty-s-ico">✅</div><div class="empty-s-txt">해당 항목이 없어요</div></div>`;

}
